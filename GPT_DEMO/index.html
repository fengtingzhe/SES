(()=>{
const C=document.getElementById('game'),X=C.getContext('2d'),P=document.getElementById('panel'),TO=document.getElementById('toast');
const W=52,H=44,TW=68,TH=36,S={x:4,y:22},G={x:47,y:22},DAY=92;

function resize(){C.width=innerWidth;C.height=innerHeight}addEventListener('resize',resize);
function reset(){M=Array.from({length:H},()=>Array.from({length:W},()=>({t:T.F,seen:false,job:null,val:0,mine:null,fog:null})));makeMap();pl={x:S.x,y:S.y,sp:4.35,inv:0,flash:0};ws=[0,1,2,3].map(i=>({id:i+1,x:S.x,y:S.y-1+i,state:'idle',job:null,path:[],pi:0,prog:0,lost:false,scared:false,carry:0,mine:null,mineTimer:0}));mons=[];stone=5;time=9;day=1;keys={};cam={x:0,y:0};hover=null;end=over=false;reveal();say('gpt.8：黑雾口固定出怪，营地矿山开始验证。')}
function open(x,y){let c=cell(x,y);if(c){c.t=T.G;c.job=null;c.val=0}}
function makeMap(){let y=S.y,path=[];for(let x=S.x;x<=G.x;x++){if(x>S.x+2&&x<G.x-2)y=cl(y+rnd(3)-1,7,H-8);path.push({x,y});open(x,y);open(x,y-1);open(x,y+1);if(x%5===0)open(x,y+(Math.random()<.5?2:-2))}for(let i=0;i<7;i++){let a=path[6+rnd(path.length-12)],x=a.x,yy=a.y,dir=Math.random()<.5?-1:1;for(let n=0;n<5+rnd(9);n++){yy=cl(yy+dir*(Math.random()<.7?1:0),4,H-5);x=cl(x+rnd(3)-1,3,W-4);open(x,yy);open(x+1,yy)}}river(17+rnd(3));river(34+rnd(3));for(const idx of [8,18,28,38]){let p=path[Math.min(path.length-1,idx)],c=cell(p.x,p.y);if(c&&c.t===T.G){c.t=T.FS;c.job='camp'}}placeFog(path,14,-5);placeFog(path,30,5);placeFog(path,42,-4);for(let i=0;i<45;i++){let x=6+rnd(W-12),yy=5+rnd(H-10),c=cell(x,yy);if(c.t===T.G&&Math.random()<.55){c.t=T.F;c.job='chop'}}for(let i=0;i<55;i++){let x=5+rnd(W-10),yy=4+rnd(H-8),c=cell(x,yy);if(c.t===T.F&&Math.random()<.42){c.t=T.R;c.job=null}}for(let i=0;i<38;i++){let x=5+rnd(W-10),yy=4+rnd(H-8),c=cell(x,yy);if(c.t===T.G){c.t=T.ST;c.val=2}}cell(S.x,S.y).t=T.V;cell(G.x,G.y).t=T.GO}
function placeFog(path,idx,off){let p=path[Math.min(path.length-1,idx)],x=cl(p.x,3,W-4),y=cl(p.y+off,4,H-5);for(let r=0;r<4;r++){for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){let c=cell(xx,yy);if(c&&c.t===T.G){c.t=T.FM;c.fog=true;return}}}}
function river(rx){for(let y=2;y<H-2;y++){let c=cell(rx,y);c.t=T.W;c.job=null;c.val=0}let by=S.y;for(let y=4;y<H-4;y++)if(cell(rx-1,y).t===T.G&&cell(rx+1,y).t===T.G){by=y;break}let c=cell(rx,by);c.t=T.B;c.job='repair'}
function pass(x,y){let c=cell(x,y);return c&&[T.G,T.BR,T.C,T.V,T.ST,T.GO,T.FS,T.MN,T.FM].includes(c.t)}
function adj(x,y){return[{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p=>pass(p.x,p.y))}
function findPath(a,b){let sx=Math.round(a.x),sy=Math.round(a.y),gx=Math.round(b.x),gy=Math.round(b.y);if(!pass(sx,sy)||!pass(gx,gy))return null;if(sx===gx&&sy===gy)return[{x:sx,y:sy}];let q=[{x:sx,y:sy}],pre=new Map([[K(sx,sy),null]]),dirs=[[1,0],[-1,0],[0,1],[0,-1]];for(let h=0;h<q.length;h++){let u=q[h];for(let [dx,dy]of dirs){let nx=u.x+dx,ny=u.y+dy,k=K(nx,ny);if(pre.has(k)||!pass(nx,ny))continue;pre.set(k,u);if(nx===gx&&ny===gy){let p=[{x:nx,y:ny}],b=u;while(b){p.push({x:b.x,y:b.y});b=pre.get(K(b.x,b.y))}return p.reverse()}q.push({x:nx,y:ny})}}return null}
const iso=(x,y)=>({x:(x-y)*TW/2+C.width/2+cam.x,y:(x+y)*TH/2+70+cam.y});
function phase(){let p=(time%DAY)/DAY;return p>.66||p<.08?'night':p>.52?'dusk':'day'}const night=()=>phase()==='night';
function update(dt){time+=dt;if(time>day*DAY)day++;pl.inv=Math.max(0,pl.inv-dt);pl.flash=Math.max(0,pl.flash-dt);if(!over){move(dt);reveal();hover=findInteract(false);updateWorkers(dt);spawnMonsters();updateMonsters(dt)}let p=iso(pl.x,pl.y);cam.x+=(C.width/2-p.x)*.045;cam.y+=(C.height/2-p.y)*.045}
function move(dt){let dx=(keys.d||keys.ArrowRight?1:0)-(keys.a||keys.ArrowLeft?1:0),dy=(keys.s||keys.ArrowDown?1:0)-(keys.w||keys.ArrowUp?1:0),l=Math.hypot(dx,dy)||1,nx=pl.x+dx/l*pl.sp*dt,ny=pl.y+dy/l*pl.sp*dt;if(pass(Math.round(nx),Math.round(pl.y)))pl.x=nx;if(pass(Math.round(pl.x),Math.round(ny)))pl.y=ny;pl.x=cl(pl.x,0,W-1);pl.y=cl(pl.y,0,H-1)}
function reveal(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(D({x,y},pl)<5.2||D({x,y},S)<4)cell(x,y).seen=true}
function findInteract(verbose){let px=Math.round(pl.x),py=Math.round(pl.y),a=[];for(let y=py-2;y<=py+2;y++)for(let x=px-2;x<=px+2;x++){let c=cell(x,y);if(!c||!c.seen)continue;let d=D(pl,{x,y});if(d>1.65)continue;let pri=99,act=null,lab='';if(c.t===T.ST){pri=1;act='pickup';lab=c.val>=2?'拾取辉石簇 +2':'拾取辉石 +1'}else if(c.t===T.GO){pri=2;act='goal';lab='触碰蓝色信标'}else if(c.t===T.MN){pri=3;act='mine';lab=c.mine?.worker?'矿山已有工人':'派工采矿'}else if(c.job==='chop'){pri=4;act='chop';lab='砍树 1'}else if(c.job==='repair'){pri=5;act='repair';lab='修桥 2'}else if(c.t===T.FS){pri=6;act='camp';lab='点亮旧火塘 2'}if(act)a.push({x,y,d,pri,act,lab})}a.sort((a,b)=>a.pri-b.pri||a.d-b.d);if(!a[0]&&verbose)say('附近没有可互动目标。');return a[0]||null}
function interact(){if(over)return;let it=findInteract(true);if(!it)return;let c=cell(it.x,it.y);if(it.act==='pickup'){let g=c.val||1;c.t=T.G;c.val=0;stone+=g;say(g>1?'获得辉石簇 +2':'获得辉石 +1');return}if(it.act==='goal'){end=true;say('抵达蓝色信标：远处传来像潮水一样的风。');return}if(it.act==='mine'){if(c.mine?.worker)return say('矿山已有工人驻扎。');let ch=bestWorker([{x:it.x,y:it.y}]);if(!ch)return say('没有可调度工人。');Object.assign(ch.w,{job:{type:'mine',tx:it.x,ty:it.y},path:ch.path,pi:1,state:'moving',prog:0,carry:0,mine:null,mineTimer:0});say(`工人 ${ch.w.id} 前往矿山。`);return}let cost=0,type=null,dests=[];if(it.act==='chop'){cost=1;type='chop';dests=adj(it.x,it.y)}if(it.act==='repair'){cost=2;type='repair';dests=adj(it.x,it.y)}if(it.act==='camp'){cost=2;type='camp';dests=[{x:it.x,y:it.y}]}if(stone<cost)return say('辉石不足。');if(!dests.length)return say('没有可抵达的工作位置。');let ch=bestWorker(dests);if(!ch)return say('没有可调度工人，或没有可通行路径。');stone-=cost;Object.assign(ch.w,{job:{type,tx:it.x,ty:it.y},path:ch.path,pi:1,state:'moving',prog:0,carry:cost});say(`工人 ${ch.w.id} 携带 ${cost} 个辉石出发。`)}
function bestWorker(ds){let b=null;for(let w of ws){if(w.lost||!['idle','returning'].includes(w.state))continue;for(let d of ds){let p=findPath(tile(w),d);if(p&&(!b||p.length<b.path.length))b={w,path:p}}}return b}
function updateWorkers(dt){for(let w of ws){if(w.lost)continue;if(w.state==='mining'){mineWork(w,dt);continue}if(!w.job)continue;w.scared=night()&&!safe(w.x,w.y);if(w.state==='moving'||w.state==='returning')walk(w,dt);else if(w.state==='working'){w.prog+=dt*(w.scared?.35:1);if(w.prog>=4.2)finish(w)}}}
function walk(w,dt){if(!w.path||w.pi>=w.path.length){w.state==='returning'?home(w):w.state='working';return}let g=w.path[w.pi],d=Math.hypot(g.x-w.x,g.y-w.y);if(d>.05){let sp=w.scared?1.1:2.25;w.x+=(g.x-w.x)/d*sp*dt;w.y+=(g.y-w.y)/d*sp*dt}else{w.x=g.x;w.y=g.y;w.pi++;if(w.pi>=w.path.length)w.state==='returning'?home(w):w.state='working'}}
function finish(w){let c=cell(w.job.tx,w.job.ty);if(w.job.type==='chop'){c.t=T.G;c.job=null;c.val=0;say('树障被清开，工人开始返回。')}if(w.job.type==='repair'){c.t=T.BR;c.job=null;c.val=0;say('断桥修复完成，工人开始返回。')}if(w.job.type==='camp'){c.t=T.C;c.job=null;c.val=0;say('旧火塘被点亮，矿山显现。');createMineNear(w.job.tx,w.job.ty)}if(w.job.type==='mine'){c.mine=c.mine||{worker:null,t:0};c.mine.worker=w.id;w.state='mining';w.job=null;w.path=[];w.pi=0;w.mine={x:w.job?.tx||tile(w).x,y:w.job?.ty||tile(w).y};w.mineTimer=0;say(`工人 ${w.id} 开始采矿。`);return}w.carry=0;let hp=homePath(w);if(!hp)return home(w);w.job={type:'return'};w.path=hp;w.pi=1;w.state='returning';w.prog=0}
function createMineNear(x,y){for(let r=1;r<=3;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){let c=cell(xx,yy);if(c&&c.t===T.G){c.t=T.MN;c.mine={worker:null,t:0};return}}}

function homePath(w){let pts=[S];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.C)pts.push({x,y});let b=null;for(let p of pts){let pp=findPath(tile(w),p);if(pp&&(!b||pp.length<b.length))b=pp}return b}

function safe(x,y){if(D({x,y},S)<3.2)return true;for(let yy=cl(Math.floor(y-4),0,H-1);yy<=cl(Math.ceil(y+4),0,H-1);yy++)for(let xx=cl(Math.floor(x-4),0,W-1);xx<=cl(Math.ceil(x+4),0,W-1);xx++)if(cell(xx,yy).t===T.C&&D({x,y},{x:xx,y:yy})<3.1)return true;return false}
function dropped(){let a=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++){let c=cell(x,y);if(c.t===T.ST&&c.val===1&&c.seen&&!safe(x,y))a.push({x,y})}return a}
function fogs(){let a=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.FM)a.push({x,y});return a}
function spawnMonsters(){if(!night()||mons.length>=5||Math.random()>.018)return;let targets=[];dropped().forEach(s=>targets.push({type:'stone',x:s.x,y:s.y}));ws.filter(w=>!w.lost&&w.state!=='mining'&&!safe(w.x,w.y)).forEach(w=>targets.push({type:'worker',id:w.id,x:w.x,y:w.y}));if(!end&&!over&&!safe(pl.x,pl.y)&&pl.inv<=0)targets.push({type:'player',x:pl.x,y:pl.y});if(!targets.length)return;let fs=fogs();if(!fs.length)return;let src=fs[rnd(fs.length)],tar=targets[rnd(targets.length)];mons.push({x:src.x,y:src.y,src,target:tar})}
function mTarget(m){if(m.target.type==='stone'){let c=cell(Math.round(m.target.x),Math.round(m.target.y));return c&&c.t===T.ST&&c.val===1?{x:m.target.x,y:m.target.y}:null}if(m.target.type==='worker'){let w=ws.find(w=>w.id===m.target.id&&!w.lost&&!safe(w.x,w.y));return w?{x:w.x,y:w.y}:null}return !end&&!over&&!safe(pl.x,pl.y)&&pl.inv<=0?{x:pl.x,y:pl.y}:null}
function updateMonsters(dt){for(let m of mons){let g=mTarget(m);if(!g||!night()){m.dead=true;continue}let d=Math.hypot(g.x-m.x,g.y-m.y);if(d>.05){m.x+=(g.x-m.x)/d*1.65*dt;m.y+=(g.y-m.y)/d*1.65*dt}if(d<.35){if(m.target.type==='stone'){let c=cell(Math.round(g.x),Math.round(g.y));if(c&&c.t===T.ST&&c.val===1){c.t=T.G;c.val=0;say('黑林影捡走了一颗散落辉石。')}m.dead=true}else if(m.target.type==='worker'){hitWorker(m.target.id);m.dead=true}else{hitPlayer();m.dead=true}}}mons=mons.filter(m=>!m.dead)}
function dropAt(x,y,n){let spots=[],cx=Math.round(x),cy=Math.round(y);for(let r=1;r<=3;r++){for(let yy=cy-r;yy<=cy+r;yy++)for(let xx=cx-r;xx<=cx+r;xx++){let c=cell(xx,yy);if(c&&c.t===T.G&&c.seen)spots.push({x:xx,y:yy})}if(spots.length>=n)break}for(let i=0;i<n&&spots.length;i++){let p=spots.splice(rnd(spots.length),1)[0],c=cell(p.x,p.y);c.t=T.ST;c.val=1}}

function hitWorker(id){let w=ws.find(w=>w.id===id&&!w.lost);if(!w)return;if(w.carry>0){dropAt(w.x,w.y,w.carry);say(`工人 ${w.id} 被袭击，任务辉石掉落。`);w.carry=0}else{w.lost=true;w.state='lost';say(`工人 ${w.id} 被黑林影拖入森林。`)}}
function draw(){bg();let cs=vis();fs.v=cs.length;cs.forEach(v=>drawTile(v.x,v.y));zones();paths();ws.forEach(dw);mons.forEach(dm);dp();overlay();mini();hud()}
function vis(){let a=[],m=120;for(let y=0;y<H;y++)for(let x=0;x<W;x++){let p=iso(x,y);if(p.x>-m&&p.x<C.width+m&&p.y>-m&&p.y<C.height+m)a.push({x,y,o:x+y})}return a.sort((a,b)=>a.o-b.o)}
function bg(){let g=X.createLinearGradient(0,0,0,C.height);g.addColorStop(0,night()?'#071012':phase()==='dusk'?'#18272a':'#162d2e');g.addColorStop(1,night()?'#0d1214':'#18241f');X.fillStyle=g;X.fillRect(0,0,C.width,C.height)}
function dia(p,col,st){X.beginPath();X.moveTo(p.x,p.y-TH/2);X.lineTo(p.x+TW/2,p.y);X.lineTo(p.x,p.y+TH/2);X.lineTo(p.x-TW/2,p.y);X.closePath();X.fillStyle=col;X.fill();if(st){X.strokeStyle=st;X.stroke()}}
function drawTile(x,y){let c=cell(x,y),p=iso(x,y);if(!c.seen)return dia(p,'#101817','rgba(255,255,255,.025)');let cols=['#355945','#173226','#213f50','#67462e','#785535','#42583b','#5e6040','#42695d','#315b76','#26312d','#4b4b3e','#3b4239','#1a111f'],hi=hover&&hover.x===x&&hover.y===y;dia(p,cols[c.t],hi?'rgba(255,245,180,.9)':'rgba(255,255,255,.055)');if(c.t===T.F)tree(p.x,p.y-8,c.job);if(c.t===T.R)rock(p.x,p.y-6);if(c.t===T.ST)stn(p.x,p.y-8,c.val||1);if(c.t===T.C)camp(p.x,p.y-3);if(c.t===T.FS)site(p.x,p.y-3);if(c.t===T.MN)mine(p.x,p.y-6,c.mine);if(c.t===T.FM)fog(p.x,p.y-6);if(c.t===T.V)vill(p.x,p.y-4);if(c.t===T.B)lab(p.x,p.y-30,'修桥 2');if(c.t===T.GO)goal(p.x,p.y-18);if(c.job==='chop')lab(p.x,p.y-46,'砍树 1');if(hi)lab(p.x,p.y-62,hover.lab)}
function tree(x,y,j){X.fillStyle='#14221d';X.fillRect(x-4,y+8,8,17);X.fillStyle=j?'#294b36':'#183125';X.beginPath();X.moveTo(x,y-30);X.lineTo(x+18,y+12);X.lineTo(x-18,y+12);X.closePath();X.fill()}
function rock(x,y){X.fillStyle='#4b5850';X.beginPath();X.ellipse(x,y+5,15,9,0,0,7);X.fill()}function stn(x,y,v){X.fillStyle='#98d6ca';X.beginPath();X.arc(x-(v>=2?5:0),y,7,0,7);X.fill();if(v>=2){X.fillStyle='#8ac8bd';X.beginPath();X.arc(x+7,y+4,6,0,7);X.fill()}}
function camp(x,y){X.fillStyle='rgba(255,168,76,.9)';X.beginPath();X.arc(x,y,9,0,7);X.fill();X.fillStyle='#fff0a6';X.beginPath();X.arc(x,y-3,4,0,7);X.fill()}function site(x,y){X.strokeStyle='#a8a07a';X.lineWidth=3;X.beginPath();X.ellipse(x,y,15,8,0,0,7);X.stroke();lab(x,y-28,'旧火塘 2')}
function mine(x,y,m){X.fillStyle='#2a2d2b';X.beginPath();X.arc(x,y+4,16,Math.PI,0);X.fill();X.fillStyle='#54432f';X.fillRect(x-18,y,36,6);lab(x,y-28,m?.worker?'采矿中':'矿山')}function fog(x,y){X.fillStyle='rgba(18,4,28,.9)';X.beginPath();X.ellipse(x,y+4,18,13,0,0,7);X.fill();X.fillStyle='rgba(113,75,150,.6)';X.beginPath();X.arc(x,y-6,8,0,7);X.fill();lab(x,y-32,'黑雾口')}
function vill(x,y){X.fillStyle='#624632';X.fillRect(x-16,y-10,32,20);X.fillStyle='#a17752';X.beginPath();X.moveTo(x-22,y-10);X.lineTo(x,y-29);X.lineTo(x+22,y-10);X.closePath();X.fill();lab(x,y-42,'部落')}function goal(x,y){X.strokeStyle='#9de8ff';X.lineWidth=3;X.beginPath();X.moveTo(x,y+24);X.lineTo(x,y-18);X.stroke();X.fillStyle='#85ddff';X.beginPath();X.arc(x,y-23,10,0,7);X.fill();lab(x,y-48,'蓝色信标')}
function rr(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.arcTo(x+w,y,x+w,y+h,r);X.arcTo(x+w,y+h,x,y+h,r);X.arcTo(x,y+h,x,y,r);X.arcTo(x,y,x+w,y,r);X.closePath()}function lab(x,y,s){X.font='12px system-ui';let w=X.measureText(s).width+14;rr(x-w/2,y-13,w,23,11);X.fillStyle='rgba(7,15,17,.78)';X.fill();X.fillStyle='#eaf3ef';X.textAlign='center';X.fillText(s,x,y+3)}
function zones(){let z=[{x:S.x,y:S.y,r:3.2,c:'rgba(255,215,124,.16)'}];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.C)z.push({x,y,r:3.1,c:'rgba(255,180,82,.18)'});for(let a of z){let p=iso(a.x,a.y);X.fillStyle=a.c;X.beginPath();X.ellipse(p.x,p.y,a.r*32,a.r*18,0,0,7);X.fill()}}
function paths(){X.save();X.strokeStyle='rgba(255,241,184,.22)';X.lineWidth=2;for(let w of ws){if(!w.path||w.pi>=w.path.length)continue;X.beginPath();let p=iso(w.x,w.y);X.moveTo(p.x,p.y-6);for(let i=w.pi;i<w.path.length;i++){p=iso(w.path[i].x,w.path[i].y);X.lineTo(p.x,p.y-6)}X.stroke()}X.restore()}function dp(){let p=iso(pl.x,pl.y),f=pl.flash>0&&Math.floor(pl.flash*20)%2===0;X.fillStyle=f?'#fff':'#f0cfa3';X.beginPath();X.arc(p.x,p.y-26,7,0,7);X.fill();X.fillStyle=f?'#eee':'#b66f48';X.fillRect(p.x-7,p.y-20,14,20);if(pl.inv>0)lab(p.x,p.y-48,'受击')}
function dw(w){if(w.lost)return;let p=iso(w.x,w.y);X.fillStyle=w.scared?'#ffd0d0':'#d5c59c';X.beginPath();X.arc(p.x,p.y-20,6,0,7);X.fill();X.fillStyle=w.state==='mining'?'#8a7550':w.scared?'#823f3f':'#66704e';X.fillRect(p.x-6,p.y-14,12,15);if(w.state==='moving')lab(p.x,p.y-38,'前往');if(w.state==='working')lab(p.x,p.y-36,Math.ceil(4.2-w.prog));if(w.state==='returning')lab(p.x,p.y-38,'返回');if(w.state==='mining')lab(p.x,p.y-38,'采矿');if(w.carry>0)lab(p.x,p.y-54,`辉石${w.carry}`)}function dm(m){let p=iso(m.x,m.y);X.fillStyle=m.target.type==='stone'?'rgba(20,20,0,.82)':m.target.type==='player'?'rgba(18,0,0,.82)':'rgba(0,0,0,.76)';X.beginPath();X.ellipse(p.x,p.y-8,19,12,0,0,7);X.fill();X.fillStyle='#dff4ff';X.fillRect(p.x-6,p.y-13,3,3);X.fillRect(p.x+4,p.y-13,3,3)}
function overlay(){X.fillStyle=`rgba(2,8,18,${night()?.42:phase()==='dusk'?.2:.05})`;X.fillRect(0,0,C.width,C.height);if(over){X.fillStyle='rgba(0,0,0,.58)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#fff1b8';X.textAlign='center';X.font='bold 34px system-ui';X.fillText('旅程中断',C.width/2,C.height/2-14);X.fillStyle='#d9e8df';X.font='16px system-ui';X.fillText('辉石耗尽，你被黑林影拖入森林。按 R 重新开始。',C.width/2,C.height/2+22)}}
function mini(){let s=128,x0=C.width-s-22,y0=18;X.fillStyle='rgba(7,16,17,.62)';rr(x0-8,y0-8,s+16,s+16,12);X.fill();for(let y=0;y<H;y++)for(let x=0;x<W;x++){let c=cell(x,y);if(!c.seen)continue;X.fillStyle=c.t===T.W?'#315b76':c.t===T.C?'#e59e54':c.t===T.FS?'#aaa172':c.t===T.MN?'#8a7550':c.t===T.FM?'#7d4fa0':c.t===T.GO?'#8ee6ff':c.t===T.ST?(c.val>=2?'#b6eee4':'#78bbb0'):'#496d54';X.fillRect(x0+x/W*s,y0+y/H*s,Math.ceil(s/W),Math.ceil(s/H))}X.fillStyle='#fff1b8';X.beginPath();X.arc(x0+pl.x/W*s,y0+pl.y/H*s,3,0,7);X.fill()}function hud(){let idle=ws.filter(w=>!w.lost&&w.state==='idle').length,mov=ws.filter(w=>!w.lost&&w.state==='moving').length,ret=ws.filter(w=>!w.lost&&w.state==='returning').length,min=ws.filter(w=>!w.lost&&w.state==='mining').length,alive=ws.filter(w=>!w.lost).length,lost=ws.length-alive,ph=night()?'夜晚':phase()==='dusk'?'黄昏':'白天',ps=over?'游戏结束':safe(pl.x,pl.y)?'安全圈内':night()?'危险':'安全';P.innerHTML=`<h1>《看海去》GPT_DEMO gpt.8</h1>地图：<b>${W}×${H}</b>　本帧绘制：<b>${fs.v}</b> / ${fs.total}<br>辉石：<b>${stone}</b>　玩家：<b>${ps}</b><br>工人：<b>${idle}/${alive}</b> 空闲　前往：<b>${mov}</b>　返回：<b>${ret}</b>　采矿：<b>${min}</b>　失踪：<b>${lost}</b><br>怪物源点：<b>${fogs().length}</b> 个黑雾口　怪物：<b>${mons.length}</b><br>第 ${day} 天 · ${ph}<br>当前互动：<b>${hover?hover.lab:'附近无可互动目标'}</b><br>目标：${end?'<b>已抵达蓝色信标</b>':'固定黑雾口可预判风险；点亮营地后派工采矿'}`}
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault();interact()}if(e.key.toLowerCase()==='r')reset()});addEventListener('keyup',e=>keys[e.key]=false);let last=performance.now();function loop(now){let dt=Math.min(.05,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}resize();reset();requestAnimationFrame(loop)
})();
</script></body></html>
