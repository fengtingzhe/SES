<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>《看海去》GPT_DEMO gpt.11.7</title>
<style>
html, body {
  margin: 0; height: 100%; overflow: hidden;
  background: #071010; color: #eaf3ef;
  font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
canvas { display: block; width: 100vw; height: 100vh; }
.box {
  position: fixed; background: rgba(7,16,17,.8);
  border: 1px solid rgba(218,239,230,.18); border-radius: 16px;
  padding: 12px 14px; line-height: 1.65; backdrop-filter: blur(8px);
}
#hud { left: 18px; top: 54px; width: 620px; transition: .18s; }
#hud.hide { transform: translateX(-660px); }
#top {
  top: 14px; left: 50%; transform: translateX(-50%);
  font-weight: 900; background: rgba(237,248,241,.92);
  color: #173033; border-radius: 999px;
}
button {
  position: fixed; background: #edf8f1; color: #173033;
  border: 0; font-weight: 800; cursor: pointer;
}
#infoBtn { left: 18px; top: 16px; border-radius: 12px; padding: 9px 12px; }
#verBtn  { right: 0; top: 36px; border-radius: 12px 0 0 12px; padding: 10px 12px; }
#conBtn  { right: 0; top: 82px; border-radius: 12px 0 0 12px; padding: 10px 12px; }
#ver, #con {
  right: 0; top: 128px; width: 410px; max-height: 72vh; overflow: auto;
  transform: translateX(440px); transition: .2s; border-radius: 16px 0 0 16px;
}
#ver.open, #con.open { transform: translateX(0); }
#help { right: 18px; bottom: 16px; max-width: 900px; color: #c8d7d1; }
.toast {
  left: 50%; top: 60px; transform: translateX(-50%);
  border-radius: 999px; background: #edf8f1; color: #173033;
  font-weight: 700; opacity: 0; transition: .18s; pointer-events: none;
}
.toast.show { opacity: 1; }
b { color: #fff1b8; }
h1 { font-size: 17px; margin: 0 0 6px; }
.row {
  display: grid; grid-template-columns: 90px 1fr 55px;
  gap: 8px; align-items: center; margin: 8px 0;
}
input { width: 100%; }
.small { opacity: .82; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="top" class="box"></div>
<button id="infoBtn">信息</button>
<div id="hud" class="box hide"></div>
<button id="verBtn">gpt.11.7 更新</button>
<div id="ver" class="box">
  <h1>gpt.11.7 状态清理与夜晚刷怪修正</h1>
  <ul>
    <li>修复矿工被黑影抓走后，矿山仍显示"已有工人"的占用残留。</li>
    <li>修复同一个连续夜晚跨天后，黑影生成计数可能被重置的问题。</li>
    <li>撤退中的工人不再会被重新派遣。</li>
    <li>保留 gpt.11.6 的黑影局部进攻逻辑：最近营地行军、4 格感知、营地无免疫。</li>
  </ul>
</div>
<button id="conBtn">Console</button>
<div id="con" class="box">
  <h1>Console</h1>
  <div>FPS：<b id="fps">--</b></div>
  <div class="row">
    <span>镜头</span>
    <input id="zoom" type="range" min="0.7" max="2.2" step="0.05">
    <b id="zv"></b>
  </div>
  <div class="row">
    <span>速度</span>
    <input id="speed" type="range" min="2" max="7" step="0.1">
    <b id="sv"></b>
  </div>
  <button id="reset" style="position:static;border-radius:10px;padding:8px 10px">恢复默认</button>
</div>
<div id="help" class="box">
  <b>操作</b>：WASD / 方向键移动；<b>Space 互动</b>；R 重开。<br>
  <b>gpt.11.7</b>：状态清理与夜晚刷怪修正。矿山占用释放 · 夜晚刷怪计数修正 · 撤退工人不可派遣。<br>
  <b>F2</b> 开关文字标签 | <b>F3</b> 开关小地图（性能诊断）。
</div>
<div id="toast" class="box toast"></div>

<script>
(() => {

// ============================================================
// DOM / UI 引用
// ============================================================
const cv       = document.getElementById('game');
const ctx      = cv.getContext('2d');
const hud      = document.getElementById('hud');
const topHud   = document.getElementById('top');
const toast    = document.getElementById('toast');
const ver      = document.getElementById('ver');
const con      = document.getElementById('con');
const fpsEl    = document.getElementById('fps');
const zoomEl   = document.getElementById('zoom');
const speedEl  = document.getElementById('speed');
const zv       = document.getElementById('zv');
const sv       = document.getElementById('sv');

document.getElementById('infoBtn').onclick = () => hud.classList.toggle('hide');
document.getElementById('verBtn').onclick = () => {
  ver.classList.toggle('open'); con.classList.remove('open');
};
document.getElementById('conBtn').onclick = () => {
  con.classList.toggle('open'); ver.classList.remove('open');
};

// ============================================================
// 常量与全局状态
// ============================================================
const W     = 74;
const H     = 54;
const S     = 28;          // 地块基础尺寸
const DAY   = 95;          // 一天时长（秒）
const START = { x: 5, y: 27 };
const GOAL  = { x: 68, y: 27 };

// 地块类型枚举
const T = {
  F:   0,   // 深林（不可通行）
  G:   1,   // 普通地面
  W:   2,   // 河流
  B:   3,   // 断桥
  BR:  4,   // 已修好的桥
  V:   5,   // 部落（出生点）
  C:   6,   // 营地
  S:   7,   // 辉石（可拾取）
  MN:  8,   // 矿山
  RF:  9,   // 流民火堆
  FOG: 10,  // 黑雾口
  INV: 11,  // 颠倒森林
  HUT: 12,  // 工棚
  AR:  13,  // 弓箭营
  FOX: 14,  // 狐狸成亲
  GO:  15,  // 远方信标（终点）
  FS:  16,  // 旧火塘
  WB:  17,  // 围墙地基
  WL:  18   // 围墙
};

// 工具函数
const rnd  = n => Math.floor(Math.random() * n);
const cl   = (v, a, b) => Math.max(a, Math.min(b, v));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const cell = (x, y) => map[y]?.[x];

// 缩放与速度（持久化到 localStorage）
let zoom  = +(localStorage.khq112_zoom  || 1.15);
let speed = +(localStorage.khq112_speed || 4.2);
zoomEl.value  = zoom;
speedEl.value = speed;

function apply() {
  zoom  = +zoomEl.value;
  speed = +speedEl.value;
  zv.textContent = zoom.toFixed(2);
  sv.textContent = speed.toFixed(1);
  localStorage.khq112_zoom  = zoom;
  localStorage.khq112_speed = speed;
}
zoomEl.oninput = speedEl.oninput = apply;
document.getElementById('reset').onclick = () => {
  zoomEl.value = 1.15; speedEl.value = 4.2; apply();
};
apply();

// 全局游戏对象
let map, pl, workers, pop, refs, archers, monsters, foxes;
let stone, time, day, keys, cam, hover, over, timer, nextId, foxEvent;

// 性能诊断开关
let showLabels  = true;
let showMiniMap = true;

// 黑影生成控制
const MONSTERS_PER_NIGHT = 2;
let nightSpawned = 0;
let spawnCooldown = 0;
let wasNight = false;

// 黑影局部感知
const MONSTER_TACTICAL_RANGE = 4;
const MONSTER_TARGET_LOCK = 1.2;

// Toast 消息
function msg(t) {
  toast.textContent = t;
  toast.classList.add('show');
  clearTimeout(timer);
  timer = setTimeout(() => toast.classList.remove('show'), 1600);
}

// Canvas 自适应
function resize() { cv.width = innerWidth; cv.height = innerHeight; }
addEventListener('resize', resize);

// ============================================================
// 地图与地块工具
// ============================================================
function mkTile(t = T.F) {
  return {
    t, seen: false, job: null, val: 0, life: null,
    lock: false, mine: null, ref: false, invertLabel: false
  };
}

function blank(x, y) { if (cell(x, y)) map[y][x] = mkTile(T.G); }

function pass(x, y) {
  let c = cell(x, y);
  return c && [
    T.G, T.BR, T.V, T.C, T.S, T.MN, T.RF, T.FOG,
    T.INV, T.HUT, T.AR, T.FOX, T.GO, T.FS, T.WB, T.WL
  ].includes(c.t);
}

function neigh(x, y) {
  return [
    { x: x + 1, y }, { x: x - 1, y },
    { x, y: y + 1 }, { x, y: y - 1 }
  ].filter(p => pass(p.x, p.y));
}

// BFS 寻路
function findPath(a, b) {
  let sx = Math.round(a.x), sy = Math.round(a.y);
  let gx = Math.round(b.x), gy = Math.round(b.y);
  if (!pass(sx, sy) || !pass(gx, gy)) return null;

  let q   = [{ x: sx, y: sy }];
  let pre = new Map([[sx + ',' + sy, null]]);

  for (let h = 0; h < q.length; h++) {
    let u = q[h];
    for (let n of neigh(u.x, u.y)) {
      let k = n.x + ',' + n.y;
      if (pre.has(k)) continue;
      pre.set(k, u);
      if (n.x === gx && n.y === gy) {
        let p = [n], v = u;
        while (v) { p.push(v); v = pre.get(v.x + ',' + v.y); }
        return p.reverse();
      }
      q.push(n);
    }
  }
  return null;
}

// 坐标转屏幕坐标（等距投影）
function toScreen(x, y) {
  let s = S * zoom;
  return {
    x: (x - y) * s + cv.width / 2  + cam.x,
    y: (x + y) * s * .5 + 50       + cam.y
  };
}

// 昼夜系统
function phase() {
  let p = (time % DAY) / DAY;
  return p > .66 || p < .08 ? 'night' : p > .52 ? 'dusk' : 'day';
}
const night  = () => phase() === 'night';
function phText() {
  return night() ? '夜晚' : phase() === 'dusk' ? '黄昏' : '白天';
}

// 颠倒森林判定
function inInvert(o) {
  let p = { x: Math.round(o.x), y: Math.round(o.y) };
  let c = cell(p.x, p.y);
  return c && c.t === T.INV;
}

// 安全区判定
function safe(x, y) {
  if (dist({ x, y }, START) < 3.2) return true;
  for (let h of camps()) if (dist({ x, y }, h) < 3.1) return true;
  return false;
}

// 营地列表
function camps() {
  let a = [];
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (cell(x, y).t === T.C) a.push({ x, y });
  return a;
}

// 最近营地
function nearestHome(o) {
  let hs = [START, ...camps()], best = START, bd = 999;
  for (let h of hs) { let d = dist(o, h); if (d < bd) { bd = d; best = h; } }
  return best;
}

// 回家寻路
function homePath(o) {
  let hs = [START, ...camps()], best = null;
  for (let h of hs) {
    let p = findPath(o, h);
    if (p && (!best || p.length < best.length)) best = p;
  }
  return best;
}

// ============================================================
// 地图生成
// ============================================================
function resetGame() {
  map = Array.from({ length: H }, () => Array.from({ length: W }, () => mkTile(T.F)));
  makeMap();
  pl = {
    x: START.x, y: START.y, inv: 0,
    dir: { x: 1, y: 0 }, ctrlInv: false
  };
  workers  = [mkUnit('worker', START.x, START.y - 1), mkUnit('worker', START.x, START.y + 1)];
  pop      = [];
  refs     = [];
  archers  = [];
  monsters = [];
  foxes    = [];
  stone    = 6;
  time     = 8;
  day      = 1;
  keys     = {};
  cam      = { x: 0, y: 0 };
  hover    = null;
  over     = false;
  nextId   = 3;
  foxEvent = null;
  reveal();
  msg('gpt.11.7：状态清理与夜晚刷怪修正已启动。');
}

function mkUnit(type, x, y) {
  return {
    id: nextId++, type, x, y,
    state: 'idle', job: null, path: [], pi: 0, prog: 0, carry: 0,
    lost: false, shoot: 0, aimProg: 0,
    homeX: START.x, homeY: START.y,
    flee: false, savedJob: null
  };
}

function makeMap() {
  // —— 主干道 ——
  let y = START.y, path = [];
  for (let x = START.x; x <= GOAL.x; x++) {
    if (x > 8 && x < GOAL.x - 2) y = cl(y + rnd(3) - 1, 8, H - 9);
    path.push({ x, y });
    for (let dy = -1; dy <= 1; dy++) blank(x, y + dy);
    if (x % 5 === 0) blank(x, y + (Math.random() < .5 ? 2 : -2));
  }

  // —— 分支路径 ——
  for (let i = 0; i < 16; i++) {
    let p = path[8 + rnd(path.length - 16)], x = p.x, yy = p.y;
    let dir = Math.random() < .5 ? -1 : 1;
    for (let n = 0; n < 5 + rnd(12); n++) {
      x  = cl(x  + rnd(3) - 1, 4, W - 5);
      yy = cl(yy + dir * (Math.random() < .75 ? 1 : 0), 5, H - 6);
      blank(x, yy); blank(x + 1, yy);
      if (n % 3 == 0) blank(x, yy + dir);
    }
  }

  // —— 河流与断桥 ——
  river(22 + rnd(3));
  river(45 + rnd(3));

  // —— 特殊地形 ——
  paintInvert(path[10].x, path[10].y - 5, 3);
  place(path, 12, -4, c => { c.t = T.S; c.val = 4; });
  place(path, 16,  4, c => { c.t = T.RF; c.ref = true; });
  place(path, 27, -5, c => { c.t = T.FOX; });
  place(path, 30,  4, c => { c.t = T.RF; c.ref = true; });
  place(path, 36, -4, c => { c.t = T.FOG; });
  place(path, 39,  0, c => { c.t = T.FS; c.job = 'camp'; });
  place(path, 48,  5, c => { c.t = T.FOG; });
  paintInvert(path[50].x, path[50].y - 4, 3);

  // —— 散落辉石 ——
  scatter(T.S, 48, c => { c.val = 2; });

  // —— 可砍树 ——
  for (let i = 0; i < 90; i++) {
    let x = 6 + rnd(W - 12), yy = 5 + rnd(H - 10), c = cell(x, yy);
    if (c.t === T.G && Math.random() < .35) { c.t = T.F; c.job = 'chop'; }
  }

  startArea();
  cell(GOAL.x, GOAL.y).t = T.GO;
}

function scatter(t, n, extra) {
  for (let i = 0; i < n; i++) {
    let x = 5 + rnd(W - 10), y = 4 + rnd(H - 8), c = cell(x, y);
    if (c.t === T.G) { c.t = t; if (extra) extra(c); }
  }
}

function paintInvert(cx, cy, r) {
  for (let y = cy - r; y <= cy + r; y++)
    for (let x = cx - r; x <= cx + r; x++) {
      let c = cell(x, y);
      if (c && dist({ x, y }, { x: cx, y: cy }) <= r + .3) {
        c.t = T.INV; c.job = null; c.val = 0;
        c.life = null; c.lock = false; c.invertLabel = false;
      }
    }
  let cc = cell(cx, cy); if (cc) cc.invertLabel = true;
}

function place(pathArr, idx, off, fn) {
  let p = pathArr[Math.min(pathArr.length - 1, idx)];
  let x = p.x, y = cl(p.y + off, 4, H - 5);
  for (let r = 0; r < 8; r++)
    for (let yy = y - r; yy <= y + r; yy++)
      for (let xx = x - r; xx <= x + r; xx++) {
        let c = cell(xx, yy); if (c && c.t === T.G) { fn(c); return; }
      }
}

function river(rx) {
  for (let y = 3; y < H - 3; y++) { let c = cell(rx, y); c.t = T.W; c.job = null; }
  let by = START.y;
  for (let y = 4; y < H - 4; y++)
    if (cell(rx - 1, y).t === T.G && cell(rx + 1, y).t === T.G) { by = y; break; }
  let b = cell(rx, by); b.t = T.B; b.job = 'repair';
}

function startArea() {
  for (let y = START.y - 4; y <= START.y + 4; y++)
    for (let x = START.x - 3; x <= START.x + 5; x++) blank(x, y);
  cell(START.x, START.y).t            = T.V;
  cell(START.x + 2, START.y).t        = T.MN;
  cell(START.x + 2, START.y).mine     = { worker: null };
  spawnCareer(START.x, START.y);
  spawnWallBases(START.x, START.y);
}

function spawnCareer(cx, cy) {
  let spots = [
    { x: cx + 1, y: cy + 2, t: T.HUT },
    { x: cx + 3, y: cy + 2, t: T.AR  }
  ];
  for (let s of spots) {
    let c = cell(s.x, s.y); if (c && c.t === T.G) c.t = s.t;
  }
}

// 在部落/营地附近生成围墙地基
function spawnWallBases(cx, cy) {
  let bases = [
    { x: cx + 4, y: cy + 1 },
    { x: cx - 2, y: cy + 1 }
  ];
  for (let b of bases) {
    let c = cell(b.x, b.y);
    if (c && c.t === T.G) { c.t = T.WB; c.job = null; c.lock = false; }
  }
}

function createMine(x, y) {
  for (let r = 1; r < 4; r++)
    for (let yy = y - r; yy <= y + r; yy++)
      for (let xx = x - r; xx <= x + r; xx++) {
        let c = cell(xx, yy);
        if (c && c.t === T.G) { c.t = T.MN; c.mine = { worker: null }; return; }
      }
}

// ============================================================
// 每夜刷怪计数器重置
// ============================================================
function updateNightSpawnCounter() {
  let isNight = night();

  if (isNight && !wasNight) {
    nightSpawned = 0;
    spawnCooldown = 0;
  }

  wasNight = isNight;
}

// ============================================================
// 流民火堆冷却刷新
// ============================================================
function updateRefugeeFires(dt) {
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      let c = cell(x, y);
      if (c && c.t === T.RF && !c.ref && c.refCd != null && c.refCd > 0) {
        c.refCd -= dt;
        if (c.refCd <= 0) {
          c.ref = true;
          c.refCd = 0;
        }
      }
    }
  }
}

// ============================================================
// 游戏主更新
// ============================================================
function update(dt) {
  time += dt;
  if (time > day * DAY) day++;
  pl.inv = Math.max(0, pl.inv - dt);

  if (!over) {
    updateNightSpawnCounter();
    if (spawnCooldown > 0) spawnCooldown -= dt;
    move(dt); reveal(); pickup(); life(dt);
    hover = findInteract(false);
    updateUnits(dt); updateRefs(dt); updateRefugeeFires(dt); updateArchers(dt); updateFox(dt);
    spawnMonsters(); updateMonsters(dt);
  }

  // 镜头跟随
  let p = toScreen(pl.x, pl.y);
  cam.x += (cv.width  / 2 - p.x) * .06;
  cam.y += (cv.height / 2 - p.y) * .06;
}

// ============================================================
// 玩家移动与颠倒森林
// ============================================================
function move(dt) {
  let rx  = (keys.d || keys.ArrowRight ? 1 : 0) - (keys.a || keys.ArrowLeft ? 1 : 0);
  let ry  = (keys.s || keys.ArrowDown  ? 1 : 0) - (keys.w || keys.ArrowUp   ? 1 : 0);
  let has = rx || ry;

  if (!has) { pl.ctrlInv = inInvert(pl); return; }

  // 更新朝向（四方向）
  let ax = Math.abs(rx), ay = Math.abs(ry);
  pl.dir = ax >= ay
    ? { x: rx > 0 ? 1 : -1, y: 0 }
    : { x: 0, y: ry > 0 ? 1 : -1 };

  // 颠倒森林反转方向
  let ix = rx, iy = ry;
  if (pl.ctrlInv) { ix = -ix; iy = -iy; }

  let l  = Math.hypot(ix, iy) || 1;
  let nx = pl.x + ix / l * speed * dt;
  let ny = pl.y + iy / l * speed * dt;

  // 分轴移动，避免卡角
  if (pass(Math.round(nx), Math.round(pl.y))) pl.x = nx;
  if (pass(Math.round(pl.x), Math.round(ny))) pl.y = ny;
}

// 视野揭示
function reveal() {
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (dist({ x, y }, pl) < 6 || dist({ x, y }, START) < 5 || nearCamp(x, y))
        cell(x, y).seen = true;
}

function nearCamp(x, y) {
  for (let h of [START, ...camps()])
    if (dist({ x, y }, h) < 4.5) return true;
  return false;
}

// 自动拾取辉石
function pickup() {
  let got = 0;
  for (let y = Math.floor(pl.y - 1); y <= Math.ceil(pl.y + 1); y++)
    for (let x = Math.floor(pl.x - 1); x <= Math.ceil(pl.x + 1); x++) {
      let c = cell(x, y);
      if (c && c.t === T.S && dist(pl, { x, y }) < .8) {
        got += c.val || 1; blank(x, y);
      }
    }
  if (got) { stone += got; msg('获得辉石 +' + got); }
}

// 辉石生命周期
function life(dt) {
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      let c = cell(x, y);
      if (c.t === T.S && c.life != null) {
        c.life -= dt; if (c.life <= 0) blank(x, y);
      }
    }
}

// 辉石掉落
function drop(x, y, n) {
  for (let i = 0; i < n; i++) {
    let pts = [];
    for (let yy = Math.round(y) - 2; yy <= Math.round(y) + 2; yy++)
      for (let xx = Math.round(x) - 2; xx <= Math.round(x) + 2; xx++) {
        let c = cell(xx, yy); if (c && c.t === T.G) pts.push({ x: xx, y: yy });
      }
    if (pts.length) {
      let p = pts[rnd(pts.length)], c = cell(p.x, p.y);
      c.t = T.S; c.val = 1; c.life = 10;
    }
  }
}

// ============================================================
// 互动系统与辉石放置
// ============================================================
function infoAt(x, y) {
  let c = cell(x, y);
  if (!c || !c.seen || c.lock) return null;

  let act = null, labelText = '', pri = 99;

  if      (c.t === T.GO)            { act = 'goal';   labelText = '抵达远方信标';    pri = 1; }
  else if (c.t === T.RF && c.ref)   { act = 'ref';    labelText = '招募流民 1';       pri = 2; }
  else if (c.t === T.HUT)           { act = 'hut';    labelText = '流民转工人 1';     pri = 3; }
  else if (c.t === T.AR)            { act = 'archer'; labelText = '流民转弓箭手 1';   pri = 4; }
  else if (c.t === T.MN)            { act = 'mine';   labelText = c.mine?.worker ? '矿山已有工人' : '派工采矿'; pri = 5; }
  else if (c.t === T.FOX)           { act = 'fox';    labelText = '狐狸成亲';         pri = 6; }
  else if (c.t === T.WB)            { act = 'wall';   labelText = '建造围墙 2';       pri = 7; }
  else if (c.job === 'chop')        { act = 'chop';   labelText = '砍树 1';           pri = 8; }
  else if (c.job === 'repair')      { act = 'repair'; labelText = '修桥 2';           pri = 9; }
  else if (c.job === 'camp')        { act = 'camp';   labelText = '点亮旧火塘 2';     pri = 10; }

  return act ? { x, y, act, label: labelText, pri, d: dist(pl, { x, y }) } : null;
}

function findInteract(v) {
  let px = Math.round(pl.x), py = Math.round(pl.y);

  // 优先：玩家面前一格
  let front = infoAt(px + pl.dir.x, py + pl.dir.y);
  if (front) return front;

  // 其次：周围 2 格范围
  let a = [];
  for (let y = py - 2; y <= py + 2; y++)
    for (let x = px - 2; x <= px + 2; x++) {
      let t = infoAt(x, y); if (t && t.d <= 1.7) a.push(t);
    }

  a.sort((a, b) => a.pri - b.pri || a.d - b.d);
  if (!a[0] && v) msg('附近没有可互动目标。');
  return a[0];
}

function interact() {
  let it = findInteract(false);

  // 无互动目标 → 放置辉石
  if (!it) return placeStone();

  let c = cell(it.x, it.y);

  if (it.act === 'goal')   { msg('你听见了远处像海一样的风。阶段目标完成。'); return; }
  if (it.act === 'ref')    return recruit(it, c);
  if (it.act === 'hut')    return convert('worker');
  if (it.act === 'archer') return convert('archer');
  if (it.act === 'mine')   return sendMine(it, c);
  if (it.act === 'fox')    return startFox(it, c);

  let cost = (it.act === 'repair' || it.act === 'camp' || it.act === 'wall') ? 2 : 1;
  if (stone < cost) return msg('辉石不足。');

  let locs = it.act === 'camp' ? [{ x: it.x, y: it.y }] : neigh(it.x, it.y);
  let b = bestWorker(locs);
  if (!b) return msg('没有可用工人或道路不通。');

  stone -= cost; c.lock = true;
  let h = nearestHome(b);
  Object.assign(b, {
    job: { type: it.act, tx: it.x, ty: it.y },
    path: b.path, pi: 1, state: 'moving', carry: cost, prog: 0,
    homeX: h.x, homeY: h.y, flee: false
  });
  msg('工人出发：' + it.label);
}

// 辉石放置（Space 无互动目标时触发）
function placeStone() {
  if (stone <= 0) return msg('没有辉石可放置。');

  let px = Math.round(pl.x), py = Math.round(pl.y);
  let spots = [];

  // 优先：玩家朝向前方
  spots.push({ x: px + pl.dir.x, y: py + pl.dir.y });

  // 其次：周围 2 格范围
  for (let r = 1; r <= 2; r++) {
    for (let y = py - r; y <= py + r; y++)
      for (let x = px - r; x <= px + r; x++)
        spots.push({ x, y });
  }

  // 去重
  let seen = new Set();
  spots = spots.filter(p => {
    let k = p.x + ',' + p.y;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  // 找第一个普通地面 T.G
  let p = spots.find(s => cell(s.x, s.y)?.t === T.G);
  if (!p) return msg('附近没有可放置辉石的空地。');

  stone--;
  let c = cell(p.x, p.y);
  c.t = T.S; c.val = 1; c.life = 10;
  msg('放置辉石 -1。');
}

// 流民招募
function recruit(it, c) {
  if (stone < 1) return msg('辉石不足。');
  let p = homePath({ x: it.x, y: it.y });
  if (!p) return msg('流民找不到回营地的路。');
  stone--; c.ref = false; c.refCd = 10; c.lock = true;
  refs.push({ x: it.x, y: it.y, ox: it.x, oy: it.y, path: p, pi: 1, lost: false });
  msg('流民开始返回安全点。');
}

// 流民转职
function convert(kind) {
  if (stone < 1)   return msg('辉石不足。');
  if (!pop.length) return msg('没有未转职流民。');
  let r = pop.shift(); stone--;
  if (kind === 'worker') {
    workers.push(mkUnit('worker', r.x, r.y));
    msg('流民在工棚转职为工人。');
  } else {
    archers.push(mkUnit('archer', r.x, r.y));
    msg('流民在弓箭营转职为弓箭手。');
  }
}

// 找最佳工人（路径最短）
function bestWorker(locs) {
  let best = null, bp = null;
  for (let w of workers.filter(w => !w.lost && !w.flee && (w.state === 'idle' || w.state === 'return')))
    for (let d of locs) {
      let p = findPath(w, d);
      if (p && (!bp || p.length < bp.length)) { best = w; bp = p; }
    }
  if (best) { best.path = bp; return best; }
  return null;
}

// 派遣工人去矿山
function sendMine(it, c) {
  // 保险清理：如果记录的工人已不存在或失踪，自动释放矿山占用
  if (c.mine?.worker) {
    let owner = workers.find(w => w.id === c.mine.worker);
    if (!owner || owner.lost) {
      c.mine.worker = null;
      c.lock = false;
    }
  }

  if (c.mine?.worker) return msg('矿山已有工人。');
  let w = bestWorker([{ x: it.x, y: it.y }]);
  if (!w) return msg('没有可用工人或道路不通。');
  c.lock = true;
  let h = nearestHome(w);
  Object.assign(w, {
    job: { type: 'mine', tx: it.x, ty: it.y },
    state: 'moving', pi: 1, prog: 0,
    homeX: h.x, homeY: h.y, flee: false
  });
  msg('工人前往矿山。');
}

// ============================================================
// 工人系统
// ============================================================
function updateUnits(dt) {
  for (let w of workers) {
    if (w.lost) continue;

    // 非采矿状态检测威胁
    if (w.state !== 'mining') checkThreat(w);

    // 采矿中
    if (w.state === 'mining') {
      w.prog += dt;
      if (w.prog > 30) {
        w.prog = 0; drop(w.x, w.y, 1);
        msg('矿山产出 1 个辉石。');
      }
      continue;
    }

    if (!w.job) continue;

    if (w.state === 'moving' || w.state === 'return') walk(w, dt);
    else if (w.state === 'work') {
      w.prog += dt * (night() && !safe(w.x, w.y) ? .35 : 1);
      if (w.prog > 4) finish(w);
    }
  }
}

// 黑影威胁检测（撤退与恢复）
// safe() 不再提供绝对庇护；营地光圈仅用于视觉/HUD，不影响黑影威胁判定
function checkThreat(w) {
  if (w.state === 'return' && !w.flee) return;

  let nearMonster = monsters.find(m =>
    Math.abs(m.x - w.x) <= 3 && Math.abs(m.y - w.y) <= 3
  );

  // —— 正在撤退中，黑影已远离：恢复原任务 ——
  if (w.flee && !nearMonster) {
    if (w.savedJob) {
      let job    = w.savedJob;
      let target = { x: job.tx, y: job.ty };
      let path   = findPath(w, target);

      if (path) {
        Object.assign(w, {
          job: job, path: path, pi: 1, state: 'moving',
          prog: 0, carry: 0, flee: false, savedJob: null
        });
        msg('黑影远离，工人继续前往目标。');
      } else {
        // 目标不可达，转为空闲
        w.savedJob = null; w.flee = false;
        w.job = null; w.state = 'idle'; w.path = []; w.pi = 0; w.prog = 0;
        msg('目标不可达，工人停止任务。');
      }
    }
    return;
  }

  // —— 没有黑影，或已在撤退中，跳过 ——
  if (!nearMonster || w.flee) return;

  // —— 有黑影，保存原任务并撤退 ——
  if (w.job && w.job.type !== 'return') {
    w.savedJob = { ...w.job };
  } else {
    return;
  }

  // 释放当前目标 lock
  let targetCell = cell(w.job.tx, w.job.ty);
  if (targetCell) targetCell.lock = false;

  let home = { x: w.homeX || START.x, y: w.homeY || START.y };
  let path = findPath(w, home) || homePath(w);

  if (path) {
    Object.assign(w, {
      job: { type: 'return' },
      path: path, pi: 1, state: 'return', prog: 0, carry: 0, flee: true
    });
    msg('工人发现黑影，暂时撤退。');
  }
}

// 工人行走
function walk(u, dt) {
  if (!u.path || u.pi >= u.path.length) {
    if (u.state === 'return') home(u);
    else u.state = 'work';
    return;
  }

  let g = u.path[u.pi], d = dist(u, g);
  if (d > .05) {
    let sp = night() && !safe(u.x, u.y) ? 1.1 : 2.25;
    u.x += (g.x - u.x) / d * sp * dt;
    u.y += (g.y - u.y) / d * sp * dt;
  } else {
    u.x = g.x; u.y = g.y; u.pi++;
    if (u.pi >= u.path.length) {
      if (u.state === 'return') home(u);
      else u.state = 'work';
    }
  }
}

// 释放工人任务锁
function release(u) {
  // 释放普通任务目标 lock
  if (u.job && u.job.type !== 'return') {
    let c = cell(u.job.tx, u.job.ty); if (c) c.lock = false;
  }

  // 释放该工人占用的矿山
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      let c = cell(x, y);
      if (c && c.t === T.MN && c.mine?.worker === u.id) {
        c.mine.worker = null;
        c.lock = false;
      }
    }
  }

  u.job = null; u.path = []; u.pi = 0; u.prog = 0;
}

// 工人完成任务
function finish(w) {
  let { tx, ty, type } = w.job, c = cell(tx, ty);

  if (type === 'chop') {
    blank(tx, ty); drop(tx, ty, 1);
    msg('树障被清开，掉落 1 个辉石。');
  }
  if (type === 'repair') { c.t = T.BR; c.job = null; c.lock = false; msg('断桥修复完成。'); }
  if (type === 'wall')   { c.t = T.WL; c.job = null; c.lock = false; c.hp = 3; msg('围墙建造完成。'); }

  if (type === 'camp') {
    c.t = T.C; c.job = null; c.lock = false;
    w.x = tx; w.y = ty;
    spawnCareer(tx, ty); spawnWallBases(tx, ty); createMine(tx, ty);
    Object.assign(w, {
      job: null, state: 'idle', path: [], pi: 0, prog: 0, carry: 0,
      homeX: tx, homeY: ty, flee: false
    });
    msg('新营地建成，工人留在当前营地。');
    return;
  }

  if (type === 'mine') {
    c.lock = false; c.mine.worker = w.id;
    Object.assign(w, {
      x: tx, y: ty, state: 'mining', job: null, path: [], pi: 0, prog: 0, carry: 0
    });
    msg('工人开始采矿。');
    return;
  }

  w.carry = 0;
  let p = homePath(w);
  if (!p) return home(w);
  w.job = { type: 'return' }; w.path = p; w.pi = 1; w.state = 'return'; w.prog = 0;
}

// 工人回到家
function home(w) {
  Object.assign(w, {
    job: null, state: 'idle', path: [], pi: 0, prog: 0, carry: 0, flee: false
  });
}

// ============================================================
// 流民返程与转职
// ============================================================
function updateRefs(dt) {
  for (let r of refs) {
    if (r.lost) continue;

    if (!r.path || r.pi >= r.path.length) {
      pop.push({ x: r.x, y: r.y }); r.done = true;
      let c = cell(r.ox, r.oy); if (c) c.lock = false;
      msg('流民抵达安全点，等待转职。');
      continue;
    }

    let g = r.path[r.pi], d = dist(r, g);
    if (d > .05) {
      let sp = night() && !safe(r.x, r.y) ? 1.15 : 1.75;
      r.x += (g.x - r.x) / d * sp * dt;
      r.y += (g.y - r.y) / d * sp * dt;
    } else { r.x = g.x; r.y = g.y; r.pi++; }
  }
  refs = refs.filter(r => !r.done && !r.lost);
}

// ============================================================
// 弓箭手系统（瞄准 → 射击 → 冷却）
// ============================================================
function updateArchers(dt) {
  for (let a of archers) {
    // 冷却中
    if (a.state === 'cooldown') {
      a.shoot -= dt;
      if (a.shoot <= 0) { a.state = 'idle'; a.shoot = 0; }
      continue;
    }

    // 瞄准中
    if (a.state === 'aim') {
      a.aimProg += dt;
      // 检查目标是否还在射程内
      let tm = monsters.find(m => !m.dead && !m.returning && dist(a, m) < 5.5);
      if (!tm) { a.state = 'idle'; a.aimProg = 0; continue; }
      if (a.aimProg >= 0.6) {
        // 射击
        a.aimProg = 0;
        a.state = 'cooldown';
        a.shoot = 2.2;
        tm.hp = (tm.hp || 1) - 1;
        if (tm.hp <= 0) {
          tm.dead = true;
          msg('弓箭手射杀了一只黑林影。');
        } else {
          msg('弓箭手射中黑林影。');
        }
      }
      continue;
    }

    // 空闲：夜晚搜索射程内目标
    if (night() && a.state === 'idle') {
      let m = monsters.find(m => !m.dead && !m.returning && dist(a, m) < 5.5);
      if (m) { a.state = 'aim'; a.aimProg = 0; }
    }
  }
}

// ============================================================
// 黑影系统
// ============================================================
// 战术距离（切比雪夫距离，与地块网格一致）
function tacticalDist(a, b) {
  return Math.max(Math.abs(a.x - b.x), Math.abs(a.y - b.y));
}

// 是否在黑影战术感知范围内
function inTacticalRange(m, o, r = MONSTER_TACTICAL_RANGE) {
  return tacticalDist(m, o) <= r;
}

// 目标唯一标识（用于锁定判断）
function targetKey(ti) {
  if (!ti) return '';
  let o = ti.obj;
  if (ti.kind === 'stone' || ti.kind === 'wall' || ti.kind === 'camp') {
    return ti.kind + ':' + Math.round(o.x) + ',' + Math.round(o.y);
  }
  if (ti.kind === 'worker' || ti.kind === 'archer') {
    return ti.kind + ':' + o.id;
  }
  if (ti.kind === 'refugee') {
    return ti.kind + ':' + o.ox + ',' + o.oy;
  }
  if (ti.kind === 'player') return 'player';
  return ti.kind;
}

// 检查地图上是否存在围墙（工具函数，当前未用于刷怪判断）
function hasWall() {
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      let c = cell(x, y);
      if (c && c.t === T.WL && (c.hp || 0) > 0) return true;
    }
  return false;
}

function spawnMonsters() {
  if (!night()) return;
  if (nightSpawned >= MONSTERS_PER_NIGHT) return;
  if (monsters.length > 5) return;
  if (spawnCooldown > 0) return;

  // 收集所有黑雾口
  let fs = [];
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (cell(x, y).t === T.FOG) fs.push({ x, y });
  if (!fs.length) return;

  // 不在此处判断 safe()/hasWall()；黑影生成后由 raidCamp 驱动行军
  let f = fs[rnd(fs.length)];
  let raidCamp = nearestHome(f);
  monsters.push({
    x: f.x, y: f.y, hp: 1, atk: 0, returning: false,
    raidCamp, targetKey: null, targetLock: 0
  });
  nightSpawned++;
  spawnCooldown = 3;
}

// 局部战术目标选择（不再使用 safe() 过滤角色）
function findNearestTarget(m) {
  let R = MONSTER_TACTICAL_RANGE;

  // 扫描局部辉石
  let stones = [];
  for (let y = Math.floor(m.y - R); y <= Math.ceil(m.y + R); y++) {
    for (let x = Math.floor(m.x - R); x <= Math.ceil(m.x + R); x++) {
      let c = cell(x, y);
      if (c && c.t === T.S) stones.push({ kind: 'stone', obj: { x, y } });
    }
  }
  if (stones.length) stones.sort((a, b) => dist(m, a.obj) - dist(m, b.obj));

  // 扫描局部围墙
  let walls = [];
  for (let y = Math.floor(m.y - R); y <= Math.ceil(m.y + R); y++) {
    for (let x = Math.floor(m.x - R); x <= Math.ceil(m.x + R); x++) {
      let c = cell(x, y);
      if (c && c.t === T.WL && (c.hp || 0) > 0) walls.push({ kind: 'wall', obj: { x, y } });
    }
  }
  if (walls.length) walls.sort((a, b) => dist(m, a.obj) - dist(m, b.obj));

  // 扫描局部角色（不使用 safe()）
  let workerTargets = workers
    .filter(w => !w.lost && inTacticalRange(m, w))
    .sort((a, b) => dist(m, a) - dist(m, b))
    .map(w => ({ kind: 'worker', obj: w }));

  let archerTargets = archers
    .filter(a => inTacticalRange(m, a))
    .sort((a, b) => dist(m, a) - dist(m, b))
    .map(a => ({ kind: 'archer', obj: a }));

  let refugeeTargets = refs
    .filter(r => !r.lost && inTacticalRange(m, r))
    .sort((a, b) => dist(m, a) - dist(m, b))
    .map(r => ({ kind: 'refugee', obj: r }));

  let playerTarget = (pl.inv <= 0 && inTacticalRange(m, pl))
    ? [{ kind: 'player', obj: pl }] : [];

  // 如果 targetLock 未过期且原目标仍在候选内，继续锁定
  if (m.targetLock > 0 && m.targetKey) {
    let all = [...stones, ...walls, ...workerTargets, ...archerTargets, ...refugeeTargets, ...playerTarget];
    let locked = all.find(t => targetKey(t) === m.targetKey);
    if (locked) return locked;
  }

  // 优先级：辉石 > 围墙 > 工人 > 弓箭手 > 返程流民 > 主角
  for (let g of [stones, walls, workerTargets, archerTargets, refugeeTargets, playerTarget]) {
    if (g.length) return g[0];
  }

  // 无局部目标：向 raidCamp 行军
  if (!m.raidCamp) m.raidCamp = nearestHome(m);
  return { kind: 'camp', obj: m.raidCamp };
}

function updateMonsters(dt) {
  for (let m of monsters) {
    // 每帧减少 targetLock
    m.targetLock = Math.max(0, (m.targetLock || 0) - dt);

    // 已在返回黑雾口途中
    if (m.returning) {
      let f = nearestFog(m);
      if (!f) { m.dead = true; continue; }
      let d = dist(m, f);
      if (d < .35) { m.dead = true; continue; }
      m.x += (f.x - m.x) / d * 1.6 * dt;
      m.y += (f.y - m.y) / d * 1.6 * dt;
      continue;
    }

    let ti = findNearestTarget(m);

    // 无目标或白天结束：返回最近黑雾口
    if (!ti || !night()) {
      let f = nearestFog(m);
      if (f) { m.returning = true; m.atk = 0; }
      else { m.dead = true; }
      continue;
    }

    // 更新 targetKey 和 targetLock（非 camp 目标）
    if (ti.kind !== 'camp') {
      let k = targetKey(ti);
      if (k !== m.targetKey) {
        m.targetKey = k;
        m.targetLock = MONSTER_TARGET_LOCK;
      }
    }

    let t = ti.obj;
    let d = dist(m, t);

    // 战略行军：向 raidCamp 移动，不攻击营地本体
    if (ti.kind === 'camp') {
      if (d > .25) {
        m.x += (t.x - m.x) / d * 1.6 * dt;
        m.y += (t.y - m.y) / d * 1.6 * dt;
      }
      m.atk = 0;
      continue;
    }

    // 围墙攻击逻辑（仅来自局部扫描）
    if (ti.kind === 'wall') {
      if (d < .6) {
        m.atk += dt;
        if (m.atk >= 1.0) {
          m.atk = 0;
          let wc = cell(Math.round(t.x), Math.round(t.y));
          if (wc && wc.t === T.WL && wc.hp > 0) {
            wc.hp--;
            if (wc.hp <= 0) { blank(Math.round(t.x), Math.round(t.y)); msg('围墙被摧毁。'); }
            else { msg('围墙受损 ' + wc.hp + '/3。'); }
          }
        }
      } else {
        m.x += (t.x - m.x) / d * 1.6 * dt;
        m.y += (t.y - m.y) / d * 1.6 * dt;
        m.atk = 0;
      }
      continue;
    }

    // 追击角色/辉石目标
    if (d > .05) {
      m.x += (t.x - m.x) / d * 1.6 * dt;
      m.y += (t.y - m.y) / d * 1.6 * dt;
    }

    // 命中判定
    if (d < .35) {
      if (ti.kind === 'stone') {
        let sx = Math.round(t.x), sy = Math.round(t.y);
        let sc = cell(sx, sy);
        if (sc && sc.t === T.S) blank(sx, sy);
        msg('黑林影拾走了一枚辉石。');
        m.dead = true;
      } else if (ti.kind === 'player') {
        hitPlayer();
        m.dead = true;
      } else if (ti.kind === 'worker') {
        hitWorker(t.id);
        m.dead = true;
      } else if (ti.kind === 'refugee') {
        let idx = refs.indexOf(t);
        if (idx >= 0) hitRef(idx);
        m.dead = true;
      } else if (ti.kind === 'archer') {
        let idx = archers.indexOf(t);
        if (idx >= 0) {
          archers.splice(idx, 1);
          msg('一名弓箭手被黑林影拖走。');
        }
        m.dead = true;
      }
    }
  }
  monsters = monsters.filter(m => !m.dead);
}

// 找最近黑雾口（用于黑影返回）
function nearestFog(m) {
  let best = null, bd = 999;
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (cell(x, y).t === T.FOG) {
        let d = dist(m, { x, y });
        if (d < bd) { bd = d; best = { x, y }; }
      }
  return best;
}

function hitPlayer() {
  pl.inv = 1.6;
  if (stone > 0) { stone--; drop(pl.x, pl.y, 1); msg('你被袭击，掉落 1 个辉石。'); }
  else { over = true; msg('辉石耗尽，旅程中断。'); }
}

function hitWorker(id) {
  let w = workers.find(w => w.id === id);
  if (!w) return;
  release(w); w.lost = true;
  msg('一名工人被黑林影拖走。');
}

function hitRef(i) {
  let r = refs[i];
  if (!r) return;
  r.lost = true;
  let c = cell(r.ox, r.oy); if (c) c.lock = false;
  msg('流民在返程中失踪。');
}

// ============================================================
// 狐狸成亲奇遇
// ============================================================
function startFox(it, c) {
  if (foxEvent && foxEvent.active) return msg('婚仪正在进行。');
  foxes = [];
  for (let i = 0; i < 5; i++) foxes.push({ x: it.x - i * .8, y: it.y });
  foxEvent = { active: true, timer: 0, origin: { x: it.x, y: it.y }, fail: false };
  c.lock = true;
  msg('狐狸婚仪开始：跟随队伍，队伍停下时也要停下。');
}

function updateFox(dt) {
  if (!foxEvent?.active) return;
  foxEvent.timer += dt;

  let moving = foxEvent.timer % 4 < 2.8;
  for (let i = 0; i < foxes.length; i++) {
    let f = foxes[i];
    if (moving) f.x += dt * .75;
    f.y = foxEvent.origin.y + Math.sin((foxEvent.timer + i) * 2) * .08;
  }

  let lead = foxes[0];
  let pd = dist(pl, lead);
  let movingPlayer = Math.hypot(
    (keys.d || keys.ArrowRight ? 1 : 0) - (keys.a || keys.ArrowLeft ? 1 : 0),
    (keys.s || keys.ArrowDown  ? 1 : 0) - (keys.w || keys.ArrowUp   ? 1 : 0)
  ) > 0;

  if (pd > 3.2) foxEvent.fail = true;
  if (!moving && movingPlayer && pd < 3.5) foxEvent.fail = true;

  if (foxEvent.fail) { endFox(false); return; }
  if (foxEvent.timer > 13) endFox(true);
}

function endFox(ok) {
  let c = cell(Math.round(foxEvent.origin.x), Math.round(foxEvent.origin.y));
  if (c) { c.lock = false; c.t = T.G; }
  if (ok) { stone += 4; msg('你完成了狐狸婚仪，获得辉石 +4。'); }
  else msg('你扰乱了婚仪，狐狸队伍消失了。');
  foxEvent.active = false; foxes = [];
}

// ============================================================
// 绘制系统
// ============================================================
function draw() {
  bg();

  // 收集可见地块，按等距顺序排序
  let list = [];
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      let p = toScreen(x, y);
      if (p.x > -80 && p.x < cv.width + 80 && p.y > -80 && p.y < cv.height + 80)
        list.push({ x, y, o: x + y });
    }
  list.sort((a, b) => a.o - b.o);

  // 绘制地块
  list.forEach(p => drawTile(p.x, p.y));

  // 安全区与路径
  zones();
  paths();

  // 各单位
  refs.forEach(drawRef);
  pop.forEach(drawPop);
  workers.forEach(drawWorker);
  archers.forEach(drawArcher);
  foxes.forEach(drawFox);
  monsters.forEach(drawMonster);

  // 玩家与覆盖层
  drawPlayer();
  overlay();

  // 小地图（F3 可关闭）
  if (showMiniMap) mini();

  // HUD
  drawHud();
}

// 背景色
function bg() {
  ctx.fillStyle = night() ? '#071013' : phase() === 'dusk' ? '#17272a' : '#162d2e';
  ctx.fillRect(0, 0, cv.width, cv.height);
}

// 菱形地块绘制
function diamond(p, col, st) {
  let s = S * zoom;
  ctx.beginPath();
  ctx.moveTo(p.x,       p.y - s * .45);
  ctx.lineTo(p.x + s,   p.y);
  ctx.lineTo(p.x,       p.y + s * .45);
  ctx.lineTo(p.x - s,   p.y);
  ctx.closePath();
  ctx.fillStyle = col; ctx.fill();
  if (st) { ctx.strokeStyle = st; ctx.stroke(); }
}

// 绘制单个地块
function drawTile(x, y) {
  let c = cell(x, y), p = toScreen(x, y);

  if (!c.seen) { diamond(p, '#071010', 'rgba(255,255,255,.02)'); return; }

  let col = [
    '#183125', '#375b45', '#213f50', '#67462e', '#785535', '#5e6040', '#42583b',
    '#79bdb2', '#3b4239', '#6a5236', '#1a111f', '#3e244d', '#6a5330', '#4d5934',
    '#5a3b52', '#315b76', '#4b4b3e', '#7a7050', '#8a8a7e'
  ][c.t] || '#355945';

  diamond(p, col, hover && hover.x === x && hover.y === y ? '#fff1b8' : 'rgba(255,255,255,.05)');

  let z = zoom;

  // 可砍树（仅对有 job==='chop' 的树显示）
  if (c.t === T.F && c.job === 'chop')
    label(p.x, p.y - 20 * z, c.lock ? '砍树中' : '可砍树');

  // 辉石
  if (c.t === T.S) stoneDraw(p.x, p.y - 8 * z, c.val);

  // 各地块标签
  if (c.t === T.MN)  label(p.x, p.y - 24 * z, c.mine?.worker ? '采矿中' : '矿山');
  if (c.t === T.RF)  label(p.x, p.y - 24 * z, c.ref ? '流民火堆' : (c.refCd > 0 ? '冷却 ' + Math.ceil(c.refCd) + 's' : '空火堆'));
  if (c.t === T.HUT) label(p.x, p.y - 24 * z, '工棚');
  if (c.t === T.AR)  label(p.x, p.y - 24 * z, '弓箭营');
  if (c.t === T.INV && c.invertLabel) label(p.x, p.y - 24 * z, '颠倒森林');
  if (c.t === T.FOX) label(p.x, p.y - 24 * z, '狐狸成亲');
  if (c.t === T.FOG) label(p.x, p.y - 24 * z, '黑雾口');
  if (c.t === T.B)   label(p.x, p.y - 24 * z, c.lock ? '修桥中' : '断桥');
  if (c.t === T.C)   label(p.x, p.y - 24 * z, '营地');
  if (c.t === T.FS)  label(p.x, p.y - 24 * z, c.lock ? '点亮中' : '旧火塘');
  if (c.t === T.V)   label(p.x, p.y - 24 * z, '部落');
  if (c.t === T.GO)  label(p.x, p.y - 24 * z, '远方信标');
  if (c.t === T.WB)  label(p.x, p.y - 24 * z, '墙基');
  if (c.t === T.WL)  label(p.x, p.y - 24 * z, '围墙 ' + (c.hp || 0) + '/3');

  // 当前互动提示
  if (hover && hover.x === x && hover.y === y)
    label(p.x, p.y - 44 * z, hover.label);
}

// 文字标签（F2 可关闭）
function label(x, y, t) {
  if (!showLabels) return;
  ctx.font = '12px system-ui';
  let w = ctx.measureText(t).width + 12;
  ctx.fillStyle = 'rgba(7,15,17,.78)';
  ctx.beginPath(); ctx.roundRect(x - w / 2, y - 14, w, 22, 10); ctx.fill();
  ctx.fillStyle = '#eaf3ef'; ctx.textAlign = 'center';
  ctx.fillText(t, x, y + 2);
}

// 辉石绘制
function stoneDraw(x, y, v) {
  ctx.fillStyle = '#98d6ca';
  ctx.beginPath(); ctx.arc(x, y, 6, 0, 7); ctx.fill();
  if (v > 1) { ctx.beginPath(); ctx.arc(x + 8, y + 4, 5, 0, 7); ctx.fill(); }
}

// 安全区范围
function zones() {
  for (let h of [START, ...camps()]) {
    let p = toScreen(h.x, h.y);
    ctx.fillStyle = 'rgba(255,180,82,.14)';
    ctx.beginPath(); ctx.ellipse(p.x, p.y, 95 * zoom, 55 * zoom, 0, 0, 7); ctx.fill();
  }
}

// 单位路径线
function paths() {
  ctx.strokeStyle = 'rgba(255,241,184,.22)'; ctx.lineWidth = 2;
  for (let u of [...workers, ...refs]) {
    if (!u.path || u.pi >= u.path.length) continue;
    ctx.beginPath();
    let p = toScreen(u.x, u.y); ctx.moveTo(p.x, p.y);
    for (let i = u.pi; i < u.path.length; i++) {
      p = toScreen(u.path[i].x, u.path[i].y); ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
}

// 通用单位绘制
function drawUnit(u, col, txt) {
  if (u.lost) return;
  let p = toScreen(u.x, u.y);
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(p.x, p.y - 15, 6, 0, 7); ctx.fill();
  ctx.fillRect(p.x - 5, p.y - 9, 10, 13);
  if (txt) label(p.x, p.y - 32, txt);
}

// 各角色绘制
function drawWorker(w) {
  let txt = '工人';
  if (w.state === 'mining') txt = '采矿 ' + Math.ceil(30 - w.prog);
  else if (w.state === 'moving') txt = '前往';
  else if (w.state === 'work')
    txt = (w.job?.type === 'chop' ? '砍树 ' :
           w.job?.type === 'repair' ? '修桥 ' :
           w.job?.type === 'wall' ? '建墙 ' :
           w.job?.type === 'camp' ? '点火 ' : '工作 ') + Math.ceil(4 - w.prog);
  else if (w.state === 'return') txt = w.flee ? '撤退' : '返回';
  drawUnit(w, '#d5c59c', txt);
}
function drawArcher(a) {
  let txt = '弓箭手';
  if (a.state === 'aim') txt = '瞄准';
  else if (a.state === 'cooldown') txt = '冷却 ' + Math.ceil(a.shoot);
  drawUnit(a, '#b8d7a4', txt);
}
function drawRef(r)     { drawUnit(r, '#f0d3aa', '流民返回'); }
function drawPop(p)     { drawUnit(p, '#caa06a', '未转职流民'); }
function drawFox(f)     { drawUnit(f, '#e49b55', '狐'); }
function drawMonster(m) { drawUnit(m, '#111', m.returning ? '返回' : '黑林影'); }

// 玩家绘制
function drawPlayer() {
  let p  = toScreen(pl.x, pl.y);
  let ap = toScreen(pl.x + pl.dir.x * .55, pl.y + pl.dir.y * .55);

  // 朝向箭头
  ctx.strokeStyle = '#fff1b8'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(p.x, p.y - 4); ctx.lineTo(ap.x, ap.y - 4); ctx.stroke();

  // 身体
  ctx.fillStyle = pl.inv > 0 ? '#fff' : '#f0cfa3';
  ctx.beginPath(); ctx.arc(p.x, p.y - 18, 7, 0, 7); ctx.fill();
  ctx.fillStyle = '#b66f48'; ctx.fillRect(p.x - 7, p.y - 11, 14, 18);

  // 颠倒森林标记
  if (pl.ctrlInv) label(p.x, p.y - 42, '方向反转');
}

// 昼夜覆盖层 / 游戏结束
function overlay() {
  ctx.fillStyle = 'rgba(2,8,18,' + (night() ? .42 : phase() === 'dusk' ? .2 : .05) + ')';
  ctx.fillRect(0, 0, cv.width, cv.height);

  if (over) {
    ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = '#fff1b8'; ctx.textAlign = 'center';
    ctx.font = 'bold 34px system-ui';
    ctx.fillText('旅程中断', cv.width / 2, cv.height / 2);
  }
}

// ============================================================
// 小地图
// ============================================================
function mini() {
  let s = 128, x0 = cv.width - s - 22, y0 = 18;

  ctx.fillStyle = 'rgba(7,16,17,.62)';
  ctx.beginPath(); ctx.roundRect(x0 - 8, y0 - 8, s + 16, s + 16, 12); ctx.fill();

  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      let c = cell(x, y);
      if (!c.seen) continue;
      ctx.fillStyle =
        c.t === T.W   ? '#315b76' :
        c.t === T.C   ? '#e59e54' :
        c.t === T.INV ? '#8e62aa' :
        c.t === T.FOX ? '#e49b55' :
        c.t === T.HUT ? '#c2a36a' :
        c.t === T.AR  ? '#9ab57d' :
        c.t === T.FOG ? '#7d4fa0' :
        c.t === T.S   ? '#b6eee4' :
        c.t === T.WB  ? '#9a8a60' :
        c.t === T.WL  ? '#b0b0a8' : '#496d54';
      ctx.fillRect(x0 + x / W * s, y0 + y / H * s, Math.ceil(s / W), Math.ceil(s / H));
    }

  // 玩家位置
  ctx.fillStyle = '#fff1b8';
  ctx.beginPath(); ctx.arc(x0 + pl.x / W * s, y0 + pl.y / H * s, 3, 0, 7); ctx.fill();
}

// ============================================================
// HUD
// ============================================================
function drawHud() {
  let idle  = workers.filter(w => !w.lost && w.state === 'idle').length;
  let alive = workers.filter(w => !w.lost).length;

  topHud.innerHTML = `第 ${day} 天 · ${phText()}${pl.ctrlInv ? ' · 颠倒森林' : ''}`;

  hud.innerHTML =
    `<h1>《看海去》GPT_DEMO gpt.11.7</h1>
    辉石：<b>${stone}</b>　玩家：<b>${safe(pl.x, pl.y) ? '安全圈内' : night() ? '危险' : '安全'}</b><br>
    工人：<b>${idle}/${alive}</b> 空闲　弓箭手：<b>${archers.length}</b>　未转职流民：<b>${pop.length}</b><br>
    返程流民：<b>${refs.length}</b>　怪物：<b>${monsters.length}</b>（本夜 <b>${nightSpawned}/${MONSTERS_PER_NIGHT}</b>）　狐狸奇遇：<b>${foxEvent?.active ? '进行中' : '未触发/已结束'}</b><br>
    当前互动：<b>${hover ? hover.label : '面前/附近无可互动目标；Space 可放置辉石'}</b><br>
    <span class="small">gpt.11.7：状态清理与夜晚刷怪修正。矿山占用释放 · 每晚固定 2 只 · 撤退工人不可派遣。<br>F2 开关文字标签 | F3 开关小地图（性能诊断）</span>`;
}

// ============================================================
// 输入与主循环
// ============================================================
addEventListener('keydown', e => {
  keys[e.key] = true;

  if (e.key === ' ')              { e.preventDefault(); interact(); }
  if (e.key.toLowerCase() === 'r') resetGame();

  // 性能诊断快捷键
  if (e.key === 'F2') { showLabels  = !showLabels;  msg(showLabels  ? '显示文字标签' : '隐藏文字标签'); }
  if (e.key === 'F3') { showMiniMap = !showMiniMap; msg(showMiniMap ? '显示小地图'   : '隐藏小地图');   }
});

addEventListener('keyup', e => keys[e.key] = false);

let last = performance.now(), fa = 0, fn = 0;

function loop(now) {
  let dt = Math.min(.05, (now - last) / 1000);
  last = now;
  fa += dt; fn++;
  if (fa > .5) { fpsEl.textContent = Math.round(fn / fa); fa = 0; fn = 0; }
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

resize();
resetGame();
requestAnimationFrame(loop);

})();
</script>
