<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>《看海去》GPT_DEMO gpt.8.1</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#081012;color:#eaf3ef;font:14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
canvas{display:block;width:100vw;height:100vh}
.panel,.help,.toast{position:fixed;background:rgba(7,16,17,.74);border:1px solid rgba(218,239,230,.16);border-radius:16px;padding:12px 14px;line-height:1.65;backdrop-filter:blur(8px)}
.panel{left:18px;top:16px;width:500px}.help{right:18px;bottom:16px;max-width:700px;color:#c8d7d1}.toast{left:50%;top:20px;transform:translateX(-50%);border-radius:999px;background:#edf8f1;color:#173033;font-weight:700;opacity:0;transition:.18s;pointer-events:none}.show{opacity:1}b{color:#fff1b8}h1{margin:0 0 6px;font-size:17px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="panel" id="panel"></div>
<div class="help"><b>PC操作</b>：WASD/方向键移动；<b>Space 互动</b>；R 重开。<br><b>gpt.8.1</b>：辉石触碰自动拾取；单颗掉落辉石10秒后消失；矿山每30秒产出1个辉石；已被派工的目标不能重复派工。</div>
<div class="toast" id="toast"></div>
<script>
(()=>{
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d'),panel=document.getElementById('panel'),toast=document.getElementById('toast');
const W=52,H=44,TW=68,TH=36,START={x:4,y:22},GOAL={x:47,y:22},DAY=92;
const T={GRASS:0,FOREST:1,WATER:2,BROKEN:3,BRIDGE:4,CAMP:5,VILLAGE:6,STONE:7,GOAL:8,ROCK:9,FIRE_SITE:10,MINE:11,FOG:12};
let map,player,workers,monsters,stones,gameTime,dayNo,keys,camera,hovered,ended,gameOver,toastTimer,frameStats={visible:0,total:W*H};
const rnd=n=>Math.floor(Math.random()*n),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),cell=(x,y)=>map[y]?.[x],key=(x,y)=>`${x},${y}`,tile=e=>({x:Math.round(e.x),y:Math.round(e.y)});
function say(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1600)}
function resize(){cvs.width=innerWidth;cvs.height=innerHeight}addEventListener('resize',resize);
function reset(){map=Array.from({length:H},()=>Array.from({length:W},()=>({t:T.FOREST,seen:false,job:null,val:0,life:null,lock:false,mine:null})));makeMap();player={x:START.x,y:START.y,sp:4.35,inv:0,flash:0};workers=[0,1,2,3].map(i=>({id:i+1,x:START.x,y:START.y-1+i,state:'idle',job:null,path:[],pi:0,prog:0,lost:false,scared:false,carry:0,mineTimer:0}));monsters=[];stones=5;gameTime=9;dayNo=1;keys={};camera={x:0,y:0};hovered=null;ended=false;gameOver=false;reveal();say('gpt.8.1：触碰拾取辉石；矿山30秒产出。')}
function makeMap(){let y=START.y,path=[];for(let x=START.x;x<=GOAL.x;x++){if(x>START.x+2&&x<GOAL.x-2)y=clamp(y+rnd(3)-1,7,H-8);path.push({x,y});open(x,y);open(x,y-1);open(x,y+1);if(x%5===0)open(x,y+(Math.random()<.5?2:-2))}for(let i=0;i<7;i++){const a=path[6+rnd(path.length-12)];let x=a.x,yy=a.y,dir=Math.random()<.5?-1:1;for(let n=0;n<5+rnd(9);n++){yy=clamp(yy+dir*(Math.random()<.7?1:0),4,H-5);x=clamp(x+rnd(3)-1,3,W-4);open(x,yy);open(x+1,yy)}}river(17+rnd(3));river(34+rnd(3));[8,18,28,38].forEach(idx=>{const p=path[Math.min(path.length-1,idx)],c=cell(p.x,p.y);if(c&&c.t===T.GRASS){c.t=T.FIRE_SITE;c.job='camp'}});placeFog(path,14,-5);placeFog(path,30,5);placeFog(path,42,-4);for(let i=0;i<45;i++){const x=6+rnd(W-12),yy=5+rnd(H-10),c=cell(x,yy);if(c.t===T.GRASS&&Math.random()<.55){c.t=T.FOREST;c.job='chop'}}for(let i=0;i<55;i++){const x=5+rnd(W-10),yy=4+rnd(H-8),c=cell(x,yy);if(c.t===T.FOREST&&Math.random()<.42){c.t=T.ROCK;c.job=null}}for(let i=0;i<38;i++){const x=5+rnd(W-10),yy=4+rnd(H-8),c=cell(x,yy);if(c.t===T.GRASS){c.t=T.STONE;c.val=2;c.life=null}}cell(START.x,START.y).t=T.VILLAGE;cell(GOAL.x,GOAL.y).t=T.GOAL}
function open(x,y){const c=cell(x,y);if(c){c.t=T.GRASS;c.job=null;c.val=0;c.life=null;c.lock=false;c.mine=null}}
function river(rx){for(let y=2;y<H-2;y++){const c=cell(rx,y);c.t=T.WATER;c.job=null;c.val=0}let by=START.y;for(let y=4;y<H-4;y++)if(cell(rx-1,y).t===T.GRASS&&cell(rx+1,y).t===T.GRASS){by=y;break}const c=cell(rx,by);c.t=T.BROKEN;c.job='repair'}
function placeFog(path,idx,off){const p=path[Math.min(path.length-1,idx)],x=clamp(p.x,3,W-4),y=clamp(p.y+off,4,H-5);for(let r=0;r<4;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){const c=cell(xx,yy);if(c&&c.t===T.GRASS){c.t=T.FOG;return}}}
function pass(x,y){const c=cell(x,y);return c&&[T.GRASS,T.BRIDGE,T.CAMP,T.VILLAGE,T.STONE,T.GOAL,T.FIRE_SITE,T.MINE,T.FOG].includes(c.t)}
function adjacent(x,y){return[{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p=>pass(p.x,p.y))}
function findPath(start,goal){const sx=Math.round(start.x),sy=Math.round(start.y),gx=Math.round(goal.x),gy=Math.round(goal.y);if(!pass(sx,sy)||!pass(gx,gy))return null;if(sx===gx&&sy===gy)return[{x:sx,y:sy}];const q=[{x:sx,y:sy}],pre=new Map([[key(sx,sy),null]]),dirs=[[1,0],[-1,0],[0,1],[0,-1]];for(let h=0;h<q.length;h++){const u=q[h];for(const [dx,dy] of dirs){const nx=u.x+dx,ny=u.y+dy,k=key(nx,ny);if(pre.has(k)||!pass(nx,ny))continue;pre.set(k,u);if(nx===gx&&ny===gy){const path=[{x:nx,y:ny}];let b=u;while(b){path.push({x:b.x,y:b.y});b=pre.get(key(b.x,b.y))}return path.reverse()}q.push({x:nx,y:ny})}}return null}
const iso=(x,y)=>({x:(x-y)*TW/2+cvs.width/2+camera.x,y:(x+y)*TH/2+70+camera.y});
function phase(){const p=(gameTime%DAY)/DAY;return p>.66||p<.08?'night':p>.52?'dusk':'day'}const isNight=()=>phase()==='night';
function update(dt){gameTime+=dt;if(gameTime>dayNo*DAY)dayNo++;player.inv=Math.max(0,player.inv-dt);player.flash=Math.max(0,player.flash-dt);if(!gameOver){move(dt);reveal();autoPickup();updateStoneLife(dt);hovered=findInteract(false);updateWorkers(dt);spawnMonsters();updateMonsters(dt)}const p=iso(player.x,player.y);camera.x+=(cvs.width/2-p.x)*.045;camera.y+=(cvs.height/2-p.y)*.045}
function move(dt){let dx=(keys.d||keys.ArrowRight?1:0)-(keys.a||keys.ArrowLeft?1:0),dy=(keys.s||keys.ArrowDown?1:0)-(keys.w||keys.ArrowUp?1:0);const l=Math.hypot(dx,dy)||1,nx=player.x+dx/l*player.sp*dt,ny=player.y+dy/l*player.sp*dt;if(pass(Math.round(nx),Math.round(player.y)))player.x=nx;if(pass(Math.round(player.x),Math.round(ny)))player.y=ny;player.x=clamp(player.x,0,W-1);player.y=clamp(player.y,0,H-1)}
function reveal(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(dist({x,y},player)<5.2||dist({x,y},START)<4)cell(x,y).seen=true}
function autoPickup(){let got=0;for(let y=Math.floor(player.y-1);y<=Math.ceil(player.y+1);y++)for(let x=Math.floor(player.x-1);x<=Math.ceil(player.x+1);x++){const c=cell(x,y);if(c&&c.t===T.STONE&&dist(player,{x,y})<.82){got+=c.val||1;open(x,y)}}if(got){stones+=got;say(got>1?`获得辉石 +${got}`:'获得辉石 +1')}}
function updateStoneLife(dt){for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=cell(x,y);if(c.t===T.STONE&&c.val===1&&c.life!=null){c.life-=dt;if(c.life<=0)open(x,y)}}}
function findInteract(verbose){const px=Math.round(player.x),py=Math.round(player.y),arr=[];for(let y=py-2;y<=py+2;y++)for(let x=px-2;x<=px+2;x++){const c=cell(x,y);if(!c||!c.seen||c.lock)continue;const d=dist(player,{x,y});if(d>1.65)continue;let pri=99,act=null,label='';if(c.t===T.GOAL){pri=1;act='goal';label='触碰蓝色信标'}else if(c.t===T.MINE){pri=2;act='mine';label=c.mine?.worker?'矿山已有工人':'派工采矿'}else if(c.job==='chop'){pri=3;act='chop';label='砍树 1'}else if(c.job==='repair'){pri=4;act='repair';label='修桥 2'}else if(c.t===T.FIRE_SITE){pri=5;act='camp';label='点亮旧火塘 2'}if(act)arr.push({x,y,d,pri,act,label})}arr.sort((a,b)=>a.pri-b.pri||a.d-b.d);if(!arr[0]&&verbose)say('附近没有可互动目标。');return arr[0]||null}
function interact(){if(gameOver)return;const it=findInteract(true);if(!it)return;const c=cell(it.x,it.y);if(it.act==='goal'){ended=true;say('抵达蓝色信标：远处传来像潮水一样的风。');return}if(it.act==='mine'){if(c.mine?.worker)return say('矿山已有工人驻扎。');const ch=bestWorker([{x:it.x,y:it.y}]);if(!ch)return say('没有可调度工人。');c.lock=true;Object.assign(ch.w,{job:{type:'mine',tx:it.x,ty:it.y},path:ch.path,pi:1,state:'moving',prog:0,carry:0,mineTimer:0});say(`工人 ${ch.w.id} 前往矿山。`);return}let cost=0,type=null,dests=[];if(it.act==='chop'){cost=1;type='chop';dests=adjacent(it.x,it.y)}if(it.act==='repair'){cost=2;type='repair';dests=adjacent(it.x,it.y)}if(it.act==='camp'){cost=2;type='camp';dests=[{x:it.x,y:it.y}]}if(stones<cost)return say('辉石不足。');if(!dests.length)return say('没有可抵达的工作位置。');const ch=bestWorker(dests);if(!ch)return say('没有可调度工人，或没有可通行路径。');stones-=cost;c.lock=true;Object.assign(ch.w,{job:{type,tx:it.x,ty:it.y},path:ch.path,pi:1,state:'moving',prog:0,carry:cost});say(`工人 ${ch.w.id} 携带 ${cost} 个辉石出发。`)}
function bestWorker(dests){let best=null;for(const w of workers){if(w.lost||!['idle','returning'].includes(w.state))continue;for(const d of dests){const p=findPath(tile(w),d);if(p&&(!best||p.length<best.path.length))best={w,path:p}}}return best}
function updateWorkers(dt){for(const w of workers){if(w.lost)continue;if(w.state==='mining'){mineWork(w,dt);continue}if(!w.job)continue;w.scared=isNight()&&!safe(w.x,w.y);if(w.state==='moving'||w.state==='returning')walk(w,dt);else if(w.state==='working'){w.prog+=dt*(w.scared?.35:1);if(w.prog>=4.2)finish(w)}}}
function walk(w,dt){if(!w.path||w.pi>=w.path.length){w.state==='returning'?arriveHome(w):w.state='working';return}const g=w.path[w.pi],d=Math.hypot(g.x-w.x,g.y-w.y);if(d>.05){const sp=w.scared?1.1:2.25;w.x+=(g.x-w.x)/d*sp*dt;w.y+=(g.y-w.y)/d*sp*dt}else{w.x=g.x;w.y=g.y;w.pi++;if(w.pi>=w.path.length)w.state==='returning'?arriveHome(w):w.state='working'}}
function finish(w){const tx=w.job.tx,ty=w.job.ty,type=w.job.type,c=cell(tx,ty);if(type==='chop'){open(tx,ty);say('树障被清开，工人开始返回。')}if(type==='repair'){c.t=T.BRIDGE;c.job=null;c.val=0;c.life=null;c.lock=false;say('断桥修复完成，工人开始返回。')}if(type==='camp'){c.t=T.CAMP;c.job=null;c.val=0;c.life=null;c.lock=false;say('旧火塘被点亮，矿山显现。');createMineNear(tx,ty)}if(type==='mine'){c.lock=false;c.mine=c.mine||{worker:null};c.mine.worker=w.id;w.x=tx;w.y=ty;w.state='mining';w.job=null;w.path=[];w.pi=0;w.carry=0;w.mineTimer=0;say(`工人 ${w.id} 开始采矿。`);return}w.carry=0;const hp=homePath(w);if(!hp)return arriveHome(w);w.job={type:'return'};w.path=hp;w.pi=1;w.state='returning';w.prog=0}
function createMineNear(x,y){for(let r=1;r<=3;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){const c=cell(xx,yy);if(c&&c.t===T.GRASS){c.t=T.MINE;c.mine={worker:null};return}}}
function mineWork(w,dt){const p=tile(w),c=cell(p.x,p.y);if(!c||c.t!==T.MINE){w.state='idle';return}w.mineTimer+=dt;if(w.mineTimer>=30){w.mineTimer=0;dropAt(w.x,w.y,1);say('矿山产出 1 个辉石。')}}
function homePath(w){const pts=[START];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.CAMP)pts.push({x,y});let best=null;for(const p of pts){const pp=findPath(tile(w),p);if(pp&&(!best||pp.length<best.length))best=pp}return best}
function arriveHome(w){Object.assign(w,{job:null,state:'idle',path:[],pi:0,prog:0,scared:false,carry:0});say(`工人 ${w.id} 已返回安全点。`)}
function safe(x,y){if(dist({x,y},START)<3.2)return true;for(let yy=clamp(Math.floor(y-4),0,H-1);yy<=clamp(Math.ceil(y+4),0,H-1);yy++)for(let xx=clamp(Math.floor(x-4),0,W-1);xx<=clamp(Math.ceil(x+4),0,W-1);xx++)if(cell(xx,yy).t===T.CAMP&&dist({x,y},{x:xx,y:yy})<3.1)return true;return false}
function droppedStones(){const a=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=cell(x,y);if(c.t===T.STONE&&c.val===1&&c.seen&&!safe(x,y))a.push({x,y})}return a}
function fogs(){const a=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.FOG)a.push({x,y});return a}
function spawnMonsters(){if(!isNight()||monsters.length>=5||Math.random()>.018)return;const targets=[];droppedStones().forEach(s=>targets.push({type:'stone',x:s.x,y:s.y}));workers.filter(w=>!w.lost&&w.state!=='mining'&&!safe(w.x,w.y)).forEach(w=>targets.push({type:'worker',id:w.id,x:w.x,y:w.y}));if(!ended&&!gameOver&&!safe(player.x,player.y)&&player.inv<=0)targets.push({type:'player',x:player.x,y:player.y});const fs=fogs();if(!targets.length||!fs.length)return;const src=fs[rnd(fs.length)],target=targets[rnd(targets.length)];monsters.push({x:src.x,y:src.y,src,target})}
function monsterTarget(m){if(m.target.type==='stone'){const c=cell(Math.round(m.target.x),Math.round(m.target.y));return c&&c.t===T.STONE&&c.val===1?{x:m.target.x,y:m.target.y}:null}if(m.target.type==='worker'){const w=workers.find(w=>w.id===m.target.id&&!w.lost&&!safe(w.x,w.y));return w?{x:w.x,y:w.y}:null}return !ended&&!gameOver&&!safe(player.x,player.y)&&player.inv<=0?{x:player.x,y:player.y}:null}
function updateMonsters(dt){for(const m of monsters){const g=monsterTarget(m);if(!g||!isNight()){m.dead=true;continue}const d=Math.hypot(g.x-m.x,g.y-m.y);if(d>.05){m.x+=(g.x-m.x)/d*1.65*dt;m.y+=(g.y-m.y)/d*1.65*dt}if(d<.35){if(m.target.type==='stone'){const c=cell(Math.round(g.x),Math.round(g.y));if(c&&c.t===T.STONE&&c.val===1){open(Math.round(g.x),Math.round(g.y));say('黑林影捡走了一颗散落辉石。')}m.dead=true}else if(m.target.type==='worker'){hitWorker(m.target.id);m.dead=true}else{hitPlayer();m.dead=true}}}monsters=monsters.filter(m=>!m.dead)}
function dropAt(x,y,count){const spots=[],cx=Math.round(x),cy=Math.round(y);for(let r=1;r<=3;r++){for(let yy=cy-r;yy<=cy+r;yy++)for(let xx=cx-r;xx<=cx+r;xx++){const c=cell(xx,yy);if(c&&c.t===T.GRASS&&c.seen&&dist({x:xx,y:yy},{x:cx,y:cy})>.6)spots.push({x:xx,y:yy})}if(spots.length>=count)break}for(let i=0;i<count&&spots.length;i++){const p=spots.splice(rnd(spots.length),1)[0],c=cell(p.x,p.y);c.t=T.STONE;c.val=1;c.life=10;c.job=null;c.lock=false}}
function hitPlayer(){if(player.inv>0||gameOver)return;player.inv=1.7;player.flash=.45;if(stones>0){const n=Math.min(stones,1+rnd(3));stones-=n;dropAt(player.x,player.y,n);say(`你被黑林影袭击，掉落 ${n} 个辉石。`)}else{gameOver=true;say('辉石耗尽，你被黑林影拖入森林。旅程中断。')}}
function hitWorker(id){const w=workers.find(w=>w.id===id&&!w.lost);if(!w)return;if(w.carry>0){dropAt(w.x,w.y,w.carry);say(`工人 ${w.id} 被袭击，任务辉石掉落。`);w.carry=0}else{w.lost=true;w.state='lost';say(`工人 ${w.id} 被黑林影拖入森林。`)}}
function draw(){bg();const cells=visibleCells();frameStats.visible=cells.length;cells.forEach(c=>drawTile(c.x,c.y));zones();paths();workers.forEach(drawWorker);monsters.forEach(drawMonster);drawPlayer();overlay();mini();hud()}
function visibleCells(){const a=[],m=120;for(let y=0;y<H;y++)for(let x=0;x<W;x++){const p=iso(x,y);if(p.x>-m&&p.x<cvs.width+m&&p.y>-m&&p.y<cvs.height+m)a.push({x,y,o:x+y})}return a.sort((a,b)=>a.o-b.o)}
function bg(){const g=ctx.createLinearGradient(0,0,0,cvs.height);g.addColorStop(0,isNight()?'#071012':phase()==='dusk'?'#18272a':'#162d2e');g.addColorStop(1,isNight()?'#0d1214':'#18241f');ctx.fillStyle=g;ctx.fillRect(0,0,cvs.width,cvs.height)}
function diamond(p,col,stroke){ctx.beginPath();ctx.moveTo(p.x,p.y-TH/2);ctx.lineTo(p.x+TW/2,p.y);ctx.lineTo(p.x,p.y+TH/2);ctx.lineTo(p.x-TW/2,p.y);ctx.closePath();ctx.fillStyle=col;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}}
function drawTile(x,y){const c=cell(x,y),p=iso(x,y);if(!c.seen)return diamond(p,'#101817','rgba(255,255,255,.025)');const cols=['#355945','#173226','#213f50','#67462e','#785535','#42583b','#5e6040','#42695d','#315b76','#26312d','#4b4b3e','#3b4239','#1a111f'];const hi=hovered&&hovered.x===x&&hovered.y===y;diamond(p,cols[c.t],hi?'rgba(255,245,180,.9)':'rgba(255,255,255,.055)');if(c.t===T.FOREST)drawTree(p.x,p.y-8,c.job,c.lock);if(c.t===T.ROCK)drawRock(p.x,p.y-6);if(c.t===T.STONE)drawStone(p.x,p.y-8,c.val||1,c.life);if(c.t===T.CAMP)drawCamp(p.x,p.y-3);if(c.t===T.FIRE_SITE)drawCampSite(p.x,p.y-3,c.lock);if(c.t===T.MINE)drawMine(p.x,p.y-6,c.mine,c.lock);if(c.t===T.FOG)drawFog(p.x,p.y-6);if(c.t===T.VILLAGE)drawVillage(p.x,p.y-4);if(c.t===T.BROKEN)label(p.x,p.y-30,c.lock?'修桥中':'修桥 2');if(c.t===T.GOAL)drawGoal(p.x,p.y-18);if(c.job==='chop')label(p.x,p.y-46,c.lock?'砍树中':'砍树 1');if(hi)label(p.x,p.y-62,hovered.label)}
function drawTree(x,y,job,lock){ctx.fillStyle='#14221d';ctx.fillRect(x-4,y+8,8,17);ctx.fillStyle=job?'#294b36':'#183125';ctx.beginPath();ctx.moveTo(x,y-30);ctx.lineTo(x+18,y+12);ctx.lineTo(x-18,y+12);ctx.closePath();ctx.fill();if(lock)label(x,y-50,'施工中')}
function drawRock(x,y){ctx.fillStyle='#4b5850';ctx.beginPath();ctx.ellipse(x,y+5,15,9,0,0,Math.PI*2);ctx.fill()}
function drawStone(x,y,val,life){ctx.fillStyle=life!=null?'#78bbb0':'#98d6ca';ctx.beginPath();ctx.arc(x-(val>=2?5:0),y,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ecfffb';ctx.beginPath();ctx.arc(x-(val>=2?7:2),y-3,2,0,Math.PI*2);ctx.fill();if(val>=2){ctx.fillStyle='#8ac8bd';ctx.beginPath();ctx.arc(x+7,y+4,6,0,Math.PI*2);ctx.fill()}}
function drawCamp(x,y){ctx.fillStyle='rgba(255,168,76,.9)';ctx.beginPath();ctx.arc(x,y,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff0a6';ctx.beginPath();ctx.arc(x,y-3,4,0,Math.PI*2);ctx.fill()}
function drawCampSite(x,y,lock){ctx.strokeStyle='#a8a07a';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(x,y,15,8,0,0,Math.PI*2);ctx.stroke();label(x,y-28,lock?'点亮中':'旧火塘 2')}
function drawMine(x,y,m,lock){ctx.fillStyle='#2a2d2b';ctx.beginPath();ctx.arc(x,y+4,16,Math.PI,0);ctx.fill();ctx.fillStyle='#54432f';ctx.fillRect(x-18,y,36,6);label(x,y-28,m?.worker?'采矿中':lock?'前往中':'矿山')}
function drawFog(x,y){ctx.fillStyle='rgba(18,4,28,.9)';ctx.beginPath();ctx.ellipse(x,y+4,18,13,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(113,75,150,.6)';ctx.beginPath();ctx.arc(x,y-6,8,0,Math.PI*2);ctx.fill();label(x,y-32,'黑雾口')}
function drawVillage(x,y){ctx.fillStyle='#624632';ctx.fillRect(x-16,y-10,32,20);ctx.fillStyle='#a17752';ctx.beginPath();ctx.moveTo(x-22,y-10);ctx.lineTo(x,y-29);ctx.lineTo(x+22,y-10);ctx.closePath();ctx.fill();label(x,y-42,'部落')}
function drawGoal(x,y){ctx.strokeStyle='#9de8ff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,y+24);ctx.lineTo(x,y-18);ctx.stroke();ctx.fillStyle='#85ddff';ctx.beginPath();ctx.arc(x,y-23,10,0,Math.PI*2);ctx.fill();label(x,y-48,'蓝色信标')}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function label(x,y,t){ctx.font='12px system-ui';const w=ctx.measureText(t).width+14;roundRect(x-w/2,y-13,w,23,11);ctx.fillStyle='rgba(7,15,17,.78)';ctx.fill();ctx.fillStyle='#eaf3ef';ctx.textAlign='center';ctx.fillText(t,x,y+3)}
function zones(){const z=[{x:START.x,y:START.y,r:3.2,c:'rgba(255,215,124,.16)'}];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.CAMP)z.push({x,y,r:3.1,c:'rgba(255,180,82,.18)'});for(const a of z){const p=iso(a.x,a.y);ctx.fillStyle=a.c;ctx.beginPath();ctx.ellipse(p.x,p.y,a.r*32,a.r*18,0,0,Math.PI*2);ctx.fill()}}
function paths(){ctx.save();ctx.strokeStyle='rgba(255,241,184,.22)';ctx.lineWidth=2;for(const w of workers){if(!w.path||w.pi>=w.path.length)continue;ctx.beginPath();let p=iso(w.x,w.y);ctx.moveTo(p.x,p.y-6);for(let i=w.pi;i<w.path.length;i++){p=iso(w.path[i].x,w.path[i].y);ctx.lineTo(p.x,p.y-6)}ctx.stroke()}ctx.restore()}
function drawPlayer(){const p=iso(player.x,player.y),f=player.flash>0&&Math.floor(player.flash*20)%2===0;ctx.fillStyle=f?'#fff':'#f0cfa3';ctx.beginPath();ctx.arc(p.x,p.y-26,7,0,Math.PI*2);ctx.fill();ctx.fillStyle=f?'#eee':'#b66f48';ctx.fillRect(p.x-7,p.y-20,14,20);if(player.inv>0)label(p.x,p.y-48,'受击')}
function drawWorker(w){if(w.lost)return;const p=iso(w.x,w.y);ctx.fillStyle=w.scared?'#ffd0d0':'#d5c59c';ctx.beginPath();ctx.arc(p.x,p.y-20,6,0,Math.PI*2);ctx.fill();ctx.fillStyle=w.state==='mining'?'#8a7550':w.scared?'#823f3f':'#66704e';ctx.fillRect(p.x-6,p.y-14,12,15);if(w.state==='moving')label(p.x,p.y-38,'前往');if(w.state==='working')label(p.x,p.y-36,Math.ceil(4.2-w.prog));if(w.state==='returning')label(p.x,p.y-38,'返回');if(w.state==='mining')label(p.x,p.y-38,`采矿 ${Math.ceil(30-w.mineTimer)}`);if(w.carry>0)label(p.x,p.y-54,`辉石${w.carry}`)}
function drawMonster(m){const p=iso(m.x,m.y);ctx.fillStyle=m.target.type==='stone'?'rgba(20,20,0,.82)':m.target.type==='player'?'rgba(18,0,0,.82)':'rgba(0,0,0,.76)';ctx.beginPath();ctx.ellipse(p.x,p.y-8,19,12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#dff4ff';ctx.fillRect(p.x-6,p.y-13,3,3);ctx.fillRect(p.x+4,p.y-13,3,3)}
function overlay(){ctx.fillStyle=`rgba(2,8,18,${isNight()?.42:phase()==='dusk'?.2:.05})`;ctx.fillRect(0,0,cvs.width,cvs.height);if(gameOver){ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,0,cvs.width,cvs.height);ctx.fillStyle='#fff1b8';ctx.textAlign='center';ctx.font='bold 34px system-ui';ctx.fillText('旅程中断',cvs.width/2,cvs.height/2-14);ctx.fillStyle='#d9e8df';ctx.font='16px system-ui';ctx.fillText('辉石耗尽，你被黑林影拖入森林。按 R 重新开始。',cvs.width/2,cvs.height/2+22)}}
function mini(){const s=128,x0=cvs.width-s-22,y0=18;ctx.fillStyle='rgba(7,16,17,.62)';roundRect(x0-8,y0-8,s+16,s+16,12);ctx.fill();for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=cell(x,y);if(!c.seen)continue;ctx.fillStyle=c.t===T.WATER?'#315b76':c.t===T.CAMP?'#e59e54':c.t===T.FIRE_SITE?'#aaa172':c.t===T.MINE?'#8a7550':c.t===T.FOG?'#7d4fa0':c.t===T.GOAL?'#8ee6ff':c.t===T.STONE?(c.val>=2?'#b6eee4':'#78bbb0'):'#496d54';ctx.fillRect(x0+x/W*s,y0+y/H*s,Math.ceil(s/W),Math.ceil(s/H))}ctx.fillStyle='#fff1b8';ctx.beginPath();ctx.arc(x0+player.x/W*s,y0+player.y/H*s,3,0,Math.PI*2);ctx.fill()}
function hud(){const idle=workers.filter(w=>!w.lost&&w.state==='idle').length,mov=workers.filter(w=>!w.lost&&w.state==='moving').length,ret=workers.filter(w=>!w.lost&&w.state==='returning').length,min=workers.filter(w=>!w.lost&&w.state==='mining').length,alive=workers.filter(w=>!w.lost).length,lost=workers.length-alive,ph=isNight()?'夜晚':phase()==='dusk'?'黄昏':'白天',ps=gameOver?'游戏结束':safe(player.x,player.y)?'安全圈内':isNight()?'危险':'安全';panel.innerHTML=`<h1>《看海去》GPT_DEMO gpt.8.1</h1>地图：<b>${W}×${H}</b>　本帧绘制：<b>${frameStats.visible}</b> / ${frameStats.total}<br>辉石：<b>${stones}</b>　玩家：<b>${ps}</b><br>工人：<b>${idle}/${alive}</b> 空闲　前往：<b>${mov}</b>　返回：<b>${ret}</b>　采矿：<b>${min}</b>　失踪：<b>${lost}</b><br>怪物源点：<b>${fogs().length}</b> 个黑雾口　怪物：<b>${monsters.length}</b><br>第 ${dayNo} 天 · ${ph}<br>当前互动：<b>${hovered?hovered.label:'附近无可互动目标'}</b><br>规则：触碰辉石自动拾取；掉落辉石10秒后消失；矿山30秒产出1个辉石。`}
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault();interact()}if(e.key.toLowerCase()==='r')reset()});addEventListener('keyup',e=>keys[e.key]=false);
let last=performance.now();function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}resize();reset();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
