<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>《看海去》GPT_DEMO gpt.5</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #081012; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #eaf3ef; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    .panel { position: fixed; left: 18px; top: 16px; width: 430px; padding: 14px 16px; border-radius: 16px; background: rgba(7, 16, 17, .76); border: 1px solid rgba(218, 239, 230, .16); box-shadow: 0 18px 46px rgba(0,0,0,.35); backdrop-filter: blur(8px); line-height: 1.65; font-size: 14px; }
    .panel h1 { margin: 0 0 6px; font-size: 17px; letter-spacing: .04em; }
    .panel b { color: #fff1b8; }
    .panel .small { color: #b9cdc5; font-size: 12px; }
    .help { position: fixed; right: 18px; bottom: 16px; max-width: 570px; padding: 12px 14px; border-radius: 16px; background: rgba(7, 16, 17, .66); border: 1px solid rgba(218,239,230,.14); color: #c8d7d1; font-size: 13px; line-height: 1.65; }
    .toast { position: fixed; left: 50%; transform: translateX(-50%); top: 20px; padding: 10px 16px; border-radius: 999px; background: rgba(237, 248, 241, .94); color: #173033; font-weight: 700; opacity: 0; transition: opacity .18s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div class="panel" id="panel"></div>
<div class="help">
  <b>操作</b>：WASD / 方向键移动；鼠标点击带标签的树障、断桥或空地派工；Space 投掷辉石临时光圈；R 重新生成。<br>
  <b>gpt.5 调整</b>：返回中的工人也会参与“到任务目标的路径距离”计算；如果他最近，会中断返回并改去执行新任务。
</div>
<div class="toast" id="toast"></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const panel = document.getElementById('panel');
  const toast = document.getElementById('toast');

  const W = 52, H = 44, TW = 68, TH = 36;
  const START = { x: 4, y: 22 }, GOAL = { x: 47, y: 22 };
  const DAY = 92;
  const T = { GRASS: 0, FOREST: 1, WATER: 2, BROKEN: 3, BRIDGE: 4, CAMP: 5, VILLAGE: 6, STONE: 7, GOAL: 8, ROCK: 9 };

  let map, player, workers, shades, pulses, stones, dayTime, dayNo, keys, mouseTile, camera, ended, gameOver, toastTimer;
  let frameStats = { visible: 0, total: W * H };

  function rnd(n) { return Math.floor(Math.random() * n); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function distance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  function keyOf(x, y) { return `${x},${y}`; }
  function tileOf(e) { return { x: Math.round(e.x), y: Math.round(e.y) }; }
  function say(t) { toast.textContent = t; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1900); }

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  window.addEventListener('resize', resize);

  function reset() {
    map = makeMap();
    player = { x: START.x, y: START.y, speed: 4.35, invuln: 0, hitFlash: 0 };
    workers = [0, 1, 2, 3].map(i => ({ id: i + 1, x: START.x, y: START.y - 1 + i, state: 'idle', job: null, path: [], pathIndex: 0, progress: 0, lost: false, scared: false }));
    shades = [];
    pulses = [];
    stones = 5;
    dayTime = 9;
    dayNo = 1;
    keys = {};
    mouseTile = null;
    camera = { x: 0, y: 0 };
    ended = false;
    gameOver = false;
    reveal();
    say('gpt.5：返回中的工人也可以被重新派往最近任务。');
  }

  function makeMap() {
    const m = Array.from({ length: H }, () => Array.from({ length: W }, () => ({ t: T.FOREST, seen: false, job: null })));
    let y = START.y;
    const mainPath = [];
    for (let x = START.x; x <= GOAL.x; x++) {
      if (x > START.x + 2 && x < GOAL.x - 2) y = clamp(y + rnd(3) - 1, 7, H - 8);
      mainPath.push({x, y});
      open(m, x, y); open(m, x, y - 1); open(m, x, y + 1);
      if (x % 5 === 0) open(m, x, y + (Math.random() < .5 ? 2 : -2));
    }

    for (let i = 0; i < 7; i++) {
      const anchor = mainPath[6 + rnd(mainPath.length - 12)];
      let x = anchor.x, yy = anchor.y;
      const len = 5 + rnd(9);
      const dir = Math.random() < .5 ? -1 : 1;
      for (let step = 0; step < len; step++) {
        yy = clamp(yy + dir * (Math.random() < .7 ? 1 : 0), 4, H - 5);
        x = clamp(x + rnd(3) - 1, 3, W - 4);
        open(m, x, yy); open(m, x + 1, yy);
      }
    }

    makeRiver(m, 17 + rnd(3));
    makeRiver(m, 34 + rnd(3));

    for (let i = 0; i < 45; i++) {
      const x = 6 + rnd(W - 12), yy = 5 + rnd(H - 10);
      if (m[yy][x].t === T.GRASS && Math.random() < .55) { m[yy][x].t = T.FOREST; m[yy][x].job = 'chop'; }
    }

    for (let i = 0; i < 55; i++) {
      const x = 5 + rnd(W - 10), yy = 4 + rnd(H - 8);
      if (m[yy][x].t === T.FOREST && Math.random() < .42) m[yy][x].t = T.ROCK;
    }

    for (let i = 0; i < 38; i++) {
      const x = 5 + rnd(W - 10), yy = 4 + rnd(H - 8);
      if (m[yy][x].t === T.GRASS) m[yy][x].t = T.STONE;
    }

    m[START.y][START.x].t = T.VILLAGE;
    m[GOAL.y][GOAL.x].t = T.GOAL;
    return m;
  }

  function makeRiver(m, riverX) {
    for (let yy = 2; yy < H - 2; yy++) {
      m[yy][riverX].t = T.WATER; m[yy][riverX].job = null;
    }
    let bridgeY = START.y;
    for (let yy = 4; yy < H - 4; yy++) {
      if (m[yy][riverX - 1].t === T.GRASS && m[yy][riverX + 1].t === T.GRASS) { bridgeY = yy; break; }
    }
    m[bridgeY][riverX].t = T.BROKEN; m[bridgeY][riverX].job = 'repair';
  }

  function open(m, x, y) { if (m[y] && m[y][x]) { m[y][x].t = T.GRASS; m[y][x].job = null; } }
  function passable(x, y) { const c = map[y]?.[x]; return c && [T.GRASS, T.BRIDGE, T.CAMP, T.VILLAGE, T.STONE, T.GOAL].includes(c.t); }
  function workAdjacentTiles(x, y) {
    return [{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p => passable(p.x, p.y));
  }

  function findPath(start, goal) {
    const sx = Math.round(start.x), sy = Math.round(start.y), gx = Math.round(goal.x), gy = Math.round(goal.y);
    if (!passable(sx, sy) || !passable(gx, gy)) return null;
    if (sx === gx && sy === gy) return [{x:sx, y:sy}];
    const q = [{x:sx, y:sy}];
    const came = new Map();
    came.set(keyOf(sx, sy), null);
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (let head = 0; head < q.length; head++) {
      const cur = q[head];
      for (const [dx, dy] of dirs) {
        const nx = cur.x + dx, ny = cur.y + dy;
        const k = keyOf(nx, ny);
        if (came.has(k) || !passable(nx, ny)) continue;
        came.set(k, cur);
        if (nx === gx && ny === gy) {
          const path = [{x:nx, y:ny}];
          let back = cur;
          while (back) { path.push({x:back.x, y:back.y}); back = came.get(keyOf(back.x, back.y)); }
          return path.reverse();
        }
        q.push({x:nx, y:ny});
      }
    }
    return null;
  }

  function iso(x, y) { return { x: (x - y) * TW / 2 + canvas.width / 2 + camera.x, y: (x + y) * TH / 2 + 70 + camera.y }; }
  function fromScreen(sx, sy) {
    const x0 = sx - canvas.width / 2 - camera.x, y0 = sy - 70 - camera.y;
    return { x: Math.floor((y0 / (TH / 2) + x0 / (TW / 2)) / 2), y: Math.floor((y0 / (TH / 2) - x0 / (TW / 2)) / 2) };
  }

  function phase() { const p = (dayTime % DAY) / DAY; return p > .66 || p < .08 ? 'night' : p > .52 ? 'dusk' : 'day'; }
  function night() { return phase() === 'night'; }

  function update(dt) {
    dayTime += dt;
    if (dayTime > dayNo * DAY) dayNo++;
    player.invuln = Math.max(0, player.invuln - dt);
    player.hitFlash = Math.max(0, player.hitFlash - dt);
    if (!gameOver) {
      movePlayer(dt);
      collectAndGoal();
      reveal();
      updateWorkers(dt);
      spawnShades();
      updateShades(dt);
    }
    pulses.forEach(p => p.life -= dt);
    pulses = pulses.filter(p => p.life > 0);
    const p = iso(player.x, player.y);
    camera.x += (canvas.width / 2 - p.x) * .045;
    camera.y += (canvas.height / 2 - p.y) * .045;
  }

  function movePlayer(dt) {
    let dx = 0, dy = 0;
    if (keys.w || keys.ArrowUp) dy--; if (keys.s || keys.ArrowDown) dy++;
    if (keys.a || keys.ArrowLeft) dx--; if (keys.d || keys.ArrowRight) dx++;
    const l = Math.hypot(dx, dy) || 1;
    const nx = player.x + dx / l * player.speed * dt, ny = player.y + dy / l * player.speed * dt;
    if (passable(Math.round(nx), Math.round(player.y))) player.x = nx;
    if (passable(Math.round(player.x), Math.round(ny))) player.y = ny;
    player.x = clamp(player.x, 0, W - 1); player.y = clamp(player.y, 0, H - 1);
  }

  function collectAndGoal() {
    const c = map[Math.round(player.y)]?.[Math.round(player.x)];
    if (!c) return;
    if (c.t === T.STONE) { c.t = T.GRASS; stones += 2; say('获得辉石 +2'); }
    if (c.t === T.GOAL && !ended) { ended = true; say('抵达蓝色信标：远处传来像潮水一样的风。'); }
  }

  function reveal() {
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      if (distance({x,y}, player) < 5.2 || distance({x,y}, START) < 4) map[y][x].seen = true;
    }
  }

  function clickTile(x, y) {
    if (gameOver) return;
    const c = map[y]?.[x]; if (!c) return;
    let cost = 0, jobType = null, workTargets = [];
    if (c.job === 'chop') { cost = 1; jobType = 'chop'; workTargets = workAdjacentTiles(x, y); }
    else if (c.job === 'repair') { cost = 2; jobType = 'repair'; workTargets = workAdjacentTiles(x, y); }
    else if (c.t === T.GRASS && c.seen) { cost = 2; jobType = 'camp'; workTargets = [{x, y}]; }
    else return say('这里暂时不能派工。');
    if (stones < cost) return say('辉石不足。');
    if (!workTargets.length) return say('没有可抵达的工作位置，需要先开路。');

    const choice = chooseBestWorker(workTargets);
    if (!choice) return say('没有可调度工人，或没有可通行路径。');
    stones -= cost;
    choice.worker.job = { type: jobType, targetX: x, targetY: y, workX: choice.dest.x, workY: choice.dest.y };
    choice.worker.path = choice.path;
    choice.worker.pathIndex = 1;
    choice.worker.state = 'moving';
    choice.worker.progress = 0;
    say(`工人 ${choice.worker.id} 路径最近，已出发。`);
  }

  function chooseBestWorker(destinations) {
    let best = null;
    for (const w of workers) {
      if (w.lost || !['idle', 'returning'].includes(w.state)) continue;
      const start = tileOf(w);
      for (const dest of destinations) {
        const path = findPath(start, dest);
        if (!path) continue;
        if (!best || path.length < best.path.length) best = { worker: w, dest, path };
      }
    }
    return best;
  }

  function updateWorkers(dt) {
    for (const w of workers) {
      if (w.lost || !w.job) continue;
      w.scared = night() && !safe(w.x, w.y);
      if (w.state === 'moving' || w.state === 'returning') moveWorkerAlongPath(w, dt);
      else if (w.state === 'working') {
        w.progress += dt * (w.scared ? .35 : 1);
        if (w.progress >= 4.2) finish(w);
      }
    }
  }

  function moveWorkerAlongPath(w, dt) {
    if (!w.path || w.pathIndex >= w.path.length) {
      if (w.state === 'returning') arriveHome(w);
      else w.state = 'working';
      return;
    }
    const target = w.path[w.pathIndex];
    const d = Math.hypot(target.x - w.x, target.y - w.y);
    if (d > .05) {
      const sp = w.scared ? 1.1 : 2.25;
      w.x += (target.x - w.x) / d * sp * dt;
      w.y += (target.y - w.y) / d * sp * dt;
    } else {
      w.x = target.x; w.y = target.y; w.pathIndex++;
      if (w.pathIndex >= w.path.length) {
        if (w.state === 'returning') arriveHome(w);
        else w.state = 'working';
      }
    }
  }

  function finish(w) {
    const c = map[w.job.targetY][w.job.targetX];
    if (w.job.type === 'chop') { c.t = T.GRASS; c.job = null; say('树障被清开，工人开始返回营火。'); }
    if (w.job.type === 'repair') { c.t = T.BRIDGE; c.job = null; say('断桥修复完成，工人开始返回营火。'); }
    if (w.job.type === 'camp') { c.t = T.CAMP; say('营火点亮，工人返回最近安全点。'); }
    const homePath = findNearestSafePath(w);
    if (!homePath) {
      w.job = null; w.state = 'idle'; w.path = []; w.pathIndex = 0; w.progress = 0; w.scared = false;
      say(`工人 ${w.id} 找不到返回路径，暂时原地待命。`);
      return;
    }
    w.job = { type: 'return' };
    w.path = homePath;
    w.pathIndex = 1;
    w.state = 'returning';
    w.progress = 0;
  }

  function findNearestSafePath(w) {
    const start = tileOf(w);
    const points = [{ x: START.x, y: START.y }];
    for (let yy = 0; yy < H; yy++) for (let xx = 0; xx < W; xx++) {
      if (map[yy][xx].t === T.CAMP) points.push({ x: xx, y: yy });
    }
    let best = null;
    for (const p of points) {
      const path = findPath(start, p);
      if (path && (!best || path.length < best.length)) best = path;
    }
    return best;
  }

  function arriveHome(w) {
    w.job = null; w.state = 'idle'; w.path = []; w.pathIndex = 0; w.progress = 0; w.scared = false;
    say(`工人 ${w.id} 已返回安全点。`);
  }

  function safe(x, y) {
    if (distance({x,y}, START) < 3.2) return true;
    const minX = clamp(Math.floor(x - 4), 0, W - 1), maxX = clamp(Math.ceil(x + 4), 0, W - 1);
    const minY = clamp(Math.floor(y - 4), 0, H - 1), maxY = clamp(Math.ceil(y + 4), 0, H - 1);
    for (let yy = minY; yy <= maxY; yy++) for (let xx = minX; xx <= maxX; xx++) {
      if (map[yy][xx].t === T.CAMP && distance({x,y}, {x:xx,y:yy}) < 3.1) return true;
    }
    return pulses.some(p => distance({x,y}, p) < 2.5);
  }

  function throwStone() {
    if (gameOver) return;
    if (stones <= 0) return say('辉石不足，无法投掷。');
    stones--; pulses.push({ x: player.x, y: player.y, life: 12 }); say('辉石光圈展开，黑林影无法进入。');
  }

  function spawnShades() {
    if (!night() || shades.length >= 5 || Math.random() > .014) return;
    const targets = [];
    workers.filter(w => !w.lost && !safe(w.x, w.y)).forEach(w => targets.push({ type: 'worker', id: w.id, x: w.x, y: w.y }));
    if (!ended && !gameOver && !safe(player.x, player.y) && player.invuln <= 0) targets.push({ type: 'player', id: 0, x: player.x, y: player.y });
    if (!targets.length) return;
    const t = targets[rnd(targets.length)];
    shades.push({ x: t.x + (Math.random() < .5 ? -5 : 5), y: t.y + rnd(7) - 3, targetType: t.type, target: t.id });
  }

  function updateShades(dt) {
    for (const s of shades) {
      const target = getShadeTarget(s);
      if (!target || !night()) { s.dead = true; continue; }
      const d = Math.hypot(target.x - s.x, target.y - s.y);
      if (d > .05) { s.x += (target.x - s.x) / d * 1.65 * dt; s.y += (target.y - s.y) / d * 1.65 * dt; }
      if (d < .32) {
        if (s.targetType === 'worker') {
          const w = workers.find(w => w.id === s.target && !w.lost);
          if (w) { w.lost = true; w.state = 'lost'; say(`工人 ${w.id} 被黑林影拖入森林。`); }
        } else {
          hitPlayer();
        }
        s.dead = true;
      }
    }
    shades = shades.filter(s => !s.dead);
  }

  function getShadeTarget(s) {
    if (s.targetType === 'worker') {
      const w = workers.find(w => w.id === s.target && !w.lost && !safe(w.x, w.y));
      return w ? { x: w.x, y: w.y } : null;
    }
    if (!ended && !gameOver && !safe(player.x, player.y) && player.invuln <= 0) return { x: player.x, y: player.y };
    return null;
  }

  function hitPlayer() {
    if (player.invuln > 0 || gameOver) return;
    player.invuln = 1.7;
    player.hitFlash = .45;
    if (stones > 0) {
      const lost = Math.min(stones, 1 + rnd(3));
      stones -= lost;
      dropStonesNearPlayer(lost);
      say(`你被黑林影袭击，掉落 ${lost} 个辉石！`);
    } else {
      gameOver = true;
      say('辉石耗尽，你被黑林影拖入森林。旅程中断。');
    }
  }

  function dropStonesNearPlayer(count) {
    const cx = Math.round(player.x), cy = Math.round(player.y);
    const cells = [];
    for (let r = 1; r <= 3; r++) {
      for (let yy = cy - r; yy <= cy + r; yy++) for (let xx = cx - r; xx <= cx + r; xx++) {
        const c = map[yy]?.[xx];
        if (c && c.t === T.GRASS && c.seen) cells.push({x: xx, y: yy});
      }
      if (cells.length >= count) break;
    }
    for (let i = 0; i < count && cells.length; i++) {
      const idx = rnd(cells.length);
      const p = cells.splice(idx, 1)[0];
      map[p.y][p.x].t = T.STONE;
    }
  }

  function draw() {
    drawBackground();
    const cells = visibleCells();
    frameStats.visible = cells.length;
    for (const c of cells) drawTile(c.x, c.y);
    drawZones();
    drawWorkerPaths();
    workers.forEach(drawWorker);
    shades.forEach(drawShade);
    drawPlayer();
    drawOverlay();
    drawMiniMap();
    drawPanel();
  }

  function visibleCells() {
    const cells = [];
    const margin = 120;
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const p = iso(x, y);
      if (p.x < -margin || p.x > canvas.width + margin || p.y < -margin || p.y > canvas.height + margin) continue;
      cells.push({x, y, order: x + y});
    }
    cells.sort((a,b) => a.order - b.order);
    return cells;
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0, night() ? '#071012' : phase()==='dusk' ? '#18272a' : '#162d2e');
    g.addColorStop(1, night() ? '#0d1214' : '#18241f');
    ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  function diamond(p, color, stroke) {
    ctx.beginPath(); ctx.moveTo(p.x, p.y - TH/2); ctx.lineTo(p.x + TW/2, p.y); ctx.lineTo(p.x, p.y + TH/2); ctx.lineTo(p.x - TW/2, p.y); ctx.closePath();
    ctx.fillStyle = color; ctx.fill(); if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
  }
  function drawTile(x, y) {
    const c = map[y][x], p = iso(x,y);
    if (!c.seen) { diamond(p, '#101817', 'rgba(255,255,255,.025)'); return; }
    const colors = ['#355945','#173226','#213f50','#67462e','#785535','#42583b','#5e6040','#42695d','#315b76','#26312d'];
    diamond(p, colors[c.t], mouseTile && mouseTile.x===x && mouseTile.y===y ? 'rgba(255,245,180,.8)' : 'rgba(255,255,255,.055)');
    if (c.t === T.FOREST) drawTree(p.x, p.y - 8, !!c.job);
    if (c.t === T.ROCK) drawRock(p.x, p.y - 6);
    if (c.t === T.STONE) drawStone(p.x, p.y - 8);
    if (c.t === T.CAMP) drawCamp(p.x, p.y - 3);
    if (c.t === T.VILLAGE) drawVillage(p.x, p.y - 4);
    if (c.t === T.BROKEN) label(p.x, p.y - 30, '修桥 2');
    if (c.t === T.GOAL) drawGoal(p.x, p.y - 18);
    if (c.job === 'chop') label(p.x, p.y - 46, '砍树 1');
  }
  function drawTree(x,y,job){ ctx.fillStyle='#14221d'; ctx.fillRect(x-4,y+8,8,17); ctx.fillStyle=job?'#294b36':'#183125'; ctx.beginPath(); ctx.moveTo(x,y-30); ctx.lineTo(x+18,y+12); ctx.lineTo(x-18,y+12); ctx.closePath(); ctx.fill(); }
  function drawRock(x,y){ ctx.fillStyle='#4b5850'; ctx.beginPath(); ctx.ellipse(x,y+5,15,9,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#6d7d73'; ctx.beginPath(); ctx.ellipse(x-4,y,7,5,0,0,Math.PI*2); ctx.fill(); }
  function drawStone(x,y){ ctx.fillStyle='#98d6ca'; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#ecfffb'; ctx.beginPath(); ctx.arc(x-2,y-3,2,0,Math.PI*2); ctx.fill(); }
  function drawCamp(x,y){ ctx.fillStyle='rgba(255,168,76,.9)'; ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff0a6'; ctx.beginPath(); ctx.arc(x,y-3,4,0,Math.PI*2); ctx.fill(); }
  function drawVillage(x,y){ ctx.fillStyle='#624632'; ctx.fillRect(x-16,y-10,32,20); ctx.fillStyle='#a17752'; ctx.beginPath(); ctx.moveTo(x-22,y-10); ctx.lineTo(x,y-29); ctx.lineTo(x+22,y-10); ctx.closePath(); ctx.fill(); label(x,y-42,'部落'); }
  function drawGoal(x,y){ ctx.strokeStyle='#9de8ff'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x,y+24); ctx.lineTo(x,y-18); ctx.stroke(); ctx.fillStyle='#85ddff'; ctx.beginPath(); ctx.arc(x,y-23,10,0,Math.PI*2); ctx.fill(); label(x,y-48,'蓝色信标'); }
  function label(x,y,t){ ctx.font='12px system-ui'; const w=ctx.measureText(t).width+14; round(x-w/2,y-13,w,23,11); ctx.fillStyle='rgba(7,15,17,.76)'; ctx.fill(); ctx.fillStyle='#eaf3ef'; ctx.textAlign='center'; ctx.fillText(t,x,y+3); }
  function round(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawZones(){
    const zones = [{x:START.x,y:START.y,r:3.2,c:'rgba(255,215,124,.16)'}];
    for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(map[y][x].t===T.CAMP)zones.push({x,y,r:3.1,c:'rgba(255,180,82,.18)'});
    pulses.forEach(p=>zones.push({x:p.x,y:p.y,r:2.5,c:'rgba(144,224,255,.22)'}));
    zones.forEach(z=>{ const p=iso(z.x,z.y); if (p.x < -150 || p.x > canvas.width + 150 || p.y < -150 || p.y > canvas.height + 150) return; ctx.fillStyle=z.c; ctx.beginPath(); ctx.ellipse(p.x,p.y,z.r*32,z.r*18,0,0,Math.PI*2); ctx.fill(); });
  }

  function drawWorkerPaths() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,241,184,.22)';
    ctx.lineWidth = 2;
    for (const w of workers) {
      if (!w.path || w.pathIndex >= w.path.length) continue;
      ctx.beginPath();
      const first = iso(w.x, w.y); ctx.moveTo(first.x, first.y - 6);
      for (let i = w.pathIndex; i < w.path.length; i++) {
        const p = iso(w.path[i].x, w.path[i].y); ctx.lineTo(p.x, p.y - 6);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPlayer(){
    const p=iso(player.x,player.y);
    const flash = player.hitFlash > 0 && Math.floor(player.hitFlash * 20) % 2 === 0;
    ctx.fillStyle=flash ? '#ffffff' : '#f0cfa3'; ctx.beginPath(); ctx.arc(p.x,p.y-26,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=flash ? '#f0f0f0' : '#b66f48'; ctx.fillRect(p.x-7,p.y-20,14,20);
    ctx.strokeStyle='#ead093'; ctx.beginPath(); ctx.moveTo(p.x+8,p.y-18); ctx.lineTo(p.x+16,p.y+8); ctx.stroke();
    if (player.invuln > 0) label(p.x, p.y - 48, '受击');
  }
  function drawWorker(w){
    if(w.lost)return;
    const p=iso(w.x,w.y);
    ctx.fillStyle=w.scared?'#ffd0d0':'#d5c59c'; ctx.beginPath(); ctx.arc(p.x,p.y-20,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=w.scared?'#823f3f':'#66704e'; ctx.fillRect(p.x-6,p.y-14,12,15);
    if(w.state==='moving') label(p.x,p.y-38,'前往');
    if(w.state==='working') label(p.x,p.y-36,Math.ceil(4.2-w.progress));
    if(w.state==='returning') label(p.x,p.y-38,'返回');
    if(w.scared) label(p.x,p.y-54,'!');
  }
  function drawShade(s){
    const p=iso(s.x,s.y);
    ctx.fillStyle=s.targetType === 'player' ? 'rgba(18,0,0,.82)' : 'rgba(0,0,0,.76)';
    ctx.beginPath(); ctx.ellipse(p.x,p.y-8,19,12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#dff4ff'; ctx.fillRect(p.x-6,p.y-13,3,3); ctx.fillRect(p.x+4,p.y-13,3,3);
  }
  function drawOverlay(){
    const a=night()?.42:phase()==='dusk'?.2:.05; ctx.fillStyle=`rgba(2,8,18,${a})`; ctx.fillRect(0,0,canvas.width,canvas.height);
    if(ended){ctx.fillStyle='rgba(120,210,255,.12)'; ctx.fillRect(0,0,canvas.width,canvas.height);}
    if(gameOver){
      ctx.fillStyle='rgba(0,0,0,.58)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#fff1b8'; ctx.textAlign='center'; ctx.font='bold 34px system-ui'; ctx.fillText('旅程中断', canvas.width/2, canvas.height/2 - 14);
      ctx.fillStyle='#d9e8df'; ctx.font='16px system-ui'; ctx.fillText('辉石耗尽，你被黑林影拖入森林。按 R 重新开始。', canvas.width/2, canvas.height/2 + 22);
    }
  }

  function drawMiniMap() {
    const size = 128, x0 = canvas.width - size - 22, y0 = 18;
    ctx.fillStyle = 'rgba(7,16,17,.62)'; round(x0 - 8, y0 - 8, size + 16, size + 16, 12); ctx.fill();
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      if (!map[y][x].seen) continue;
      const c = map[y][x];
      ctx.fillStyle = c.t === T.WATER ? '#315b76' : c.t === T.CAMP ? '#e59e54' : c.t === T.GOAL ? '#8ee6ff' : c.t === T.STONE ? '#9bd8ce' : '#496d54';
      ctx.fillRect(x0 + x / W * size, y0 + y / H * size, Math.ceil(size/W), Math.ceil(size/H));
    }
    ctx.fillStyle = '#fff1b8'; ctx.beginPath(); ctx.arc(x0 + player.x / W * size, y0 + player.y / H * size, 3, 0, Math.PI*2); ctx.fill();
  }

  function drawPanel(){
    const idle=workers.filter(w=>!w.lost&&w.state==='idle').length;
    const moving=workers.filter(w=>!w.lost&&w.state==='moving').length;
    const returning=workers.filter(w=>!w.lost&&w.state==='returning').length;
    const alive=workers.filter(w=>!w.lost).length, lost=workers.length-alive;
    const ph=night()?'夜晚':phase()==='dusk'?'黄昏':'白天';
    const playerState = gameOver ? '游戏结束' : safe(player.x, player.y) ? '安全圈内' : night() ? '危险：可被追击' : '安全';
    panel.innerHTML=`<h1>《看海去》GPT_DEMO gpt.5</h1>地图：<b>${W}×${H}</b>　本帧绘制：<b>${frameStats.visible}</b> / ${frameStats.total}<br>辉石：<b>${stones}</b>　玩家：<b>${playerState}</b><br>工人：<b>${idle}/${alive}</b> 空闲　前往：<b>${moving}</b>　返回：<b>${returning}</b>　失踪：<b>${lost}</b><br>第 ${dayNo} 天 · ${ph}<br>目标：${ended?'<b>已抵达蓝色信标</b>':'收集辉石，派最近工人沿路开路，抵达蓝色信标'}<div class="small">返回中的工人也会参与最近任务计算；如果被选中，会中断返回并改去新任务。工人仍不会穿越森林、河流、岩石。</div>`;
  }

  window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') throwStone(); if (e.key.toLowerCase() === 'r') reset(); });
  window.addEventListener('keyup', e => keys[e.key] = false);
  canvas.addEventListener('mousemove', e => mouseTile = fromScreen(e.clientX, e.clientY));
  canvas.addEventListener('click', e => { const t = fromScreen(e.clientX, e.clientY); clickTile(t.x, t.y); });

  let last = performance.now();
  function loop(now) { const dt = Math.min(.05, (now-last)/1000); last=now; update(dt); draw(); requestAnimationFrame(loop); }
  resize(); reset(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
