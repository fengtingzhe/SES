<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>看海去 GPT_DEMO gpt.9</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#07100d;color:#eaf3ef;font:14px system-ui}canvas{display:block;width:100vw;height:100vh}.p,.h,.t{position:fixed;background:#07100dcc;border:1px solid #ffffff22;border-radius:14px;padding:12px 14px;line-height:1.65}.p{left:18px;top:16px;width:540px}.h{right:18px;bottom:16px;max-width:720px;color:#cbd8d1}.t{left:50%;top:18px;transform:translateX(-50%);border-radius:999px;background:#edf8f1;color:#173033;font-weight:700;opacity:0;transition:.18s}.show{opacity:1}b{color:#fff1b8}h1{margin:0 0 6px;font-size:17px}</style></head><body><canvas id="c"></canvas><div class="p" id="p"></div><div class="h"><b>gpt.9</b>：流民火堆系统。靠近火堆按 Space，消耗 1 辉石招募；流民自动返回最近安全点，抵达后变工人。<br>操作：WASD/方向键移动，Space互动，R重开。</div><div class="t" id="t"></div><script>
(()=>{const C=document.getElementById('c'),X=C.getContext('2d'),P=document.getElementById('p'),TST=document.getElementById('t');
const W=52,H=44,SZ=24,START={x:4,y:22},GOAL={x:47,y:22},DAY=90;
const T={G:0,F:1,W:2,B:3,BR:4,C:5,V:6,ST:7,GO:8,R:9,FS:10,MN:11,FOG:12,RF:13};
let M,pl,workers,refs,mons,stone,time,day,keys,cam,msgTimer,hover,over,end,nextWid=5,nextRid=1;
const rnd=n=>Math.floor(Math.random()*n),cl=(v,a,b)=>Math.max(a,Math.min(b,v)),cell=(x,y)=>M[y]?.[x],id=(x,y)=>x+','+y,dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),tile=o=>({x:Math.round(o.x),y:Math.round(o.y)});
function toast(s){TST.textContent=s;TST.classList.add('show');clearTimeout(msgTimer);msgTimer=setTimeout(()=>TST.classList.remove('show'),1500)}function resize(){C.width=innerWidth;C.height=innerHeight}addEventListener('resize',resize);
function blank(x,y){const c=cell(x,y);if(c)Object.assign(c,{t:T.G,job:null,val:0,life:null,lock:false,mine:null,ref:false})}function pass(x,y){const c=cell(x,y);return c&&[T.G,T.BR,T.C,T.V,T.ST,T.GO,T.FS,T.MN,T.FOG,T.RF].includes(c.t)}
function reset(){M=Array.from({length:H},()=>Array.from({length:W},()=>({t:T.F,seen:false,job:null,val:0,life:null,lock:false,mine:null,ref:false})));makeMap();pl={x:START.x,y:START.y,inv:0};workers=[{x:4,y:21},{x:4,y:22},{x:4,y:23},{x:4,y:24}].map((q,i)=>unit(i+1,q.x,q.y));refs=[];mons=[];stone=5;time=9;day=1;keys={};cam={x:0,y:0};hover=null;over=false;end=false;nextWid=5;nextRid=1;reveal();toast('gpt.9：流民火堆已加入。')}function unit(id,x,y){return{id,x,y,state:'idle',job:null,path:[],pi:0,prog:0,lost:false,carry:0,mineTimer:0}}
function makeMap(){let y=START.y,path=[];for(let x=START.x;x<=GOAL.x;x++){if(x>7&&x<45)y=cl(y+rnd(3)-1,7,H-8);path.push({x,y});for(let dy=-1;dy<=1;dy++)blank(x,y+dy);if(x%5===0)blank(x,y+(Math.random()<.5?2:-2))}for(let i=0;i<7;i++){const a=path[6+rnd(path.length-12)];let x=a.x,yy=a.y,d=Math.random()<.5?-1:1;for(let n=0;n<7+rnd(7);n++){yy=cl(yy+d*(Math.random()<.7?1:0),4,H-5);x=cl(x+rnd(3)-1,3,W-4);blank(x,yy);blank(x+1,yy)}}river(17+rnd(3));river(34+rnd(3));[8,18,28,38].forEach(i=>{const p=path[i],c=cell(p.x,p.y);if(c&&c.t===T.G){c.t=T.FS;c.job='camp'}});refCamp(path,12,-3);refCamp(path,25,3);refCamp(path,36,-3);fog(path,14,-5);fog(path,30,5);fog(path,42,-4);for(let i=0;i<45;i++){const x=6+rnd(W-12),y=5+rnd(H-10),c=cell(x,y);if(c.t===T.G&&Math.random()<.55){c.t=T.F;c.job='chop'}}for(let i=0;i<50;i++){const x=5+rnd(W-10),y=4+rnd(H-8),c=cell(x,y);if(c.t===T.F&&Math.random()<.35){c.t=T.R;c.job=null}}for(let i=0;i<35;i++){const x=5+rnd(W-10),y=4+rnd(H-8),c=cell(x,y);if(c.t===T.G){c.t=T.ST;c.val=2}}for(let yy=START.y-3;yy<=START.y+3;yy++)for(let xx=START.x-2;xx<=START.x+4;xx++)blank(xx,yy);cell(START.x,START.y).t=T.V;const m=cell(START.x+2,START.y);m.t=T.MN;m.mine={worker:null};cell(GOAL.x,GOAL.y).t=T.GO}
function river(rx){for(let y=2;y<H-2;y++){const c=cell(rx,y);c.t=T.W;c.job=null}let by=START.y;for(let y=4;y<H-4;y++)if(cell(rx-1,y).t===T.G&&cell(rx+1,y).t===T.G){by=y;break}cell(rx,by).t=T.B;cell(rx,by).job='repair'}function place(path,i,off,fn){const p=path[Math.min(path.length-1,i)],x=cl(p.x,3,W-4),y=cl(p.y+off,4,H-5);for(let r=0;r<5;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){const c=cell(xx,yy);if(c&&c.t===T.G){fn(c);return}}}function fog(p,i,o){place(p,i,o,c=>c.t=T.FOG)}function refCamp(p,i,o){place(p,i,o,c=>{c.t=T.RF;c.ref=true})}
function path(a,b){const sx=Math.round(a.x),sy=Math.round(a.y),gx=Math.round(b.x),gy=Math.round(b.y);if(!pass(sx,sy)||!pass(gx,gy))return null;const q=[{x:sx,y:sy}],pre=new Map([[id(sx,sy),null]]),ds=[[1,0],[-1,0],[0,1],[0,-1]];for(let h=0;h<q.length;h++){const u=q[h];if(u.x===gx&&u.y===gy){let out=[],v=u;while(v){out.push({x:v.x,y:v.y});v=pre.get(id(v.x,v.y))}return out.reverse()}for(const[dX,dY]of ds){const nx=u.x+dX,ny=u.y+dY,k=id(nx,ny);if(!pre.has(k)&&pass(nx,ny)){pre.set(k,u);q.push({x:nx,y:ny})}}}return null}
function homes(o){const pts=[START];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.C)pts.push({x,y});let best=null;for(const p of pts){const pp=path(o,p);if(pp&&(!best||pp.length<best.length))best=pp}return best}function safe(x,y){if(dist({x,y},START)<3.2)return true;for(let yy=cl(Math.floor(y-4),0,H-1);yy<=cl(Math.ceil(y+4),0,H-1);yy++)for(let xx=cl(Math.floor(x-4),0,W-1);xx<=cl(Math.ceil(x+4),0,W-1);xx++)if(cell(xx,yy).t===T.C&&dist({x,y},{x:xx,y:yy})<3.1)return true;return false}
function update(dt){time+=dt;if(time>day*DAY)day++;if(!over){move(dt);reveal();pickup();decay(dt);hover=near(false);workersUpdate(dt);refsUpdate(dt);spawn();monsUpdate(dt)}cam.x+=(C.width/2-(pl.x*SZ+cam.x))*0.03;cam.y+=(C.height/2-(pl.y*SZ+cam.y))*0.03}function night(){const p=(time%DAY)/DAY;return p>.66||p<.08}function phase(){const p=(time%DAY)/DAY;return night()?'夜晚':p>.52?'黄昏':'白天'}
function move(dt){let dx=(keys.d||keys.ArrowRight?1:0)-(keys.a||keys.ArrowLeft?1:0),dy=(keys.s||keys.ArrowDown?1:0)-(keys.w||keys.ArrowUp?1:0),l=Math.hypot(dx,dy)||1,nx=pl.x+dx/l*5*dt,ny=pl.y+dy/l*5*dt;if(pass(Math.round(nx),Math.round(pl.y)))pl.x=nx;if(pass(Math.round(pl.x),Math.round(ny)))pl.y=ny}function reveal(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(dist({x,y},pl)<6||dist({x,y},START)<5)cell(x,y).seen=true}function pickup(){let g=0;for(let y=Math.floor(pl.y-1);y<=Math.ceil(pl.y+1);y++)for(let x=Math.floor(pl.x-1);x<=Math.ceil(pl.x+1);x++){const c=cell(x,y);if(c&&c.t===T.ST&&dist(pl,{x,y})<.85){g+=c.val||1;blank(x,y)}}if(g){stone+=g;toast('获得辉石 +'+g)}}function decay(dt){for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=cell(x,y);if(c.t===T.ST&&c.life!=null){c.life-=dt;if(c.life<=0)blank(x,y)}}}
function near(verbose){const a=[];for(let y=Math.round(pl.y)-2;y<=Math.round(pl.y)+2;y++)for(let x=Math.round(pl.x)-2;x<=Math.round(pl.x)+2;x++){const c=cell(x,y);if(!c||!c.seen||c.lock||dist(pl,{x,y})>1.7)continue;let pri=9,act='',lab='';if(c.t===T.GO){pri=1;act='goal';lab='触碰蓝色信标'}else if(c.t===T.RF&&c.ref){pri=2;act='ref';lab='招募流民 1'}else if(c.t===T.MN){pri=3;act='mine';lab=c.mine?.worker?'矿山已有工人':'派工采矿'}else if(c.job==='chop'){pri=4;act='chop';lab='砍树 1'}else if(c.job==='repair'){pri=5;act='repair';lab='修桥 2'}else if(c.t===T.FS){pri=6;act='camp';lab='点亮旧火塘 2'}if(act)a.push({x,y,pri,act,lab})}a.sort((a,b)=>a.pri-b.pri);if(!a[0]&&verbose)toast('附近没有可互动目标。');return a[0]||null}
function freeWorkers(){return workers.filter(w=>!w.lost&&['idle','returning'].includes(w.state))}function choose(dests){let best=null,av=freeWorkers();for(const w of av)for(const d of dests){const p=path(tile(w),d);if(p&&(!best||p.length<best.path.length))best={w,path:p}}return{best,av:av.length}}function fail(info){toast(info.av?'有空闲工人，但道路不通。':'没有空闲工人。')}
function interact(){const it=near(true);if(!it)return;const c=cell(it.x,it.y);if(it.act==='goal'){end=true;toast('抵达蓝色信标。');return}if(it.act==='ref'){if(stone<1)return toast('辉石不足。');const p=homes({x:it.x,y:it.y});if(!p)return toast('流民找不到回营地的路。');stone--;c.ref=false;c.lock=true;refs.push({id:nextRid++,x:it.x,y:it.y,path:p,pi:1,lost:false});toast('流民开始返回最近营地。');return}if(it.act==='mine'){if(c.mine?.worker)return toast('矿山已有工人。');const info=choose([{x:it.x,y:it.y}]);if(!info.best)return fail(info);c.lock=true;Object.assign(info.best.w,{state:'moving',job:{type:'mine',tx:it.x,ty:it.y},path:info.best.path,pi:1,prog:0,carry:0});toast('工人前往矿山。');return}let cost=0,type='',dests=[];if(it.act==='chop'){cost=1;type='chop';dests=adj(it.x,it.y)}if(it.act==='repair'){cost=2;type='repair';dests=adj(it.x,it.y)}if(it.act==='camp'){cost=2;type='camp';dests=[{x:it.x,y:it.y}]}if(stone<cost)return toast('辉石不足。');const info=choose(dests);if(!info.best)return fail(info);stone-=cost;c.lock=true;Object.assign(info.best.w,{state:'moving',job:{type,tx:it.x,ty:it.y},path:info.best.path,pi:1,prog:0,carry:cost});toast('工人出发。')}
function adj(x,y){return[{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p=>pass(p.x,p.y))}function follow(u,dt,sp){if(!u.path||u.pi>=u.path.length)return true;const g=u.path[u.pi],d=dist(u,g);if(d>.05){u.x+=(g.x-u.x)/d*sp*dt;u.y+=(g.y-u.y)/d*sp*dt}else{u.x=g.x;u.y=g.y;u.pi++}return u.pi>=u.path.length}
function workersUpdate(dt){for(const w of workers){if(w.lost)continue;if(w.state==='mining'){w.mineTimer+=dt;if(w.mineTimer>=30){w.mineTimer=0;drop(w.x,w.y,1);toast('矿山产出 1 个辉石。')}continue}if(!w.job)continue;if(w.state==='moving'||w.state==='returning'){if(follow(w,dt,night()&&!safe(w.x,w.y)?1.1:2.3)){w.state==='returning'?home(w):w.state='working'}}else if(w.state==='working'){w.prog+=dt;if(w.prog>=4.2)finish(w)}}}function finish(w){const c=cell(w.job.tx,w.job.ty),type=w.job.type;if(type==='chop')blank(w.job.tx,w.job.ty);if(type==='repair'){c.t=T.BR;c.job=null;c.lock=false}if(type==='camp'){c.t=T.C;c.job=null;c.lock=false;makeMine(w.job.tx,w.job.ty)}if(type==='mine'){c.lock=false;c.mine=c.mine||{};c.mine.worker=w.id;Object.assign(w,{x:w.job.tx,y:w.job.ty,state:'mining',job:null,path:[],pi:0,carry:0,mineTimer:0});return}w.carry=0;const p=homes(w);if(p){w.state='returning';w.job={type:'return'};w.path=p;w.pi=1}else home(w)}function home(w){Object.assign(w,{state:'idle',job:null,path:[],pi:0,prog:0,carry:0})}function makeMine(x,y){for(let r=1;r<=3;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){const c=cell(xx,yy);if(c&&c.t===T.G){c.t=T.MN;c.mine={worker:null};return}}}
function refsUpdate(dt){for(const r of refs){if(follow(r,dt,night()&&!safe(r.x,r.y)?1.2:1.7)){workers.push(unit(nextWid++,r.x,r.y));r.done=true;toast('流民抵达营地，成为新的工人。')}}refs=refs.filter(r=>!r.done&&!r.lost)}function fogs(){const a=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.FOG)a.push({x,y});return a}function drop(x,y,n){let s=[];for(let r=1;r<4;r++){for(let yy=Math.round(y)-r;yy<=Math.round(y)+r;yy++)for(let xx=Math.round(x)-r;xx<=Math.round(x)+r;xx++){const c=cell(xx,yy);if(c&&c.t===T.G&&c.seen)s.push({x:xx,y:yy})}if(s.length>=n)break}for(let i=0;i<n&&s.length;i++){const p=s.splice(rnd(s.length),1)[0],c=cell(p.x,p.y);c.t=T.ST;c.val=1;c.life=10}}
function spawn(){if(!night()||mons.length>=5||Math.random()>.018)return;let tar=[];workers.filter(w=>!w.lost&&w.state!=='mining'&&!safe(w.x,w.y)).forEach(w=>tar.push({type:'w',id:w.id,x:w.x,y:w.y}));refs.filter(r=>!safe(r.x,r.y)).forEach(r=>tar.push({type:'r',id:r.id,x:r.x,y:r.y}));if(!safe(pl.x,pl.y))tar.push({type:'p',x:pl.x,y:pl.y});const fs=fogs();if(tar.length&&fs.length){const f=fs[rnd(fs.length)];mons.push({x:f.x,y:f.y,t:tar[rnd(tar.length)]})}}function mt(m){if(m.t.type==='w'){const w=workers.find(w=>w.id===m.t.id&&!w.lost&&!safe(w.x,w.y));return w||null}if(m.t.type==='r'){const r=refs.find(r=>r.id===m.t.id&&!safe(r.x,r.y));return r||null}return !safe(pl.x,pl.y)?pl:null}function monsUpdate(dt){for(const m of mons){const g=mt(m);if(!g||!night()){m.dead=true;continue}if(follow({x:m.x,y:m.y,path:[tile(g)],pi:0},0,0)){}const d=dist(m,g);if(d>.05){m.x+=(g.x-m.x)/d*1.65*dt;m.y+=(g.y-m.y)/d*1.65*dt}else{if(m.t.type==='w'){const w=workers.find(w=>w.id===m.t.id);if(w){w.lost=true;toast('工人失踪。')}}else if(m.t.type==='r'){const r=refs.find(r=>r.id===m.t.id);if(r){r.lost=true;toast('流民返程失败。')}}else{if(stone>0){stone--;drop(pl.x,pl.y,1);toast('受到袭击，掉落辉石。')}else{over=true;toast('旅程中断。')}}m.dead=true}}mons=mons.filter(m=>!m.dead);refs=refs.filter(r=>!r.lost)}
function draw(){X.fillStyle=night()?'#071016':'#10231c';X.fillRect(0,0,C.width,C.height);X.save();X.translate(cam.x,cam.y);for(let y=0;y<H;y++)for(let x=0;x<W;x++)drawCell(x,y);workers.forEach(drawW);refs.forEach(drawR);mons.forEach(drawM);drawP();X.restore();hud()}function drawCell(x,y){const c=cell(x,y),px=x*SZ,py=y*SZ;if(!c.seen){X.fillStyle='#0b1210';X.fillRect(px,py,SZ,SZ);return}const col=['#355945','#173226','#21465d','#694a31','#8a6b46','#55482c','#6b573d','#9bd8ce','#4ea5d8','#4a514c','#777052','#2c2c29','#1a101f','#6b5032'][c.t];X.fillStyle=col;X.fillRect(px,py,SZ-1,SZ-1);X.fillStyle='#fff';X.font='11px system-ui';if(c.t===T.F&&c.job)X.fillText('树',px+5,py+16);if(c.t===T.B)X.fillText('桥?',px+2,py+16);if(c.t===T.FS)X.fillText('火',px+5,py+16);if(c.t===T.C)X.fillText('营',px+5,py+16);if(c.t===T.MN)X.fillText(c.mine?.worker?'矿*':'矿',px+5,py+16);if(c.t===T.RF)X.fillText(c.ref?'民':'空',px+5,py+16);if(c.t===T.FOG)X.fillText('雾',px+5,py+16);if(c.t===T.GO)X.fillText('海',px+5,py+16);if(c.t===T.ST)X.fillText(c.val>=2?'◆◆':'◆',px+3,py+16)}function circle(u,col,r=7){X.fillStyle=col;X.beginPath();X.arc(u.x*SZ+SZ/2,u.y*SZ+SZ/2,r,0,7);X.fill()}function drawP(){circle(pl,'#f0cfa3',8)}function drawW(w){if(w.lost)return;circle(w,w.state==='mining'?'#b58a48':'#d5c59c',6);if(w.carry)txt(w,'石'+w.carry)}function drawR(r){circle(r,'#f0d3aa',5);txt(r,'返')}function drawM(m){circle(m,'#030303',8)}function txt(u,s){X.fillStyle='#fff';X.font='11px system-ui';X.textAlign='center';X.fillText(s,u.x*SZ+SZ/2,u.y*SZ-2)}function hud(){const alive=workers.filter(w=>!w.lost),idle=alive.filter(w=>w.state==='idle').length,mov=alive.filter(w=>w.state==='moving').length,work=alive.filter(w=>w.state==='working').length,ret=alive.filter(w=>w.state==='returning').length,min=alive.filter(w=>w.state==='mining').length;P.innerHTML=`<h1>《看海去》GPT_DEMO gpt.9</h1>辉石：<b>${stone}</b>　玩家：<b>${over?'结束':safe(pl.x,pl.y)?'安全圈内':night()?'危险':'安全'}</b><br>工人：<b>${idle}/${alive.length}</b> 空闲　前往：<b>${mov}</b>　工作：<b>${work}</b>　返回：<b>${ret}</b>　采矿：<b>${min}</b>　失踪：<b>${workers.length-alive.length}</b><br>流民返程：<b>${refs.length}</b>　黑雾口：<b>${fogs().length}</b>　怪物：<b>${mons.length}</b><br>第 ${day} 天 · ${phase()}<br>当前互动：<b>${hover?hover.lab:'附近无可互动目标'}</b>`}
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault();interact()}if(e.key.toLowerCase()==='r')reset()});addEventListener('keyup',e=>keys[e.key]=false);let last=performance.now();function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}resize();reset();requestAnimationFrame(loop)})();
</script></body></html>
