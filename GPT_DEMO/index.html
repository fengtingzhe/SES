<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>《看海去》GPT_DEMO gpt.10.3</title>
  <style>
    /* =========================================================
       GPT_DEMO gpt.10.3
       目标：保持单文件 HTML 方便双击运行，同时整理结构与注释。
       ========================================================= */

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #071010;
      color: #eaf3ef;
      font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    b { color: #fff1b8; }
    h1 { margin: 0 0 6px; font-size: 17px; }

    /* ---------- 通用浮层 ---------- */
    .panel,
    .help,
    .toast,
    .drawer,
    .console,
    .topHud {
      position: fixed;
      background: rgba(7, 16, 17, 0.78);
      border: 1px solid rgba(218, 239, 230, 0.16);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.65;
      backdrop-filter: blur(8px);
    }

    .panel {
      left: 18px;
      top: 54px;
      width: 560px;
      transition: 0.18s;
    }

    .panel.hide {
      transform: translateX(-590px);
    }

    .topHud {
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 900;
      background: rgba(237, 248, 241, 0.92);
      color: #173033;
      border-radius: 999px;
    }

    .help {
      right: 18px;
      bottom: 16px;
      max-width: 820px;
      color: #c8d7d1;
    }

    .toast {
      left: 50%;
      top: 60px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #edf8f1;
      color: #173033;
      font-weight: 700;
      opacity: 0;
      transition: 0.18s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }

    /* ---------- 侧边按钮 ---------- */
    .panelBtn,
    .tab,
    .consoleBtn {
      position: fixed;
      background: #edf8f1;
      color: #173033;
      border: 0;
      font-weight: 800;
      cursor: pointer;
    }

    .panelBtn {
      left: 18px;
      top: 16px;
      border-radius: 12px;
      padding: 9px 12px;
    }

    .tab {
      right: 0;
      top: 36px;
      border-radius: 12px 0 0 12px;
      padding: 10px 12px;
    }

    .consoleBtn {
      right: 0;
      top: 82px;
      border-radius: 12px 0 0 12px;
      padding: 10px 12px;
    }

    /* ---------- 右侧版本面板 ---------- */
    .drawer {
      right: 0;
      top: 128px;
      width: 370px;
      max-height: 68vh;
      overflow: auto;
      transform: translateX(392px);
      transition: 0.2s;
      border-radius: 16px 0 0 16px;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer ul {
      padding-left: 20px;
      margin: 8px 0;
    }

    .drawer li {
      margin: 6px 0;
    }

    /* ---------- 调试 Console ---------- */
    .console {
      right: 0;
      top: 128px;
      width: 370px;
      max-height: 70vh;
      overflow: auto;
      transform: translateX(392px);
      transition: 0.2s;
      border-radius: 16px 0 0 16px;
    }

    .console.open {
      transform: translateX(0);
    }

    .row {
      display: grid;
      grid-template-columns: 98px 1fr 58px;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }

    .console input { width: 100%; }

    .console button {
      background: #edf8f1;
      color: #173033;
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- 主屏 HUD：游戏内信息 -->
  <div class="topHud" id="topHud"></div>

  <!-- 左侧信息面板：默认收起，避免遮挡沉浸感 -->
  <button class="panelBtn" id="panelBtn">信息</button>
  <div class="panel hide" id="panel"></div>

  <!-- 右侧版本更新面板 -->
  <button class="tab" id="tab">gpt.10.3 更新</button>
  <div class="drawer" id="drawer">
    <h1>gpt.10.3 本版本更新</h1>
    <ul>
      <li>整理 index.html 为可读单文件结构。</li>
      <li>CSS、HTML、JS 分区并增加中文注释。</li>
      <li>保留 gpt.10.2 的视觉比例 Console。</li>
      <li>镜头缩放上限提升到 10.0x，方便继续测试极近镜头。</li>
      <li>不新增玩法，不改变核心规则。</li>
      <li>仍然保持双击 index.html 即可运行。</li>
    </ul>
  </div>

  <!-- Console：原型调参工具 -->
  <button class="consoleBtn" id="consoleBtn">Console</button>
  <div class="console" id="console">
    <h1>Console</h1>
    <div>FPS：<b id="fpsText">--</b></div>

    <div class="row">
      <span>镜头缩放</span>
      <input id="zoomRange" type="range" min="1" max="10" step="0.05" />
      <b id="zoomText"></b>
    </div>

    <div class="row">
      <span>移动速度</span>
      <input id="speedRange" type="range" min="2.5" max="6" step="0.05" />
      <b id="speedText"></b>
    </div>

    <div class="row">
      <span>单位尺寸</span>
      <input id="unitRange" type="range" min="0.8" max="2.4" step="0.05" />
      <b id="unitText"></b>
    </div>

    <div class="row">
      <span>地点尺寸</span>
      <input id="siteRange" type="range" min="0.8" max="2.8" step="0.05" />
      <b id="siteText"></b>
    </div>

    <div class="row">
      <span>树木尺寸</span>
      <input id="treeRange" type="range" min="0.8" max="2.8" step="0.05" />
      <b id="treeText"></b>
    </div>

    <div class="row">
      <span>光圈尺寸</span>
      <input id="lightRange" type="range" min="0.8" max="2.4" step="0.05" />
      <b id="lightText"></b>
    </div>

    <button id="resetCfg">恢复默认</button>
  </div>

  <div class="help">
    <b>PC操作</b>：WASD / 方向键移动；<b>Space 互动</b>；R 重开。<br />
    <b>gpt.10.3</b>：代码结构整理与注释优化；玩法保持 gpt.10.2 规则。
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      // =======================================================
      // 1. DOM 引用与基础 UI
      // =======================================================

      const C = document.getElementById('game');
      const X = C.getContext('2d');

      const P = document.getElementById('panel');
      const TO = document.getElementById('toast');
      const DR = document.getElementById('drawer');
      const TAB = document.getElementById('tab');
      const PB = document.getElementById('panelBtn');
      const CON = document.getElementById('console');
      const CB = document.getElementById('consoleBtn');
      const TOP = document.getElementById('topHud');

      const FPS = document.getElementById('fpsText');
      const ZR = document.getElementById('zoomRange');
      const SR = document.getElementById('speedRange');
      const UR = document.getElementById('unitRange');
      const SIR = document.getElementById('siteRange');
      const TR = document.getElementById('treeRange');
      const LR = document.getElementById('lightRange');
      const ZT = document.getElementById('zoomText');
      const ST = document.getElementById('speedText');
      const UT = document.getElementById('unitText');
      const SIT = document.getElementById('siteText');
      const TT = document.getElementById('treeText');
      const LT = document.getElementById('lightText');
      const RC = document.getElementById('resetCfg');

      TAB.onclick = () => {
        DR.classList.toggle('open');
        CON.classList.remove('open');
      };

      CB.onclick = () => {
        CON.classList.toggle('open');
        DR.classList.remove('open');
      };

      PB.onclick = () => P.classList.toggle('hide');

      // =======================================================
      // 2. 全局配置、地图枚举与调试参数
      // =======================================================

      const MAP_W = 56;
      const MAP_H = 46;
      const BASE_TW = 68;
      const BASE_TH = 36;
      const START = { x: 4, y: 23 };
      const GOAL = { x: 51, y: 23 };
      const DAY_LENGTH = 92;

      // Tile 类型：内部仍然用隐藏网格服务寻路和地图生成。
      const Tile = {
        GROUND: 0,
        FOREST: 1,
        WATER: 2,
        BROKEN_BRIDGE: 3,
        BRIDGE: 4,
        CAMP: 5,
        VILLAGE: 6,
        STONE: 7,
        GOAL: 8,
        ROCK: 9,
        FIRE_SITE: 10,
        MINE: 11,
        FOG: 12,
        REFUGEE_CAMP: 13,
      };

      let tileW = 108;
      let tileH = 56;

      // 调试参数会保存到 localStorage，方便多次刷新后继续测试。
      let zoom = Number(localStorage.getItem('khq_zoom')) || 1.6;
      let moveSpeed = Number(localStorage.getItem('khq_speed')) || 4.35;
      let unitScale = Number(localStorage.getItem('khq_unit')) || 1.35;
      let siteScale = Number(localStorage.getItem('khq_site')) || 1.55;
      let treeScale = Number(localStorage.getItem('khq_tree')) || 1.55;
      let lightScale = Number(localStorage.getItem('khq_light')) || 1.2;

      let map;
      let player;
      let workers;
      let refugees;
      let monsters;
      let stoneCount;
      let gameTime;
      let day;
      let keys;
      let camera;
      let hoverTarget;
      let reachedGoal;
      let gameOver;
      let toastTimer;
      let visibleTiles = 0;
      let nextWorkerId = 5;
      let nextRefugeeId = 1;
      let fpsAcc = 0;
      let fpsFrames = 0;

      const rand = n => Math.floor(Math.random() * n);
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
      const key = (x, y) => `${x},${y}`;
      const tileOf = o => ({ x: Math.round(o.x), y: Math.round(o.y) });
      const cell = (x, y) => map[y]?.[x];

      function applyConsoleConfig() {
        zoom = Number(ZR.value);
        moveSpeed = Number(SR.value);
        unitScale = Number(UR.value);
        siteScale = Number(SIR.value);
        treeScale = Number(TR.value);
        lightScale = Number(LR.value);

        tileW = BASE_TW * zoom;
        tileH = BASE_TH * zoom;

        ZT.textContent = `${zoom.toFixed(2)}x`;
        ST.textContent = moveSpeed.toFixed(2);
        UT.textContent = unitScale.toFixed(2);
        SIT.textContent = siteScale.toFixed(2);
        TT.textContent = treeScale.toFixed(2);
        LT.textContent = lightScale.toFixed(2);

        localStorage.setItem('khq_zoom', zoom);
        localStorage.setItem('khq_speed', moveSpeed);
        localStorage.setItem('khq_unit', unitScale);
        localStorage.setItem('khq_site', siteScale);
        localStorage.setItem('khq_tree', treeScale);
        localStorage.setItem('khq_light', lightScale);
      }

      [ZR, SR, UR, SIR, TR, LR].forEach(input => {
        input.oninput = applyConsoleConfig;
      });

      ZR.value = zoom;
      SR.value = moveSpeed;
      UR.value = unitScale;
      SIR.value = siteScale;
      TR.value = treeScale;
      LR.value = lightScale;

      RC.onclick = () => {
        ZR.value = 1.6;
        SR.value = 4.35;
        UR.value = 1.35;
        SIR.value = 1.55;
        TR.value = 1.55;
        LR.value = 1.2;
        applyConsoleConfig();
      };

      applyConsoleConfig();

      // =======================================================
      // 3. 工具函数
      // =======================================================

      function showToast(text) {
        TO.textContent = text;
        TO.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => TO.classList.remove('show'), 1700);
      }

      function resizeCanvas() {
        C.width = innerWidth;
        C.height = innerHeight;
      }

      addEventListener('resize', resizeCanvas);

      function makeTile(type = Tile.FOREST) {
        return {
          t: type,
          seen: false,
          job: null,
          val: 0,
          life: null,
          lock: false,
          mine: null,
          ref: false,
        };
      }

      function clearToGround(x, y) {
        const c = cell(x, y);
        if (!c) return;
        Object.assign(c, makeTile(Tile.GROUND));
      }

      function isPassable(x, y) {
        const c = cell(x, y);
        if (!c) return false;
        return [
          Tile.GROUND,
          Tile.BRIDGE,
          Tile.CAMP,
          Tile.VILLAGE,
          Tile.STONE,
          Tile.GOAL,
          Tile.FIRE_SITE,
          Tile.MINE,
          Tile.FOG,
          Tile.REFUGEE_CAMP,
        ].includes(c.t);
      }

      function toScreen(x, y) {
        return {
          x: (x - y) * tileW / 2 + C.width / 2 + camera.x,
          y: (x + y) * tileH / 2 + 70 + camera.y,
        };
      }

      function phase() {
        const p = (gameTime % DAY_LENGTH) / DAY_LENGTH;
        if (p > 0.66 || p < 0.08) return 'night';
        if (p > 0.52) return 'dusk';
        return 'day';
      }

      function isNight() {
        return phase() === 'night';
      }

      function phaseText() {
        if (phase() === 'night') return '夜晚';
        if (phase() === 'dusk') return '黄昏';
        return '白天';
      }
            // =======================================================
      // 4. 初始化与地图生成
      // =======================================================

      function resetGame() {
        map = Array.from({ length: MAP_H }, () =>
          Array.from({ length: MAP_W }, () => makeTile(Tile.FOREST))
        );

        makeMap();

        player = {
          x: START.x,
          y: START.y,
          inv: 0,
          flash: 0,
        };

        const spawnPoints = [
          { x: START.x, y: START.y - 1 },
          { x: START.x, y: START.y },
          { x: START.x, y: START.y + 1 },
          { x: START.x, y: START.y + 2 },
        ];

        workers = spawnPoints.map((p, index) => createWorker(index + 1, p.x, p.y));
        refugees = [];
        monsters = [];

        stoneCount = 5;
        gameTime = 9;
        day = 1;
        keys = {};
        camera = { x: 0, y: 0 };
        hoverTarget = null;
        reachedGoal = false;
        gameOver = false;
        nextWorkerId = 5;
        nextRefugeeId = 1;

        revealAroundKnownPoints();
        showToast('gpt.10.3：代码结构已整理，玩法保持不变。');
      }

      function createWorker(id, x, y) {
        return {
          id,
          x,
          y,
          state: 'idle',
          job: null,
          path: [],
          pathIndex: 0,
          progress: 0,
          lost: false,
          carry: 0,
          scared: false,
          mineTimer: 0,
        };
      }

      function makeMap() {
        let y = START.y;
        const mainPath = [];

        // 主推进路径：保证玩家能朝终点推进。
        for (let x = START.x; x <= GOAL.x; x++) {
          if (x > START.x + 2 && x < GOAL.x - 2) {
            y = clamp(y + rand(3) - 1, 7, MAP_H - 8);
          }

          mainPath.push({ x, y });
          clearToGround(x, y);
          clearToGround(x, y - 1);
          clearToGround(x, y + 1);

          if (x % 4 === 0) {
            clearToGround(x, y + (Math.random() < 0.5 ? 2 : -2));
          }
        }

        // 支路：不是宝箱通道，而是自然延展出的探索空间。
        for (let i = 0; i < 15; i++) {
          const start = mainPath[5 + rand(mainPath.length - 10)];
          let x = start.x;
          let yy = start.y;
          const dir = Math.random() < 0.5 ? -1 : 1;
          const len = 4 + rand(12);

          for (let n = 0; n < len; n++) {
            yy = clamp(yy + dir * (Math.random() < 0.78 ? 1 : 0), 4, MAP_H - 5);
            x = clamp(x + rand(3) - 1, 3, MAP_W - 4);
            clearToGround(x, yy);
            clearToGround(x + 1, yy);
            if (n % 3 === 0) clearToGround(x, yy + dir);
          }

          // 部分支路会横向接回或形成绕行空间。
          if (Math.random() < 0.35) {
            for (let n = 0; n < 4 + rand(7); n++) {
              x = clamp(x + 1, 3, MAP_W - 4);
              yy = clamp(yy + rand(3) - 1, 4, MAP_H - 5);
              clearToGround(x, yy);
              clearToGround(x, yy + 1);
            }
          }
        }

        makeRiver(18 + rand(3));
        makeRiver(37 + rand(3));

        [8, 18, 29, 41].forEach(index => {
          const p = mainPath[Math.min(mainPath.length - 1, index)];
          const c = cell(p.x, p.y);
          if (c && c.t === Tile.GROUND) {
            c.t = Tile.FIRE_SITE;
            c.job = 'camp';
          }
        });

        placeRefugeeCamp(mainPath, 12, -4);
        placeRefugeeCamp(mainPath, 26, 4);
        if (Math.random() < 0.75) placeRefugeeCamp(mainPath, 39, -4);

        placeFog(mainPath, 15, -6);
        placeFog(mainPath, 31, 6);
        placeFog(mainPath, 44, -5);

        scatter(Tile.STONE, 42, c => {
          c.val = 2;
          c.life = null;
        });

        // 森林和岩石会重新覆盖部分草地，形成开路需求。
        for (let i = 0; i < 55; i++) {
          const x = 6 + rand(MAP_W - 12);
          const yy = 5 + rand(MAP_H - 10);
          const c = cell(x, yy);
          if (c.t === Tile.GROUND && Math.random() < 0.56) {
            c.t = Tile.FOREST;
            c.job = 'chop';
          }
        }

        for (let i = 0; i < 65; i++) {
          const x = 5 + rand(MAP_W - 10);
          const yy = 4 + rand(MAP_H - 8);
          const c = cell(x, yy);
          if (c.t === Tile.FOREST && Math.random() < 0.42) {
            c.t = Tile.ROCK;
            c.job = null;
          }
        }

        ensureStartArea();
        cell(GOAL.x, GOAL.y).t = Tile.GOAL;
      }

      function scatter(type, count, extra) {
        for (let i = 0; i < count; i++) {
          const x = 5 + rand(MAP_W - 10);
          const y = 4 + rand(MAP_H - 8);
          const c = cell(x, y);
          if (c.t === Tile.GROUND) {
            c.t = type;
            if (extra) extra(c);
          }
        }
      }

      function ensureStartArea() {
        for (let yy = START.y - 3; yy <= START.y + 3; yy++) {
          for (let xx = START.x - 2; xx <= START.x + 4; xx++) {
            clearToGround(xx, yy);
          }
        }

        cell(START.x, START.y).t = Tile.VILLAGE;

        const mine = cell(START.x + 2, START.y);
        mine.t = Tile.MINE;
        mine.mine = { worker: null };
      }

      function makeRiver(rx) {
        for (let y = 2; y < MAP_H - 2; y++) {
          const c = cell(rx, y);
          c.t = Tile.WATER;
          c.job = null;
          c.val = 0;
        }

        let bridgeY = START.y;
        for (let y = 4; y < MAP_H - 4; y++) {
          if (cell(rx - 1, y).t === Tile.GROUND && cell(rx + 1, y).t === Tile.GROUND) {
            bridgeY = y;
            break;
          }
        }

        const bridge = cell(rx, bridgeY);
        bridge.t = Tile.BROKEN_BRIDGE;
        bridge.job = 'repair';
      }

      function placeNearPath(path, index, offset, fn) {
        const p = path[Math.min(path.length - 1, index)];
        const x = clamp(p.x, 3, MAP_W - 4);
        const y = clamp(p.y + offset, 4, MAP_H - 5);

        for (let r = 1; r < 7; r++) {
          for (let yy = y - r; yy <= y + r; yy++) {
            for (let xx = x - r; xx <= x + r; xx++) {
              const c = cell(xx, yy);
              if (c && c.t === Tile.GROUND && dist({ x: xx, y: yy }, START) > 8) {
                fn(c);
                return true;
              }
            }
          }
        }
        return false;
      }

      function placeFog(path, index, offset) {
        placeNearPath(path, index, offset, c => { c.t = Tile.FOG; });
      }

      function placeRefugeeCamp(path, index, offset) {
        placeNearPath(path, index, offset, c => {
          c.t = Tile.REFUGEE_CAMP;
          c.ref = true;
        });
      }

      // =======================================================
      // 5. 寻路、视野与玩家移动
      // =======================================================

      function neighbors(x, y) {
        return [
          { x: x + 1, y },
          { x: x - 1, y },
          { x, y: y + 1 },
          { x, y: y - 1 },
        ].filter(p => isPassable(p.x, p.y));
      }

      function findPath(from, to) {
        const sx = Math.round(from.x);
        const sy = Math.round(from.y);
        const gx = Math.round(to.x);
        const gy = Math.round(to.y);

        if (!isPassable(sx, sy) || !isPassable(gx, gy)) return null;
        if (sx === gx && sy === gy) return [{ x: sx, y: sy }];

        const queue = [{ x: sx, y: sy }];
        const prev = new Map([[key(sx, sy), null]]);

        for (let head = 0; head < queue.length; head++) {
          const u = queue[head];
          for (const n of neighbors(u.x, u.y)) {
            const k = key(n.x, n.y);
            if (prev.has(k)) continue;

            prev.set(k, u);

            if (n.x === gx && n.y === gy) {
              const path = [n];
              let p = u;
              while (p) {
                path.push(p);
                p = prev.get(key(p.x, p.y));
              }
              return path.reverse();
            }

            queue.push(n);
          }
        }

        return null;
      }

      function updatePlayer(dt) {
        const dx = (keys.d || keys.ArrowRight ? 1 : 0) - (keys.a || keys.ArrowLeft ? 1 : 0);
        const dy = (keys.s || keys.ArrowDown ? 1 : 0) - (keys.w || keys.ArrowUp ? 1 : 0);
        const len = Math.hypot(dx, dy) || 1;

        const nx = player.x + dx / len * moveSpeed * dt;
        const ny = player.y + dy / len * moveSpeed * dt;

        if (isPassable(Math.round(nx), Math.round(player.y))) player.x = nx;
        if (isPassable(Math.round(player.x), Math.round(ny))) player.y = ny;

        player.x = clamp(player.x, 0, MAP_W - 1);
        player.y = clamp(player.y, 0, MAP_H - 1);
      }

      function revealAroundKnownPoints() {
        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            if (
              dist({ x, y }, player || START) < 6.2 ||
              dist({ x, y }, START) < 5.4 ||
              nearCampVision(x, y)
            ) {
              cell(x, y).seen = true;
            }
          }
        }
      }

      function nearCampVision(x, y) {
        for (let yy = clamp(y - 5, 0, MAP_H - 1); yy <= clamp(y + 5, 0, MAP_H - 1); yy++) {
          for (let xx = clamp(x - 5, 0, MAP_W - 1); xx <= clamp(x + 5, 0, MAP_W - 1); xx++) {
            const c = cell(xx, yy);
            if ((c.t === Tile.CAMP || c.t === Tile.VILLAGE) && dist({ x, y }, { x: xx, y: yy }) < 5) {
              return true;
            }
          }
        }
        return false;
      }

      // =======================================================
      // 6. 资源拾取与 Space 互动系统
      // =======================================================

      function autoPickupStones() {
        let gained = 0;

        for (let y = Math.floor(player.y - 1); y <= Math.ceil(player.y + 1); y++) {
          for (let x = Math.floor(player.x - 1); x <= Math.ceil(player.x + 1); x++) {
            const c = cell(x, y);
            if (c && c.t === Tile.STONE && dist(player, { x, y }) < 0.82) {
              gained += c.val || 1;
              clearToGround(x, y);
            }
          }
        }

        if (gained) {
          stoneCount += gained;
          showToast(gained > 1 ? `获得辉石 +${gained}` : '获得辉石 +1');
        }
      }

      function updateStoneLife(dt) {
        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const c = cell(x, y);
            if (c.t === Tile.STONE && c.val === 1 && c.life != null) {
              c.life -= dt;
              if (c.life <= 0) clearToGround(x, y);
            }
          }
        }
      }

      function findInteractTarget(verbose) {
        const px = Math.round(player.x);
        const py = Math.round(player.y);
        const range = 1.65 + (siteScale - 1) * 0.45;
        const candidates = [];

        for (let y = py - 3; y <= py + 3; y++) {
          for (let x = px - 3; x <= px + 3; x++) {
            const c = cell(x, y);
            if (!c || !c.seen || c.lock) continue;

            const d = dist(player, { x, y });
            if (d > range) continue;

            let priority = 99;
            let action = null;
            let label = '';

            if (c.t === Tile.GOAL) {
              priority = 1;
              action = 'goal';
              label = '触碰蓝色信标';
            } else if (c.t === Tile.REFUGEE_CAMP && c.ref) {
              priority = 2;
              action = 'refugee';
              label = '招募流民 1';
            } else if (c.t === Tile.MINE) {
              priority = 3;
              action = 'mine';
              label = c.mine?.worker ? '矿山已有工人' : '派工采矿';
            } else if (c.job === 'chop') {
              priority = 4;
              action = 'chop';
              label = '砍树 1';
            } else if (c.job === 'repair') {
              priority = 5;
              action = 'repair';
              label = '修桥 2';
            } else if (c.t === Tile.FIRE_SITE) {
              priority = 6;
              action = 'camp';
              label = '点亮旧火塘 2';
            }

            if (action) candidates.push({ x, y, d, priority, action, label });
          }
        }

        candidates.sort((a, b) => a.priority - b.priority || a.d - b.d);

        if (!candidates[0] && verbose) showToast('附近没有可互动目标。');
        return candidates[0] || null;
      }

      function availableWorkers() {
        return workers.filter(w => !w.lost && ['idle', 'returning'].includes(w.state));
      }

      function chooseBestWorker(destinations) {
        let best = null;
        const available = availableWorkers();

        for (const worker of available) {
          for (const dest of destinations) {
            const path = findPath(tileOf(worker), dest);
            if (path && (!best || path.length < best.path.length)) {
              best = { worker, path };
            }
          }
        }

        return { best, available: available.length };
      }

      function failWorkerDispatch(info) {
        showToast(info.available <= 0
          ? '没有空闲工人。'
          : '有空闲工人，但道路不通，需要先清开树障或修桥。'
        );
      }

      function interact() {
        if (gameOver) return;

        const target = findInteractTarget(true);
        if (!target) return;

        const c = cell(target.x, target.y);

        if (target.action === 'goal') {
          reachedGoal = true;
          showToast('抵达蓝色信标：远处传来像潮水一样的风。');
          return;
        }

        if (target.action === 'refugee') {
          recruitRefugee(target, c);
          return;
        }

        if (target.action === 'mine') {
          sendWorkerToMine(target, c);
          return;
        }

        dispatchBuildWorker(target, c);
      }

      function recruitRefugee(target, c) {
        if (stoneCount < 1) {
          showToast('辉石不足。');
          return;
        }

        const path = homePath({ x: target.x, y: target.y });
        if (!path) {
          showToast('流民找不到回营地的路。');
          return;
        }

        stoneCount -= 1;
        c.ref = false;
        c.lock = true;

        refugees.push({
          id: nextRefugeeId++,
          x: target.x,
          y: target.y,
          originX: target.x,
          originY: target.y,
          path,
          pathIndex: 1,
          lost: false,
        });

        showToast('流民收下辉石，开始返回最近安全点。');
      }

      function sendWorkerToMine(target, c) {
        if (c.mine?.worker) {
          showToast('矿山已有工人驻扎。');
          return;
        }

        const info = chooseBestWorker([{ x: target.x, y: target.y }]);
        if (!info.best) {
          failWorkerDispatch(info);
          return;
        }

        c.lock = true;
        Object.assign(info.best.worker, {
          job: { type: 'mine', tx: target.x, ty: target.y },
          path: info.best.path,
          pathIndex: 1,
          state: 'moving',
          progress: 0,
          carry: 0,
          mineTimer: 0,
        });

        showToast(`工人 ${info.best.worker.id} 前往矿山。`);
      }

      function dispatchBuildWorker(target, c) {
        let cost = 0;
        let type = null;
        let destinations = [];

        if (target.action === 'chop') {
          cost = 1;
          type = 'chop';
          destinations = neighbors(target.x, target.y);
        }

        if (target.action === 'repair') {
          cost = 2;
          type = 'repair';
          destinations = neighbors(target.x, target.y);
        }

        if (target.action === 'camp') {
          cost = 2;
          type = 'camp';
          destinations = [{ x: target.x, y: target.y }];
        }

        if (stoneCount < cost) {
          showToast('辉石不足。');
          return;
        }

        if (!destinations.length) {
          showToast('没有可抵达的工作位置。');
          return;
        }

        const info = chooseBestWorker(destinations);
        if (!info.best) {
          failWorkerDispatch(info);
          return;
        }

        stoneCount -= cost;
        c.lock = true;

        Object.assign(info.best.worker, {
          job: { type, tx: target.x, ty: target.y },
          path: info.best.path,
          pathIndex: 1,
          state: 'moving',
          progress: 0,
          carry: cost,
        });

        showToast(`工人 ${info.best.worker.id} 携带 ${cost} 个辉石出发。`);
      }
            // =======================================================
      // 7. 工人系统
      // =======================================================

      function updateWorkers(dt) {
        for (const worker of workers) {
          if (worker.lost) continue;

          if (worker.state === 'mining') {
            updateMineWorker(worker, dt);
            continue;
          }

          if (!worker.job) continue;

          worker.scared = isNight() && !isSafe(worker.x, worker.y);

          if (worker.state === 'moving' || worker.state === 'returning') {
            walkUnit(worker, dt);
          } else if (worker.state === 'working') {
            worker.progress += dt * (worker.scared ? 0.35 : 1);
            if (worker.progress >= 4.2) finishWorkerJob(worker);
          }
        }
      }

      function walkUnit(unit, dt) {
        if (!unit.path || unit.pathIndex >= unit.path.length) {
          if (unit.state === 'returning') arriveHome(unit);
          else unit.state = 'working';
          return;
        }

        const goal = unit.path[unit.pathIndex];
        const d = Math.hypot(goal.x - unit.x, goal.y - unit.y);

        if (d > 0.05) {
          const speed = unit.scared ? 1.1 : 2.25;
          unit.x += (goal.x - unit.x) / d * speed * dt;
          unit.y += (goal.y - unit.y) / d * speed * dt;
        } else {
          unit.x = goal.x;
          unit.y = goal.y;
          unit.pathIndex += 1;

          if (unit.pathIndex >= unit.path.length) {
            if (unit.state === 'returning') arriveHome(unit);
            else unit.state = 'working';
          }
        }
      }

      function releaseWorkerJob(worker) {
        if (!worker.job || worker.job.type === 'return') return;

        const c = cell(worker.job.tx, worker.job.ty);
        if (c) c.lock = false;

        worker.job = null;
        worker.path = [];
        worker.pathIndex = 0;
        worker.progress = 0;
      }

      function finishWorkerJob(worker) {
        const { tx, ty, type } = worker.job;
        const c = cell(tx, ty);

        if (type === 'chop') {
          clearToGround(tx, ty);
          showToast('树障被清开，工人开始返回。');
        }

        if (type === 'repair') {
          c.t = Tile.BRIDGE;
          c.job = null;
          c.lock = false;
          showToast('断桥修复完成，工人开始返回。');
        }

        if (type === 'camp') {
          c.t = Tile.CAMP;
          c.job = null;
          c.lock = false;
          showToast('旧火塘被点亮，矿山显现。');
          createMineNear(tx, ty);
        }

        if (type === 'mine') {
          c.lock = false;
          c.mine = c.mine || { worker: null };
          c.mine.worker = worker.id;

          Object.assign(worker, {
            x: tx,
            y: ty,
            state: 'mining',
            job: null,
            path: [],
            pathIndex: 0,
            carry: 0,
            mineTimer: 0,
          });

          showToast(`工人 ${worker.id} 开始采矿。`);
          return;
        }

        worker.carry = 0;

        const path = homePath(worker);
        if (!path) {
          arriveHome(worker);
          return;
        }

        worker.job = { type: 'return' };
        worker.path = path;
        worker.pathIndex = 1;
        worker.state = 'returning';
        worker.progress = 0;
      }

      function createMineNear(x, y) {
        for (let r = 1; r <= 3; r++) {
          for (let yy = y - r; yy <= y + r; yy++) {
            for (let xx = x - r; xx <= x + r; xx++) {
              const c = cell(xx, yy);
              if (c && c.t === Tile.GROUND) {
                c.t = Tile.MINE;
                c.mine = { worker: null };
                return;
              }
            }
          }
        }
      }

      function updateMineWorker(worker, dt) {
        const p = tileOf(worker);
        const c = cell(p.x, p.y);

        if (!c || c.t !== Tile.MINE) {
          worker.state = 'idle';
          return;
        }

        worker.mineTimer += dt;

        if (worker.mineTimer >= 30) {
          worker.mineTimer = 0;
          dropStones(worker.x, worker.y, 1);
          showToast('矿山产出 1 个辉石。');
        }
      }

      function homePath(unit) {
        const homes = [START];

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            if (cell(x, y).t === Tile.CAMP) homes.push({ x, y });
          }
        }

        let best = null;

        for (const h of homes) {
          const path = findPath(tileOf(unit), h);
          if (path && (!best || path.length < best.length)) best = path;
        }

        return best;
      }

      function arriveHome(worker) {
        Object.assign(worker, {
          job: null,
          state: 'idle',
          path: [],
          pathIndex: 0,
          progress: 0,
          scared: false,
          carry: 0,
        });

        showToast(`工人 ${worker.id} 已返回安全点。`);
      }

      // =======================================================
      // 8. 流民与怪物系统
      // =======================================================

      function updateRefugees(dt) {
        for (const ref of refugees) {
          if (ref.lost) continue;

          if (!ref.path || ref.pathIndex >= ref.path.length) {
            workers.push(createWorker(nextWorkerId++, ref.x, ref.y));
            ref.done = true;

            const origin = cell(ref.originX, ref.originY);
            if (origin) origin.lock = false;

            showToast('流民抵达安全点，成为新的工人。');
            continue;
          }

          const goal = ref.path[ref.pathIndex];
          const d = Math.hypot(goal.x - ref.x, goal.y - ref.y);

          if (d > 0.05) {
            const speed = isNight() && !isSafe(ref.x, ref.y) ? 1.15 : 1.75;
            ref.x += (goal.x - ref.x) / d * speed * dt;
            ref.y += (goal.y - ref.y) / d * speed * dt;
          } else {
            ref.x = goal.x;
            ref.y = goal.y;
            ref.pathIndex += 1;
          }
        }

        refugees = refugees.filter(r => !r.done && !r.lost);
      }

      function isSafe(x, y) {
        if (dist({ x, y }, START) < 3.2) return true;

        for (
          let yy = clamp(Math.floor(y - 4), 0, MAP_H - 1);
          yy <= clamp(Math.ceil(y + 4), 0, MAP_H - 1);
          yy++
        ) {
          for (
            let xx = clamp(Math.floor(x - 4), 0, MAP_W - 1);
            xx <= clamp(Math.ceil(x + 4), 0, MAP_W - 1);
            xx++
          ) {
            if (
              cell(xx, yy).t === Tile.CAMP &&
              dist({ x, y }, { x: xx, y: yy }) < 3.1
            ) {
              return true;
            }
          }
        }

        return false;
      }

      function looseStones() {
        const result = [];

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const c = cell(x, y);
            if (c.t === Tile.STONE && c.val === 1 && c.seen && !isSafe(x, y)) {
              result.push({ x, y });
            }
          }
        }

        return result;
      }

      function fogSources() {
        const result = [];

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            if (cell(x, y).t === Tile.FOG) result.push({ x, y });
          }
        }

        return result;
      }

      function spawnMonsters() {
        if (!isNight() || monsters.length >= 5 || Math.random() > 0.018) return;

        const targets = [];

        looseStones().forEach(s => {
          targets.push({ type: 'stone', x: s.x, y: s.y });
        });

        workers
          .filter(w => !w.lost && w.state !== 'mining' && !isSafe(w.x, w.y))
          .forEach(w => {
            targets.push({ type: 'worker', id: w.id, x: w.x, y: w.y });
          });

        refugees
          .filter(r => !r.lost && !isSafe(r.x, r.y))
          .forEach(r => {
            targets.push({ type: 'refugee', id: r.id, x: r.x, y: r.y });
          });

        if (
          !reachedGoal &&
          !gameOver &&
          !isSafe(player.x, player.y) &&
          player.inv <= 0
        ) {
          targets.push({ type: 'player', x: player.x, y: player.y });
        }

        const sources = fogSources();
        if (!targets.length || !sources.length) return;

        const source = sources[rand(sources.length)];

        monsters.push({
          x: source.x,
          y: source.y,
          target: targets[rand(targets.length)],
        });
      }

      function resolveMonsterTarget(monster) {
        const t = monster.target;

        if (t.type === 'stone') {
          const c = cell(Math.round(t.x), Math.round(t.y));
          return c && c.t === Tile.STONE && c.val === 1
            ? { x: t.x, y: t.y }
            : null;
        }

        if (t.type === 'worker') {
          const w = workers.find(
            w => w.id === t.id && !w.lost && !isSafe(w.x, w.y)
          );
          return w ? { x: w.x, y: w.y } : null;
        }

        if (t.type === 'refugee') {
          const r = refugees.find(
            r => r.id === t.id && !r.lost && !isSafe(r.x, r.y)
          );
          return r ? { x: r.x, y: r.y } : null;
        }

        if (
          !reachedGoal &&
          !gameOver &&
          !isSafe(player.x, player.y) &&
          player.inv <= 0
        ) {
          return { x: player.x, y: player.y };
        }

        return null;
      }

      function updateMonsters(dt) {
        for (const monster of monsters) {
          const target = resolveMonsterTarget(monster);

          if (!target || !isNight()) {
            monster.dead = true;
            continue;
          }

          const d = Math.hypot(target.x - monster.x, target.y - monster.y);

          if (d > 0.05) {
            monster.x += (target.x - monster.x) / d * 1.65 * dt;
            monster.y += (target.y - monster.y) / d * 1.65 * dt;
          }

          if (d < 0.35) hitMonsterTarget(monster);
        }

        monsters = monsters.filter(m => !m.dead);
      }

      function hitMonsterTarget(monster) {
        const t = monster.target;

        if (t.type === 'stone') {
          clearToGround(Math.round(t.x), Math.round(t.y));
          showToast('黑林影捡走了一颗散落辉石。');
        } else if (t.type === 'worker') {
          hitWorker(t.id);
        } else if (t.type === 'refugee') {
          hitRefugee(t.id);
        } else {
          hitPlayer();
        }

        monster.dead = true;
      }

      function dropStones(x, y, amount) {
        const spots = [];
        const cx = Math.round(x);
        const cy = Math.round(y);

        for (let r = 1; r <= 3; r++) {
          for (let yy = cy - r; yy <= cy + r; yy++) {
            for (let xx = cx - r; xx <= cx + r; xx++) {
              const c = cell(xx, yy);

              if (
                c &&
                c.t === Tile.GROUND &&
                c.seen &&
                dist({ x: xx, y: yy }, { x: cx, y: cy }) > 0.6
              ) {
                spots.push({ x: xx, y: yy });
              }
            }
          }

          if (spots.length >= amount) break;
        }

        for (let i = 0; i < amount && spots.length; i++) {
          const p = spots.splice(rand(spots.length), 1)[0];
          const c = cell(p.x, p.y);

          c.t = Tile.STONE;
          c.val = 1;
          c.life = 10;
          c.job = null;
          c.lock = false;
        }
      }

      function hitPlayer() {
        if (player.inv > 0 || gameOver) return;

        player.inv = 1.7;
        player.flash = 0.45;

        if (stoneCount > 0) {
          const lost = Math.min(stoneCount, 1 + rand(3));
          stoneCount -= lost;
          dropStones(player.x, player.y, lost);
          showToast(`你被黑林影袭击，掉落 ${lost} 个辉石。`);
        } else {
          gameOver = true;
          showToast('辉石耗尽，你被黑林影拖入森林。旅程中断。');
        }
      }

      function hitWorker(id) {
        const worker = workers.find(w => w.id === id && !w.lost);
        if (!worker) return;

        if (worker.carry > 0) {
          dropStones(worker.x, worker.y, worker.carry);
          showToast(`工人 ${worker.id} 被袭击，任务辉石掉落。`);
          worker.carry = 0;
        }

        releaseWorkerJob(worker);
        worker.lost = true;
        worker.state = 'lost';

        showToast(`工人 ${worker.id} 被黑林影拖入森林。`);
      }

      function hitRefugee(id) {
        const ref = refugees.find(r => r.id === id && !r.lost);
        if (!ref) return;

        ref.lost = true;

        const origin = cell(ref.originX, ref.originY);
        if (origin) origin.lock = false;

        showToast('流民在返程中被黑林影拖走。');
      }

      // =======================================================
      // 9. 绘制系统
      // =======================================================

      function draw() {
        drawBackground();

        const visible = [];

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const p = toScreen(x, y);

            if (
              p.x > -220 &&
              p.x < C.width + 220 &&
              p.y > -220 &&
              p.y < C.height + 220
            ) {
              visible.push({ x, y, order: x + y });
            }
          }
        }

        visible.sort((a, b) => a.order - b.order);
        visibleTiles = visible.length;

        visible.forEach(p => drawTile(p.x, p.y));

        drawSafeZones();
        drawPaths();

        refugees.forEach(drawRefugee);
        workers.forEach(drawWorker);
        monsters.forEach(drawMonster);
        drawPlayer();

        drawNightOverlay();
        drawMiniMap();
        drawHud();
      }

      function drawBackground() {
        const g = X.createLinearGradient(0, 0, 0, C.height);

        g.addColorStop(
          0,
          isNight() ? '#071012' : phase() === 'dusk' ? '#18272a' : '#162d2e'
        );

        g.addColorStop(1, isNight() ? '#0d1214' : '#18241f');

        X.fillStyle = g;
        X.fillRect(0, 0, C.width, C.height);
      }

      function drawDiamond(p, fill, stroke) {
        X.beginPath();
        X.moveTo(p.x, p.y - tileH / 2);
        X.lineTo(p.x + tileW / 2, p.y);
        X.lineTo(p.x, p.y + tileH / 2);
        X.lineTo(p.x - tileW / 2, p.y);
        X.closePath();

        X.fillStyle = fill;
        X.fill();

        if (stroke) {
          X.strokeStyle = stroke;
          X.stroke();
        }
      }

      function drawTile(x, y) {
        const c = cell(x, y);
        const p = toScreen(x, y);

        if (!c.seen) {
          drawDiamond(p, '#071010', 'rgba(255,255,255,.025)');
          return;
        }

        const colors = [
          '#355945',
          '#173226',
          '#213f50',
          '#67462e',
          '#785535',
          '#42583b',
          '#5e6040',
          '#42695d',
          '#315b76',
          '#26312d',
          '#4b4b3e',
          '#3b4239',
          '#1a111f',
          '#6a5236',
        ];

        const isHover = hoverTarget && hoverTarget.x === x && hoverTarget.y === y;

        drawDiamond(
          p,
          colors[c.t],
          isHover ? 'rgba(255,245,180,.9)' : 'rgba(255,255,255,.055)'
        );

        if (c.t === Tile.FOREST) drawTree(p.x, p.y - 8, c.job, c.lock);
        if (c.t === Tile.ROCK) drawRock(p.x, p.y - 6);
        if (c.t === Tile.STONE) drawStone(p.x, p.y - 8, c.val || 1, c.life);
        if (c.t === Tile.CAMP) drawCamp(p.x, p.y - 3);
        if (c.t === Tile.FIRE_SITE) drawFireSite(p.x, p.y - 3, c.lock);
        if (c.t === Tile.MINE) drawMine(p.x, p.y - 6, c.mine, c.lock);
        if (c.t === Tile.FOG) drawFog(p.x, p.y - 6);
        if (c.t === Tile.REFUGEE_CAMP) drawRefugeeCamp(p.x, p.y - 5, c.ref, c.lock);
        if (c.t === Tile.VILLAGE) drawVillage(p.x, p.y - 4);
        if (c.t === Tile.BROKEN_BRIDGE) label(p.x, p.y - 30, c.lock ? '修桥中' : '修桥 2');
        if (c.t === Tile.GOAL) drawGoal(p.x, p.y - 18);
        if (c.job === 'chop') label(p.x, p.y - 46, c.lock ? '砍树中' : '砍树 1');
        if (isHover) label(p.x, p.y - 62, hoverTarget.label);
      }
            function roundRect(x, y, w, h, r) {
        X.beginPath();
        X.moveTo(x + r, y);
        X.arcTo(x + w, y, x + w, y + h, r);
        X.arcTo(x + w, y + h, x, y + h, r);
        X.arcTo(x, y + h, x, y, r);
        X.arcTo(x, y, x + w, y, r);
        X.closePath();
      }

      function label(x, y, text) {
        X.font = '12px system-ui';
        const w = X.measureText(text).width + 14;

        roundRect(x - w / 2, y - 13, w, 23, 11);

        X.fillStyle = 'rgba(7,15,17,.78)';
        X.fill();

        X.fillStyle = '#eaf3ef';
        X.textAlign = 'center';
        X.fillText(text, x, y + 3);
      }

      function drawTree(x, y, job, locked) {
        const s = treeScale;

        X.fillStyle = '#14221d';
        X.fillRect(x - 4 * s, y + 8 * s, 8 * s, 18 * s);

        X.fillStyle = job ? '#294b36' : '#183125';
        X.beginPath();
        X.moveTo(x, y - 34 * s);
        X.lineTo(x + 22 * s, y + 15 * s);
        X.lineTo(x - 22 * s, y + 15 * s);
        X.closePath();
        X.fill();

        X.fillStyle = 'rgba(20,45,34,.45)';
        X.beginPath();
        X.ellipse(x, y + 8 * s, 25 * s, 10 * s, 0, 0, 7);
        X.fill();

        if (locked) label(x, y - 58 * s, '施工中');
      }

      function drawRock(x, y) {
        X.fillStyle = '#4b5850';
        X.beginPath();
        X.ellipse(x, y + 5, 15 * siteScale, 9 * siteScale, 0, 0, 7);
        X.fill();
      }

      function drawStone(x, y, value, life) {
        X.fillStyle = life != null ? '#78bbb0' : '#98d6ca';
        X.beginPath();
        X.arc(x - (value >= 2 ? 5 : 0), y, 7 * unitScale, 0, 7);
        X.fill();

        if (value >= 2) {
          X.fillStyle = '#8ac8bd';
          X.beginPath();
          X.arc(x + 7 * unitScale, y + 4 * unitScale, 6 * unitScale, 0, 7);
          X.fill();
        }
      }

      function drawCamp(x, y) {
        const s = siteScale;

        X.fillStyle = 'rgba(255,168,76,.9)';
        X.beginPath();
        X.arc(x, y, 12 * s, 0, 7);
        X.fill();

        X.fillStyle = '#fff0a6';
        X.beginPath();
        X.arc(x, y - 4 * s, 5 * s, 0, 7);
        X.fill();

        X.fillStyle = 'rgba(105,70,42,.9)';
        X.fillRect(x - 16 * s, y + 2 * s, 32 * s, 11 * s);
      }

      function drawFireSite(x, y, locked) {
        const s = siteScale;

        X.strokeStyle = '#a8a07a';
        X.lineWidth = 3;

        X.beginPath();
        X.ellipse(x, y, 18 * s, 10 * s, 0, 0, 7);
        X.stroke();

        label(x, y - 30 * s, locked ? '点亮中' : '旧火塘 2');
      }

      function drawMine(x, y, mine, locked) {
        const s = siteScale;

        X.fillStyle = '#242827';
        X.beginPath();
        X.arc(x, y + 6 * s, 24 * s, Math.PI, 0);
        X.fill();

        X.fillStyle = '#5a4934';
        X.fillRect(x - 27 * s, y, 54 * s, 9 * s);

        X.fillStyle = 'rgba(0,0,0,.22)';
        X.beginPath();
        X.ellipse(x, y + 14 * s, 30 * s, 12 * s, 0, 0, 7);
        X.fill();

        label(x, y - 32 * s, mine?.worker ? '采矿中' : locked ? '前往中' : '矿山');
      }

      function drawFog(x, y) {
        const s = siteScale;

        X.fillStyle = 'rgba(18,4,28,.9)';
        X.beginPath();
        X.ellipse(x, y + 5 * s, 26 * s, 18 * s, 0, 0, 7);
        X.fill();

        X.fillStyle = 'rgba(113,75,150,.6)';
        X.beginPath();
        X.arc(x, y - 8 * s, 12 * s, 0, 7);
        X.fill();

        label(x, y - 38 * s, '黑雾口');
      }

      function drawRefugeeCamp(x, y, hasRefugee, locked) {
        const s = siteScale;

        X.fillStyle = '#5d3e25';
        X.beginPath();
        X.arc(x, y + 9 * s, 15 * s, 0, 7);
        X.fill();

        X.fillStyle = hasRefugee ? '#ffd38a' : '#75604a';
        X.beginPath();
        X.arc(x, y + 2 * s, 7 * s, 0, 7);
        X.fill();

        label(x, y - 33 * s, hasRefugee ? '流民火堆 1' : locked ? '返程中' : '空火堆');
      }

      function drawVillage(x, y) {
        const s = siteScale;

        X.fillStyle = '#624632';
        X.fillRect(x - 23 * s, y - 12 * s, 46 * s, 28 * s);

        X.fillStyle = '#a17752';
        X.beginPath();
        X.moveTo(x - 31 * s, y - 12 * s);
        X.lineTo(x, y - 39 * s);
        X.lineTo(x + 31 * s, y - 12 * s);
        X.closePath();
        X.fill();

        label(x, y - 52 * s, '部落');
      }

      function drawGoal(x, y) {
        const s = siteScale;

        X.strokeStyle = '#9de8ff';
        X.lineWidth = 3;

        X.beginPath();
        X.moveTo(x, y + 28 * s);
        X.lineTo(x, y - 22 * s);
        X.stroke();

        X.fillStyle = '#85ddff';
        X.beginPath();
        X.arc(x, y - 28 * s, 12 * s, 0, 7);
        X.fill();

        label(x, y - 56 * s, '蓝色信标');
      }

      function drawSafeZones() {
        const zones = [
          { x: START.x, y: START.y, r: 3.2, c: 'rgba(255,215,124,.16)' },
        ];

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            if (cell(x, y).t === Tile.CAMP) {
              zones.push({ x, y, r: 3.1, c: 'rgba(255,180,82,.18)' });
            }
          }
        }

        for (const z of zones) {
          const p = toScreen(z.x, z.y);

          X.fillStyle = z.c;
          X.beginPath();
          X.ellipse(
            p.x,
            p.y,
            z.r * 42 * lightScale,
            z.r * 24 * lightScale,
            0,
            0,
            7
          );
          X.fill();
        }
      }

      function drawPaths() {
        X.save();

        X.strokeStyle = 'rgba(255,241,184,.22)';
        X.lineWidth = 2;

        for (const unit of [...workers, ...refugees]) {
          if (!unit.path || unit.pathIndex >= unit.path.length) continue;

          X.beginPath();

          let p = toScreen(unit.x, unit.y);
          X.moveTo(p.x, p.y - 6);

          for (let i = unit.pathIndex; i < unit.path.length; i++) {
            p = toScreen(unit.path[i].x, unit.path[i].y);
            X.lineTo(p.x, p.y - 6);
          }

          X.stroke();
        }

        X.restore();
      }

      function drawPlayer() {
        const p = toScreen(player.x, player.y);
        const s = unitScale;
        const flash = player.flash > 0 && Math.floor(player.flash * 20) % 2 === 0;

        X.fillStyle = flash ? '#fff' : '#f0cfa3';
        X.beginPath();
        X.arc(p.x, p.y - 26 * s, 7 * s, 0, 7);
        X.fill();

        X.fillStyle = flash ? '#eee' : '#b66f48';
        X.fillRect(p.x - 7 * s, p.y - 20 * s, 14 * s, 22 * s);

        if (player.inv > 0) label(p.x, p.y - 50 * s, '受击');
      }

      function drawWorker(worker) {
        if (worker.lost) return;

        const p = toScreen(worker.x, worker.y);
        const s = unitScale * 0.9;

        X.fillStyle = worker.scared ? '#ffd0d0' : '#d5c59c';
        X.beginPath();
        X.arc(p.x, p.y - 20 * s, 6 * s, 0, 7);
        X.fill();

        X.fillStyle =
          worker.state === 'mining'
            ? '#8a7550'
            : worker.scared
              ? '#823f3f'
              : '#66704e';

        X.fillRect(p.x - 6 * s, p.y - 14 * s, 12 * s, 16 * s);

        if (worker.state === 'moving') label(p.x, p.y - 40 * s, '前往');
        if (worker.state === 'working') label(p.x, p.y - 38 * s, Math.ceil(4.2 - worker.progress));
        if (worker.state === 'returning') label(p.x, p.y - 40 * s, '返回');
        if (worker.state === 'mining') label(p.x, p.y - 40 * s, `采矿 ${Math.ceil(30 - worker.mineTimer)}`);
        if (worker.carry > 0) label(p.x, p.y - 58 * s, `辉石${worker.carry}`);
      }

      function drawRefugee(ref) {
        if (ref.lost) return;

        const p = toScreen(ref.x, ref.y);
        const s = unitScale * 0.9;

        X.fillStyle = '#f0d3aa';
        X.beginPath();
        X.arc(p.x, p.y - 18 * s, 5 * s, 0, 7);
        X.fill();

        X.fillStyle = '#8b6b4b';
        X.fillRect(p.x - 5 * s, p.y - 13 * s, 10 * s, 14 * s);

        label(p.x, p.y - 38 * s, '流民返回');
      }

      function drawMonster(monster) {
        const p = toScreen(monster.x, monster.y);
        const s = siteScale;

        X.fillStyle =
          monster.target.type === 'stone'
            ? 'rgba(20,20,0,.82)'
            : monster.target.type === 'player'
              ? 'rgba(18,0,0,.82)'
              : 'rgba(0,0,0,.76)';

        X.beginPath();
        X.ellipse(p.x, p.y - 8 * s, 20 * s, 12 * s, 0, 0, 7);
        X.fill();

        X.fillStyle = '#dff4ff';
        X.fillRect(p.x - 6 * s, p.y - 13 * s, 3 * s, 3 * s);
        X.fillRect(p.x + 4 * s, p.y - 13 * s, 3 * s, 3 * s);
      }

      function drawNightOverlay() {
        X.fillStyle = `rgba(2,8,18,${
          isNight() ? 0.42 : phase() === 'dusk' ? 0.2 : 0.05
        })`;

        X.fillRect(0, 0, C.width, C.height);

        if (gameOver) {
          X.fillStyle = 'rgba(0,0,0,.58)';
          X.fillRect(0, 0, C.width, C.height);

          X.fillStyle = '#fff1b8';
          X.textAlign = 'center';
          X.font = 'bold 34px system-ui';
          X.fillText('旅程中断', C.width / 2, C.height / 2 - 14);

          X.fillStyle = '#d9e8df';
          X.font = '16px system-ui';
          X.fillText(
            '辉石耗尽，你被黑林影拖入森林。按 R 重新开始。',
            C.width / 2,
            C.height / 2 + 22
          );
        }
      }

      function drawMiniMap() {
        const size = 128;
        const x0 = C.width - size - 22;
        const y0 = 18;

        X.fillStyle = 'rgba(7,16,17,.62)';
        roundRect(x0 - 8, y0 - 8, size + 16, size + 16, 12);
        X.fill();

        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const c = cell(x, y);
            if (!c.seen) continue;

            X.fillStyle = miniColor(c);
            X.fillRect(
              x0 + x / MAP_W * size,
              y0 + y / MAP_H * size,
              Math.ceil(size / MAP_W),
              Math.ceil(size / MAP_H)
            );
          }
        }

        X.fillStyle = '#fff1b8';
        X.beginPath();
        X.arc(x0 + player.x / MAP_W * size, y0 + player.y / MAP_H * size, 3, 0, 7);
        X.fill();
      }

      function miniColor(c) {
        if (c.t === Tile.WATER) return '#315b76';
        if (c.t === Tile.CAMP) return '#e59e54';
        if (c.t === Tile.FIRE_SITE) return '#aaa172';
        if (c.t === Tile.MINE) return '#8a7550';
        if (c.t === Tile.FOG) return '#7d4fa0';
        if (c.t === Tile.REFUGEE_CAMP) return '#b28a55';
        if (c.t === Tile.GOAL) return '#8ee6ff';
        if (c.t === Tile.STONE) return c.val >= 2 ? '#b6eee4' : '#78bbb0';
        return '#496d54';
      }

      function drawHud() {
        const idle = workers.filter(w => !w.lost && w.state === 'idle').length;
        const moving = workers.filter(w => !w.lost && w.state === 'moving').length;
        const working = workers.filter(w => !w.lost && w.state === 'working').length;
        const returning = workers.filter(w => !w.lost && w.state === 'returning').length;
        const mining = workers.filter(w => !w.lost && w.state === 'mining').length;
        const alive = workers.filter(w => !w.lost).length;
        const lost = workers.length - alive;

        const playerStatus =
          gameOver
            ? '游戏结束'
            : isSafe(player.x, player.y)
              ? '安全圈内'
              : isNight()
                ? '危险'
                : '安全';

        TOP.innerHTML = `第 ${day} 天 · ${phaseText()}`;

        P.innerHTML = `
          <h1>《看海去》GPT_DEMO gpt.10.3</h1>
          地图：<b>${MAP_W}×${MAP_H}</b>　本帧绘制：<b>${visibleTiles}</b> / ${MAP_W * MAP_H}<br>
          辉石：<b>${stoneCount}</b>　玩家：<b>${playerStatus}</b><br>
          工人：<b>${idle}/${alive}</b> 空闲　前往：<b>${moving}</b>　工作：<b>${working}</b>　返回：<b>${returning}</b>　采矿：<b>${mining}</b>　失踪：<b>${lost}</b><br>
          流民返程：<b>${refugees.length}</b>　黑雾口：<b>${fogSources().length}</b>　怪物：<b>${monsters.length}</b><br>
          当前互动：<b>${hoverTarget ? hoverTarget.label : '附近无可互动目标'}</b><br>
          规则：逻辑格子不变；Console 调整像素视觉比例与地点体量。
        `;
      }

      // =======================================================
      // 10. 主循环与输入
      // =======================================================

      function update(dt) {
        gameTime += dt;
        if (gameTime > day * DAY_LENGTH) day += 1;

        player.inv = Math.max(0, player.inv - dt);
        player.flash = Math.max(0, player.flash - dt);

        if (!gameOver) {
          updatePlayer(dt);
          revealAroundKnownPoints();
          autoPickupStones();
          updateStoneLife(dt);
          hoverTarget = findInteractTarget(false);
          updateWorkers(dt);
          updateRefugees(dt);
          spawnMonsters();
          updateMonsters(dt);
        }

        const p = toScreen(player.x, player.y);

        camera.x += (C.width / 2 - p.x) * 0.055;
        camera.y += (C.height / 2 - p.y) * 0.055;
      }

      addEventListener('keydown', e => {
        keys[e.key] = true;

        if (e.key === ' ') {
          e.preventDefault();
          interact();
        }

        if (e.key.toLowerCase() === 'r') resetGame();
      });

      addEventListener('keyup', e => {
        keys[e.key] = false;
      });

      let last = performance.now();

      function loop(now) {
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;

        fpsAcc += dt;
        fpsFrames += 1;

        if (fpsAcc > 0.5) {
          FPS.textContent = Math.round(fpsFrames / fpsAcc);
          fpsAcc = 0;
          fpsFrames = 0;
        }

        update(dt);
        draw();

        requestAnimationFrame(loop);
      }

      resizeCanvas();
      resetGame();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
