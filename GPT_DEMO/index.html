function open(x,y){if(cell(x,y)){cell(x,y).t=TT.G;cell(x,y).job=null;cell(x,y).val=0}}function makeMap(){let y=S.y,path=[];for(let x=S.x;x<=G.x;x++){if(x>S.x+2&&x<G.x-2)y=cl(y+R(3)-1,7,H-8);path.push({x,y});open(x,y);open(x,y-1);open(x,y+1);if(x%5==0)open(x,y+(Math.random()<.5?2:-2))}for(let i=0;i<7;i++){let a=path[6+R(path.length-12)],x=a.x,y=a.y,dir=Math.random()<.5?-1:1;for(let n=0;n<5+R(9);n++){y=cl(y+dir*(Math.random()<.7),4,H-5);x=cl(x+R(3)-1,3,W-4);open(x,y);open(x+1,y)}}river(17+R(3));river(34+R(3));for(let i=0;i<45;i++){let x=6+R(W-12),y=5+R(H-10),c=cell(x,y);if(c.t==TT.G&&Math.random()<.55){c.t=TT.F;c.job='chop'}}for(let i=0;i<55;i++){let x=5+R(W-10),y=4+R(H-8),c=cell(x,y);if(c.t==TT.F&&Math.random()<.42)c.t=TT.R}for(let i=0;i<38;i++){let x=5+R(W-10),y=4+R(H-8),c=cell(x,y);if(c.t==TT.G){c.t=TT.ST;c.val=2}}cell(S.x,S.y).t=TT.V;cell(G.x,G.y).t=TT.GO}

function click(x,y){if(over)return;let c=cell(x,y);if(!c)return;let cost=0,j=null,dests=[];if(c.job=='chop'){cost=1;j='chop';dests=adj(x,y)}else if(c.job=='repair'){cost=2;j='repair';dests=adj(x,y)}else if(c.t==TT.G&&c.seen){cost=2;j='camp';dests=[{x,y}]}else return say('这里暂时不能派工。');if(stone<cost)return say('辉石不足。');if(!dests.length)return say('没有可抵达的工作位置，需要先开路。');let ch=bestW(dests);if(!ch)return say('没有可调度工人，或没有可通行路径。');stone-=cost;Object.assign(ch.w,{job:{type:j,tx:x,ty:y},path:ch.p,pi:1,s:'moving',prog:0});say(`工人 ${ch.w.id} 路径最近，已出发。`)}function bestW(ds){let b=null;for(let w of ws){if(w.lost||!['idle','returning'].includes(w.s))continue;for(let d of ds){let p=path(tile(w),d);if(p&&(!b||p.length<b.p.length))b={w,d,p}}}return b}

function spawn(){if(!night()||ms.length>=5||Math.random()>.014)return;let tar=[];ws.filter(w=>!w.lost&&!safe(w.x,w.y)).forEach(w=>tar.push({type:'w',id:w.id,x:w.x,y:w.y}));if(!end&&!over&&!safe(pl.x,pl.y)&&pl.iv<=0)tar.push({type:'p',id:0,x:pl.x,y:pl.y});if(!tar.length)return;let a=tar[R(tar.length)];ms.push({x:a.x+(Math.random()<.5?-5:5),y:a.y+R(7)-3,type:a.type,id:a.id})}function target(m){if(m.type=='w'){let w=ws.find(w=>w.id==m.id&&!w.lost&&!safe(w.x,w.y));return w&&{x:w.x,y:w.y}}return !end&&!over&&!safe(pl.x,pl.y)&&pl.iv<=0?{x:pl.x,y:pl.y}:null}function updM(dt){for(let m of ms){let g=target(m);if(!g||!night()){m.dead=1;continue}let d=Math.hypot(g.x-m.x,g.y-m.y);if(d>.05){m.x+=(g.x-m.x)/d*1.65*dt;m.y+=(g.y-m.y)/d*1.65*dt}if(d<.32){if(m.type=='w'){let w=ws.find(w=>w.id==m.id&&!w.lost);if(w){w.lost=1;w.s='lost';say(`工人 ${w.id} 被黑林影拖入森林。`)}}else hit();m.dead=1}}ms=ms.filter(m=>!m.dead)}function hit(){if(pl.iv>0||over)return;pl.iv=1.7;pl.fl=.45;if(stone>0){let n=Math.min(stone,1+R(3));stone-=n;drop(n);say(`你被黑林影袭击，掉落 ${n} 个辉石！`)}else{over=1;say('辉石耗尽，你被黑林影拖入森林。旅程中断。')}}function drop(n){let cx=Math.round(pl.x),cy=Math.round(pl.y),a=[];for(let r=1;r<=3;r++){for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){let c=cell(x,y);if(c&&c.t==TT.G&&c.seen)a.push({x,y})}if(a.length>=n)break}for(let i=0;i<n&&a.length;i++){let j=R(a.length),p=a.splice(j,1)[0],c=cell(p.x,p.y);c.t=TT.ST;c.val=1}}
