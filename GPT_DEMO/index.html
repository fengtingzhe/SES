<style>
html,body{margin:0;height:100%;overflow:hidden;background:#071010;color:#eaf3ef;font:14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}canvas{display:block;width:100vw;height:100vh}.box{position:fixed;background:rgba(7,16,17,.8);border:1px solid rgba(218,239,230,.18);border-radius:16px;padding:12px 14px;line-height:1.65;backdrop-filter:blur(8px)}#hud{left:18px;top:54px;width:620px;transition:.18s}#hud.hide{transform:translateX(-660px)}#top{top:14px;left:50%;transform:translateX(-50%);font-weight:900;background:rgba(237,248,241,.92);color:#173033;border-radius:999px}button{position:fixed;background:#edf8f1;color:#173033;border:0;font-weight:800;cursor:pointer}#infoBtn{left:18px;top:16px;border-radius:12px;padding:9px 12px}#verBtn{right:0;top:36px;border-radius:12px 0 0 12px;padding:10px 12px}#conBtn{right:0;top:82px;border-radius:12px 0 0 12px;padding:10px 12px}#ver,#con{right:0;top:128px;width:410px;max-height:72vh;overflow:auto;transform:translateX(440px);transition:.2s;border-radius:16px 0 0 16px}#ver.open,#con.open{transform:translateX(0)}#help{right:18px;bottom:16px;max-width:900px;color:#c8d7d1}.toast{left:50%;top:60px;transform:translateX(-50%);border-radius:999px;background:#edf8f1;color:#173033;font-weight:700;opacity:0;transition:.18s;pointer-events:none}.toast.show{opacity:1}b{color:#fff1b8}h1{font-size:17px;margin:0 0 6px}.row{display:grid;grid-template-columns:90px 1fr 55px;gap:8px;align-items:center;margin:8px 0}input{width:100%}.small{opacity:.82}

<body>
<canvas id="game"></canvas>
<div id="top" class="box"></div>
<button id="infoBtn">信息</button><div id="hud" class="box hide"></div>
<button id="verBtn">gpt.11.2 更新</button><div id="ver" class="box"><h1>gpt.11.2 体验修复版</h1><ul><li>每个营地都会生成工棚和弓箭营。</li><li>颠倒森林区域只在中心格显示一次名称。</li><li>无可互动目标时，Space 会丢下 1 枚辉石。</li><li>修复进出颠倒森林时持续按键导致的卡顿。</li><li>保留 gpt.11.1 的定向互动、倒计时、砍树掉辉石、工人撤退等修复。</li></ul></div>
<button id="conBtn">Console</button><div id="con" class="box"><h1>Console</h1><div>FPS：<b id="fps">--</b></div><div class="row"><span>镜头</span><input id="zoom" type="range" min="0.7" max="2.2" step="0.05"><b id="zv"></b></div><div class="row"><span>速度</span><input id="speed" type="range" min="2" max="7" step="0.1"><b id="sv"></b></div><button id="reset" style="position:static;border-radius:10px;padding:8px 10px">恢复默认</button></div>
<div id="help" class="box"><b>操作</b>：WASD / 方向键移动；<b>Space 互动</b>；R 重开。<br><b>gpt.11.2</b>：每个营地有转职建筑；Space 无互动时放置辉石；颠倒森林进出不卡顿。</div>
<div id="toast" class="box toast"></div>
<script>
(()=>{
const cv=document.getElementById('game'),ctx=cv.getContext('2d'),hud=document.getElementById('hud'),topHud=document.getElementById('top'),toast=document.getElementById('toast'),ver=document.getElementById('ver'),con=document.getElementById('con'),fpsEl=document.getElementById('fps'),zoomEl=document.getElementById('zoom'),speedEl=document.getElementById('speed'),zv=document.getElementById('zv'),sv=document.getElementById('sv');
document.getElementById('infoBtn').onclick=()=>hud.classList.toggle('hide');document.getElementById('verBtn').onclick=()=>{ver.classList.toggle('open');con.classList.remove('open')};document.getElementById('conBtn').onclick=()=>{con.classList.toggle('open');ver.classList.remove('open')};
const W=74,H=54,S=28,DAY=95,START={x:5,y:27},GOAL={x:68,y:27};
const T={F:0,G:1,W:2,B:3,BR:4,V:5,C:6,S:7,MN:8,RF:9,FOG:10,INV:11,HUT:12,AR:13,FOX:14,GO:15,FS:16};
const rnd=n=>Math.floor(Math.random()*n),cl=(v,a,b)=>Math.max(a,Math.min(b,v)),dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),cell=(x,y)=>map[y]?.[x];
let zoom=+(localStorage.khq112_zoom||1.15),speed=+(localStorage.khq112_speed||4.2);zoomEl.value=zoom;speedEl.value=speed;function apply(){zoom=+zoomEl.value;speed=+speedEl.value;zv.textContent=zoom.toFixed(2);sv.textContent=speed.toFixed(1);localStorage.khq112_zoom=zoom;localStorage.khq112_speed=speed}zoomEl.oninput=speedEl.oninput=apply;document.getElementById('reset').onclick=()=>{zoomEl.value=1.15;speedEl.value=4.2;apply()};apply();
let map,pl,workers,pop,refs,archers,monsters,foxes,stone,time,day,keys,cam,hover,over,timer,nextId,foxEvent;
function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>toast.classList.remove('show'),1600)}
function resize(){cv.width=innerWidth;cv.height=innerHeight}addEventListener('resize',resize);
function mkTile(t=T.F){return{t,seen:false,job:null,val:0,life:null,lock:false,mine:null,ref:false,invertLabel:false}}
function blank(x,y){if(cell(x,y))map[y][x]=mkTile(T.G)}
function pass(x,y){let c=cell(x,y);return c&&[T.G,T.BR,T.V,T.C,T.S,T.MN,T.RF,T.FOG,T.INV,T.HUT,T.AR,T.FOX,T.GO,T.FS].includes(c.t)}
function resetGame(){map=Array.from({length:H},()=>Array.from({length:W},()=>mkTile(T.F)));makeMap();pl={x:START.x,y:START.y,inv:0,dir:{x:1,y:0},ctrlInv:false};workers=[mkUnit('worker',START.x,START.y-1),mkUnit('worker',START.x,START.y+1)];pop=[];refs=[];archers=[];monsters=[];foxes=[];stone=6;time=8;day=1;keys={};cam={x:0,y:0};hover=null;over=false;nextId=3;foxEvent=null;reveal();msg('gpt.11.2：体验修复版已启动。')}
function mkUnit(type,x,y){return{id:nextId++,type,x,y,state:'idle',job:null,path:[],pi:0,prog:0,carry:0,lost:false,shoot:0,homeX:START.x,homeY:START.y,flee:false}}
function makeMap(){let y=START.y,path=[];for(let x=START.x;x<=GOAL.x;x++){if(x>8&&x<GOAL.x-2)y=cl(y+rnd(3)-1,8,H-9);path.push({x,y});for(let dy=-1;dy<=1;dy++)blank(x,y+dy);if(x%5===0)blank(x,y+(Math.random()<.5?2:-2))}
 for(let i=0;i<16;i++){let p=path[8+rnd(path.length-16)],x=p.x,yy=p.y,dir=Math.random()<.5?-1:1;for(let n=0;n<5+rnd(12);n++){x=cl(x+rnd(3)-1,4,W-5);yy=cl(yy+dir*(Math.random()<.75?1:0),5,H-6);blank(x,yy);blank(x+1,yy);if(n%3==0)blank(x,yy+dir)}}
 river(22+rnd(3));river(45+rnd(3));paintInvert(path[10].x,path[10].y-5,3);place(path,12,-4,c=>{c.t=T.S;c.val=4});place(path,16,4,c=>{c.t=T.RF;c.ref=true});place(path,27,-5,c=>{c.t=T.FOX});place(path,30,4,c=>{c.t=T.RF;c.ref=true});place(path,36,-4,c=>{c.t=T.FOG});place(path,39,0,c=>{c.t=T.FS;c.job='camp'});place(path,48,5,c=>{c.t=T.FOG});paintInvert(path[50].x,path[50].y-4,3);scatter(T.S,48,c=>{c.val=2});
 for(let i=0;i<90;i++){let x=6+rnd(W-12),yy=5+rnd(H-10),c=cell(x,yy);if(c.t===T.G&&Math.random()<.35){c.t=T.F;c.job='chop'}}startArea();cell(GOAL.x,GOAL.y).t=T.GO}
function scatter(t,n,extra){for(let i=0;i<n;i++){let x=5+rnd(W-10),y=4+rnd(H-8),c=cell(x,y);if(c.t===T.G){c.t=t;if(extra)extra(c)}}}
function paintInvert(cx,cy,r){for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){let c=cell(x,y);if(c&&dist({x,y},{x:cx,y:cy})<=r+.3){c.t=T.INV;c.job=null;c.val=0;c.life=null;c.lock=false;c.invertLabel=false}}let cc=cell(cx,cy);if(cc)cc.invertLabel=true}
function place(path,idx,off,fn){let p=path[Math.min(path.length-1,idx)],x=p.x,y=cl(p.y+off,4,H-5);for(let r=0;r<8;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){let c=cell(xx,yy);if(c&&c.t===T.G){fn(c);return}}}
function river(rx){for(let y=3;y<H-3;y++){let c=cell(rx,y);c.t=T.W;c.job=null}let by=START.y;for(let y=4;y<H-4;y++)if(cell(rx-1,y).t===T.G&&cell(rx+1,y).t===T.G){by=y;break}let b=cell(rx,by);b.t=T.B;b.job='repair'}
function startArea(){for(let y=START.y-4;y<=START.y+4;y++)for(let x=START.x-3;x<=START.x+5;x++)blank(x,y);cell(START.x,START.y).t=T.V;cell(START.x+2,START.y).t=T.MN;cell(START.x+2,START.y).mine={worker:null};spawnCareer(START.x,START.y)}
function spawnCareer(cx,cy){let spots=[{x:cx+1,y:cy+2,t:T.HUT},{x:cx+3,y:cy+2,t:T.AR}];for(let s of spots){let c=cell(s.x,s.y);if(c&&c.t===T.G)c.t=s.t}}
function neigh(x,y){return[{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p=>pass(p.x,p.y))}
function findPath(a,b){let sx=Math.round(a.x),sy=Math.round(a.y),gx=Math.round(b.x),gy=Math.round(b.y);if(!pass(sx,sy)||!pass(gx,gy))return null;let q=[{x:sx,y:sy}],pre=new Map([[sx+','+sy,null]]);for(let h=0;h<q.length;h++){let u=q[h];for(let n of neigh(u.x,u.y)){let k=n.x+','+n.y;if(pre.has(k))continue;pre.set(k,u);if(n.x===gx&&n.y===gy){let p=[n],v=u;while(v){p.push(v);v=pre.get(v.x+','+v.y)}return p.reverse()}q.push(n)}}return null}
function toScreen(x,y){let s=S*zoom;return{x:(x-y)*s+cv.width/2+cam.x,y:(x+y)*s*.5+50+cam.y}}
function phase(){let p=(time%DAY)/DAY;return p>.66||p<.08?'night':p>.52?'dusk':'day'}const night=()=>phase()==='night';function phText(){return night()?'夜晚':phase()==='dusk'?'黄昏':'白天'}
function inInvert(o){let p={x:Math.round(o.x),y:Math.round(o.y)},c=cell(p.x,p.y);return c&&c.t===T.INV}
function update(dt){time+=dt;if(time>day*DAY)day++;pl.inv=Math.max(0,pl.inv-dt);if(!over){move(dt);reveal();pickup();life(dt);hover=findInteract(false);updateUnits(dt);updateRefs(dt);updateArchers(dt);updateFox(dt);spawnMonsters();updateMonsters(dt)}let p=toScreen(pl.x,pl.y);cam.x+=(cv.width/2-p.x)*.06;cam.y+=(cv.height/2-p.y)*.06}
function move(dt){let rx=(keys.d||keys.ArrowRight?1:0)-(keys.a||keys.ArrowLeft?1:0),ry=(keys.s||keys.ArrowDown?1:0)-(keys.w||keys.ArrowUp?1:0);let has=rx||ry;if(!has){pl.ctrlInv=inInvert(pl);return}if(has){let ax=Math.abs(rx),ay=Math.abs(ry);pl.dir=ax>=ay?{x:rx>0?1:-1,y:0}:{x:0,y:ry>0?1:-1}}let ix=rx,iy=ry;if(pl.ctrlInv){ix=-ix;iy=-iy}let l=Math.hypot(ix,iy)||1,nx=pl.x+ix/l*speed*dt,ny=pl.y+iy/l*speed*dt;if(pass(Math.round(nx),Math.round(pl.y)))pl.x=nx;if(pass(Math.round(pl.x),Math.round(ny)))pl.y=ny}
function reveal(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(dist({x,y},pl)<6||dist({x,y},START)<5||nearCamp(x,y))cell(x,y).seen=true}
function nearCamp(x,y){for(let h of [START,...camps()])if(dist({x,y},h)<4.5)return true;return false}
function pickup(){let got=0;for(let y=Math.floor(pl.y-1);y<=Math.ceil(pl.y+1);y++)for(let x=Math.floor(pl.x-1);x<=Math.ceil(pl.x+1);x++){let c=cell(x,y);if(c&&c.t===T.S&&dist(pl,{x,y})<.8){got+=c.val||1;blank(x,y)}}if(got){stone+=got;msg('获得辉石 +'+got)}}
function life(dt){for(let y=0;y<H;y++)for(let x=0;x<W;x++){let c=cell(x,y);if(c.t===T.S&&c.life!=null){c.life-=dt;if(c.life<=0)blank(x,y)}}}
function infoAt(x,y){let c=cell(x,y);if(!c||!c.seen||c.lock)return null;let act=null,label='',pri=99;if(c.t===T.GO){act='goal';label='抵达远方信标';pri=1}else if(c.t===T.RF&&c.ref){act='ref';label='招募流民 1';pri=2}else if(c.t===T.HUT){act='hut';label='流民转工人 1';pri=3}else if(c.t===T.AR){act='archer';label='流民转弓箭手 1';pri=4}else if(c.t===T.MN){act='mine';label=c.mine?.worker?'矿山已有工人':'派工采矿';pri=5}else if(c.t===T.FOX){act='fox';label='狐狸成亲';pri=6}else if(c.job==='chop'){act='chop';label='砍树 1';pri=7}else if(c.job==='repair'){act='repair';label='修桥 2';pri=8}else if(c.job==='camp'){act='camp';label='点亮旧火塘 2';pri=9}return act?{x,y,act,label,pri,d:dist(pl,{x,y})}:null}
function findInteract(v){let px=Math.round(pl.x),py=Math.round(pl.y),front=infoAt(px+pl.dir.x,py+pl.dir.y);if(front)return front;let a=[];for(let y=py-2;y<=py+2;y++)for(let x=px-2;x<=px+2;x++){let t=infoAt(x,y);if(t&&t.d<=1.7)a.push(t)}a.sort((a,b)=>a.pri-b.pri||a.d-b.d);if(!a[0]&&v)msg('附近没有可互动目标。');return a[0]}
function interact(){let it=findInteract(false);if(!it)return placeStone();let c=cell(it.x,it.y);if(it.act==='goal'){msg('你听见了远处像海一样的风。阶段目标完成。');return}if(it.act==='ref')return recruit(it,c);if(it.act==='hut')return convert('worker');if(it.act==='archer')return convert('archer');if(it.act==='mine')return sendMine(it,c);if(it.act==='fox')return startFox(it,c);let cost=it.act==='repair'||it.act==='camp'?2:1;if(stone<cost)return msg('辉石不足。');let locs=it.act==='camp'?[{x:it.x,y:it.y}]:neigh(it.x,it.y),b=bestWorker(locs);if(!b)return msg('没有可用工人或道路不通。');stone-=cost;c.lock=true;let h=nearestHome(b);Object.assign(b,{job:{type:it.act,tx:it.x,ty:it.y},path:b.path,pi:1,state:'moving',carry:cost,prog:0,homeX:h.x,homeY:h.y,flee:false});msg('工人出发：'+it.label)}
function placeStone(){if(stone<=0)return msg('没有辉石可放置。');let px=Math.round(pl.x),py=Math.round(pl.y),spots=[{x:px,y:py},...neigh(px,py)],p=spots.find(s=>cell(s.x,s.y)?.t===T.G);if(!p)return msg('附近没有可放置辉石的空地。');stone--;let c=cell(p.x,p.y);c.t=T.S;c.val=1;c.life=10;msg('放置辉石 -1。')}
function recruit(it,c){if(stone<1)return msg('辉石不足。');let p=homePath({x:it.x,y:it.y});if(!p)return msg('流民找不到回营地的路。');stone--;c.ref=false;c.lock=true;refs.push({x:it.x,y:it.y,ox:it.x,oy:it.y,path:p,pi:1,lost:false});msg('流民开始返回安全点。')}
function convert(kind){if(stone<1)return msg('辉石不足。');if(!pop.length)return msg('没有未转职流民。');let r=pop.shift();stone--;if(kind==='worker'){workers.push(mkUnit('worker',r.x,r.y));msg('流民在工棚转职为工人。')}else{archers.push(mkUnit('archer',r.x,r.y));msg('流民在弓箭营转职为弓箭手。')}}
function bestWorker(locs){let best=null,bp=null;for(let w of workers.filter(w=>!w.lost&&(w.state==='idle'||w.state==='return')))for(let d of locs){let p=findPath(w,d);if(p&&(!bp||p.length<bp.length)){best=w;bp=p}}if(best){best.path=bp;return best}return null}
function sendMine(it,c){if(c.mine?.worker)return msg('矿山已有工人。');let w=bestWorker([{x:it.x,y:it.y}]);if(!w)return msg('没有可用工人或道路不通。');c.lock=true;let h=nearestHome(w);Object.assign(w,{job:{type:'mine',tx:it.x,ty:it.y},state:'moving',pi:1,prog:0,homeX:h.x,homeY:h.y,flee:false});msg('工人前往矿山。')}
function updateUnits(dt){for(let w of workers){if(w.lost)continue;if(w.state!=='mining')checkThreat(w);if(w.state==='mining'){w.prog+=dt;if(w.prog>30){w.prog=0;drop(w.x,w.y,1);msg('矿山产出 1 个辉石。')}continue}if(!w.job)continue;if(w.state==='moving'||w.state==='return')walk(w,dt);else if(w.state==='work'){w.prog+=dt*(night()&&!safe(w.x,w.y)?.35:1);if(w.prog>4)finish(w)}}}
function checkThreat(w){if(safe(w.x,w.y)||w.state==='return')return;let m=monsters.find(m=>Math.abs(m.x-w.x)<=3&&Math.abs(m.y-w.y)<=3);if(!m)return;release(w);let p=findPath(w,{x:w.homeX||START.x,y:w.homeY||START.y})||homePath(w);if(p){Object.assign(w,{job:{type:'return'},path:p,pi:1,state:'return',prog:0,carry:0,flee:true});msg('工人发现黑影，撤回出发营地。')}}
function walk(u,dt){if(!u.path||u.pi>=u.path.length){if(u.state==='return')home(u);else u.state='work';return}let g=u.path[u.pi],d=dist(u,g);if(d>.05){let sp=night()&&!safe(u.x,u.y)?1.1:2.25;u.x+=(g.x-u.x)/d*sp*dt;u.y+=(g.y-u.y)/d*sp*dt}else{u.x=g.x;u.y=g.y;u.pi++;if(u.pi>=u.path.length){if(u.state==='return')home(u);else u.state='work'}}}
function release(u){if(u.job&&u.job.type!=='return'){let c=cell(u.job.tx,u.job.ty);if(c)c.lock=false}u.job=null;u.path=[];u.pi=0;u.prog=0}
function finish(w){let {tx,ty,type}=w.job,c=cell(tx,ty);if(type==='chop'){blank(tx,ty);drop(tx,ty,1);msg('树障被清开，掉落 1 个辉石。')}if(type==='repair'){c.t=T.BR;c.job=null;c.lock=false;msg('断桥修复完成。')}if(type==='camp'){c.t=T.C;c.job=null;c.lock=false;w.x=tx;w.y=ty;spawnCareer(tx,ty);createMine(tx,ty);Object.assign(w,{job:null,state:'idle',path:[],pi:0,prog:0,carry:0,homeX:tx,homeY:ty,flee:false});msg('新营地建成，工人留在当前营地。');return}if(type==='mine'){c.lock=false;c.mine.worker=w.id;Object.assign(w,{x:tx,y:ty,state:'mining',job:null,path:[],pi:0,prog:0,carry:0});msg('工人开始采矿。');return}w.carry=0;let p=homePath(w);if(!p)return home(w);w.job={type:'return'};w.path=p;w.pi=1;w.state='return';w.prog=0}
function home(w){Object.assign(w,{job:null,state:'idle',path:[],pi:0,prog:0,carry:0,flee:false})}
function createMine(x,y){for(let r=1;r<4;r++)for(let yy=y-r;yy<=y+r;yy++)for(let xx=x-r;xx<=x+r;xx++){let c=cell(xx,yy);if(c&&c.t===T.G){c.t=T.MN;c.mine={worker:null};return}}}
function camps(){let a=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.C)a.push({x,y});return a}
function nearestHome(o){let hs=[START,...camps()],best=START,bd=999;for(let h of hs){let d=dist(o,h);if(d<bd){bd=d;best=h}}return best}
function homePath(o){let hs=[START,...camps()],best=null;for(let h of hs){let p=findPath(o,h);if(p&&(!best||p.length<best.length))best=p}return best}
function updateRefs(dt){for(let r of refs){if(r.lost)continue;if(!r.path||r.pi>=r.path.length){pop.push({x:r.x,y:r.y});r.done=true;let c=cell(r.ox,r.oy);if(c)c.lock=false;msg('流民抵达安全点，等待转职。');continue}let g=r.path[r.pi],d=dist(r,g);if(d>.05){let sp=night()&&!safe(r.x,r.y)?1.15:1.75;r.x+=(g.x-r.x)/d*sp*dt;r.y+=(g.y-r.y)/d*sp*dt}else{r.x=g.x;r.y=g.y;r.pi++}}refs=refs.filter(r=>!r.done&&!r.lost)}
function updateArchers(dt){for(let a of archers){a.shoot=Math.max(0,a.shoot-dt);if(night()&&a.shoot<=0){let m=monsters.find(m=>dist(a,m)<5.5);if(m){m.dead=true;a.shoot=2.2;msg('弓箭手驱散了一只黑林影。')}}}}
function safe(x,y){if(dist({x,y},START)<3.2)return true;for(let h of camps())if(dist({x,y},h)<3.1)return true;return false}
function spawnMonsters(){if(!night()||monsters.length>5||Math.random()>.018)return;let fs=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(cell(x,y).t===T.FOG)fs.push({x,y});if(!fs.length)return;let targets=[];workers.filter(w=>!w.lost&&!safe(w.x,w.y)).forEach(w=>targets.push({type:'w',id:w.id,x:w.x,y:w.y}));refs.filter(r=>!r.lost&&!safe(r.x,r.y)).forEach((r,i)=>targets.push({type:'r',id:i,x:r.x,y:r.y}));if(!safe(pl.x,pl.y)&&pl.inv<=0)targets.push({type:'p',x:pl.x,y:pl.y});if(!targets.length)return;let f=fs[rnd(fs.length)];monsters.push({x:f.x,y:f.y,t:targets[rnd(targets.length)]})}
function target(m){if(m.t.type==='p')return !safe(pl.x,pl.y)&&pl.inv<=0?pl:null;if(m.t.type==='w'){let w=workers.find(w=>w.id===m.t.id&&!w.lost&&!safe(w.x,w.y));return w||null}if(m.t.type==='r'){let r=refs[m.t.id];return r&&!r.lost&&!safe(r.x,r.y)?r:null}return null}
function updateMonsters(dt){for(let m of monsters){let t=target(m);if(!t||!night()){m.dead=true;continue}let d=dist(m,t);if(d>.05){m.x+=(t.x-m.x)/d*1.6*dt;m.y+=(t.y-m.y)/d*1.6*dt}if(d<.35){if(m.t.type==='p')hitPlayer();else if(m.t.type==='w')hitWorker(m.t.id);else if(m.t.type==='r')hitRef(m.t.id);m.dead=true}}monsters=monsters.filter(m=>!m.dead)}
function hitPlayer(){pl.inv=1.6;if(stone>0){stone--;drop(pl.x,pl.y,1);msg('你被袭击，掉落 1 个辉石。')}else{over=true;msg('辉石耗尽，旅程中断。')}}function hitWorker(id){let w=workers.find(w=>w.id===id);if(!w)return;release(w);w.lost=true;msg('一名工人被黑林影拖走。')}function hitRef(i){let r=refs[i];if(!r)return;r.lost=true;let c=cell(r.ox,r.oy);if(c)c.lock=false;msg('流民在返程中失踪。')}function drop(x,y,n){for(let i=0;i<n;i++){let pts=[];for(let yy=Math.round(y)-2;yy<=Math.round(y)+2;yy++)for(let xx=Math.round(x)-2;xx<=Math.round(x)+2;xx++){let c=cell(xx,yy);if(c&&c.t===T.G)pts.push({x:xx,y:yy})}if(pts.length){let p=pts[rnd(pts.length)],c=cell(p.x,p.y);c.t=T.S;c.val=1;c.life=10}}}
function startFox(it,c){if(foxEvent&&foxEvent.active)return msg('婚仪正在进行。');foxes=[];for(let i=0;i<5;i++)foxes.push({x:it.x-i*.8,y:it.y});foxEvent={active:true,timer:0,origin:{x:it.x,y:it.y},fail:false};c.lock=true;msg('狐狸婚仪开始：跟随队伍，队伍停下时也要停下。')}
function updateFox(dt){if(!foxEvent?.active)return;foxEvent.timer+=dt;let moving=foxEvent.timer%4<2.8;for(let i=0;i<foxes.length;i++){let f=foxes[i];if(moving)f.x+=dt*.75;f.y=foxEvent.origin.y+Math.sin((foxEvent.timer+i)*2)*.08}let lead=foxes[0],pd=dist(pl,lead),movingPlayer=Math.hypot((keys.d||keys.ArrowRight?1:0)-(keys.a||keys.ArrowLeft?1:0),(keys.s||keys.ArrowDown?1:0)-(keys.w||keys.ArrowUp?1:0))>0;if(pd>3.2)foxEvent.fail=true;if(!moving&&movingPlayer&&pd<3.5)foxEvent.fail=true;if(foxEvent.fail){endFox(false);return}if(foxEvent.timer>13)endFox(true)}
function endFox(ok){let c=cell(Math.round(foxEvent.origin.x),Math.round(foxEvent.origin.y));if(c){c.lock=false;c.t=T.G}if(ok){stone+=4;msg('你完成了狐狸婚仪，获得辉石 +4。')}else msg('你扰乱了婚仪，狐狸队伍消失了。');foxEvent.active=false;foxes=[]}
function draw(){bg();let list=[];for(let y=0;y<H;y++)for(let x=0;x<W;x++){let p=toScreen(x,y);if(p.x>-80&&p.x<cv.width+80&&p.y>-80&&p.y<cv.height+80)list.push({x,y,o:x+y})}list.sort((a,b)=>a.o-b.o);list.forEach(p=>drawTile(p.x,p.y));zones();paths();refs.forEach(drawRef);pop.forEach(drawPop);workers.forEach(drawWorker);archers.forEach(drawArcher);foxes.forEach(drawFox);monsters.forEach(drawMonster);drawPlayer();overlay();mini();drawHud()}
function bg(){ctx.fillStyle=night()?'#071013':phase()==='dusk'?'#17272a':'#162d2e';ctx.fillRect(0,0,cv.width,cv.height)}
function diamond(p,col,st){let s=S*zoom;ctx.beginPath();ctx.moveTo(p.x,p.y-s*.45);ctx.lineTo(p.x+s,p.y);ctx.lineTo(p.x,p.y+s*.45);ctx.lineTo(p.x-s,p.y);ctx.closePath();ctx.fillStyle=col;ctx.fill();if(st){ctx.strokeStyle=st;ctx.stroke()}}
function drawTile(x,y){let c=cell(x,y),p=toScreen(x,y);if(!c.seen){diamond(p,'#071010','rgba(255,255,255,.02)');return}let col=['#183125','#375b45','#213f50','#67462e','#785535','#5e6040','#42583b','#79bdb2','#3b4239','#6a5236','#1a111f','#3e244d','#6a5330','#4d5934','#5a3b52','#315b76','#4b4b3e'][c.t]||'#355945';diamond(p,col,hover&&hover.x===x&&hover.y===y?'#fff1b8':'rgba(255,255,255,.05)');let z=zoom;if(c.t===T.F&&c.job==='chop')label(p.x,p.y-20*z,c.lock?'砍树中':'可砍树');if(c.t===T.S)stoneDraw(p.x,p.y-8*z,c.val);if(c.t===T.MN)label(p.x,p.y-24*z,c.mine?.worker?'采矿中':'矿山');if(c.t===T.RF)label(p.x,p.y-24*z,c.ref?'流民火堆':'空火堆');if(c.t===T.HUT)label(p.x,p.y-24*z,'工棚');if(c.t===T.AR)label(p.x,p.y-24*z,'弓箭营');if(c.t===T.INV&&c.invertLabel)label(p.x,p.y-24*z,'颠倒森林');if(c.t===T.FOX)label(p.x,p.y-24*z,'狐狸成亲');if(c.t===T.FOG)label(p.x,p.y-24*z,'黑雾口');if(c.t===T.B)label(p.x,p.y-24*z,c.lock?'修桥中':'断桥');if(c.t===T.C)label(p.x,p.y-24*z,'营地');if(c.t===T.FS)label(p.x,p.y-24*z,c.lock?'点亮中':'旧火塘');if(c.t===T.V)label(p.x,p.y-24*z,'部落');if(c.t===T.GO)label(p.x,p.y-24*z,'远方信标');if(hover&&hover.x===x&&hover.y===y)label(p.x,p.y-44*z,hover.label)}
function label(x,y,t){ctx.font='12px system-ui';let w=ctx.measureText(t).width+12;ctx.fillStyle='rgba(7,15,17,.78)';ctx.beginPath();ctx.roundRect(x-w/2,y-14,w,22,10);ctx.fill();ctx.fillStyle='#eaf3ef';ctx.textAlign='center';ctx.fillText(t,x,y+2)}
function stoneDraw(x,y,v){ctx.fillStyle='#98d6ca';ctx.beginPath();ctx.arc(x,y,6,0,7);ctx.fill();if(v>1){ctx.beginPath();ctx.arc(x+8,y+4,5,0,7);ctx.fill()}}
function zones(){for(let h of [START,...camps()]){let p=toScreen(h.x,h.y);ctx.fillStyle='rgba(255,180,82,.14)';ctx.beginPath();ctx.ellipse(p.x,p.y,95*zoom,55*zoom,0,0,7);ctx.fill()}}
function paths(){ctx.strokeStyle='rgba(255,241,184,.22)';ctx.lineWidth=2;for(let u of [...workers,...refs]){if(!u.path||u.pi>=u.path.length)continue;ctx.beginPath();let p=toScreen(u.x,u.y);ctx.moveTo(p.x,p.y);for(let i=u.pi;i<u.path.length;i++){p=toScreen(u.path[i].x,u.path[i].y);ctx.lineTo(p.x,p.y)}ctx.stroke()}}
function drawUnit(u,col,txt){if(u.lost)return;let p=toScreen(u.x,u.y);ctx.fillStyle=col;ctx.beginPath();ctx.arc(p.x,p.y-15,6,0,7);ctx.fill();ctx.fillRect(p.x-5,p.y-9,10,13);if(txt)label(p.x,p.y-32,txt)}
function drawWorker(w){let txt='工人';if(w.state==='mining')txt='采矿 '+Math.ceil(30-w.prog);else if(w.state==='moving')txt='前往';else if(w.state==='work')txt=(w.job?.type==='chop'?'砍树 ':w.job?.type==='repair'?'修桥 ':w.job?.type==='camp'?'点火 ':'工作 ')+Math.ceil(4-w.prog);else if(w.state==='return')txt=w.flee?'撤退':'返回';drawUnit(w,'#d5c59c',txt)}function drawArcher(a){drawUnit(a,'#b8d7a4',a.shoot>0?'射击':'弓箭手')}function drawRef(r){drawUnit(r,'#f0d3aa','流民返回')}function drawPop(p){drawUnit(p,'#caa06a','未转职流民')}function drawFox(f){drawUnit(f,'#e49b55','狐')}function drawMonster(m){drawUnit(m,'#111','黑林影')}
function drawPlayer(){let p=toScreen(pl.x,pl.y),ap=toScreen(pl.x+pl.dir.x*.55,pl.y+pl.dir.y*.55);ctx.strokeStyle='#fff1b8';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(p.x,p.y-4);ctx.lineTo(ap.x,ap.y-4);ctx.stroke();ctx.fillStyle=pl.inv>0?'#fff':'#f0cfa3';ctx.beginPath();ctx.arc(p.x,p.y-18,7,0,7);ctx.fill();ctx.fillStyle='#b66f48';ctx.fillRect(p.x-7,p.y-11,14,18);if(pl.ctrlInv)label(p.x,p.y-42,'方向反转')}
function overlay(){ctx.fillStyle='rgba(2,8,18,'+(night()?.42:phase()==='dusk'?.2:.05)+')';ctx.fillRect(0,0,cv.width,cv.height);if(over){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#fff1b8';ctx.textAlign='center';ctx.font='bold 34px system-ui';ctx.fillText('旅程中断',cv.width/2,cv.height/2)}}
function mini(){let s=128,x0=cv.width-s-22,y0=18;ctx.fillStyle='rgba(7,16,17,.62)';ctx.beginPath();ctx.roundRect(x0-8,y0-8,s+16,s+16,12);ctx.fill();for(let y=0;y<H;y++)for(let x=0;x<W;x++){let c=cell(x,y);if(!c.seen)continue;ctx.fillStyle=c.t===T.W?'#315b76':c.t===T.C?'#e59e54':c.t===T.INV?'#8e62aa':c.t===T.FOX?'#e49b55':c.t===T.HUT?'#c2a36a':c.t===T.AR?'#9ab57d':c.t===T.FOG?'#7d4fa0':c.t===T.S?'#b6eee4':'#496d54';ctx.fillRect(x0+x/W*s,y0+y/H*s,Math.ceil(s/W),Math.ceil(s/H))}ctx.fillStyle='#fff1b8';ctx.beginPath();ctx.arc(x0+pl.x/W*s,y0+pl.y/H*s,3,0,7);ctx.fill()}
function drawHud(){let idle=workers.filter(w=>!w.lost&&w.state==='idle').length,alive=workers.filter(w=>!w.lost).length;topHud.innerHTML=`第 ${day} 天 · ${phText()}${pl.ctrlInv?' · 颠倒森林':''}`;hud.innerHTML=`<h1>《看海去》GPT_DEMO gpt.11.2</h1>辉石：<b>${stone}</b>　玩家：<b>${safe(pl.x,pl.y)?'安全圈内':night()?'危险':'安全'}</b><br>工人：<b>${idle}/${alive}</b> 空闲　弓箭手：<b>${archers.length}</b>　未转职流民：<b>${pop.length}</b><br>返程流民：<b>${refs.length}</b>　怪物：<b>${monsters.length}</b>　狐狸奇遇：<b>${foxEvent?.active?'进行中':'未触发/已结束'}</b><br>当前互动：<b>${hover?hover.label:'面前/附近无可互动目标；Space 可放置辉石'}</b><br><span class="small">gpt.11.2：每个营地生成工棚/弓箭营；颠倒森林只显示一次名称；Space 无互动时放置辉石；进出颠倒森林不卡顿。</span>`}
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault();interact()}if(e.key.toLowerCase()==='r')resetGame()});addEventListener('keyup',e=>keys[e.key]=false);
let last=performance.now(),fa=0,fn=0;function loop(now){let dt=Math.min(.05,(now-last)/1000);last=now;fa+=dt;fn++;if(fa>.5){fpsEl.textContent=Math.round(fn/fa);fa=0;fn=0}update(dt);draw();requestAnimationFrame(loop)}
resize();resetGame();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
