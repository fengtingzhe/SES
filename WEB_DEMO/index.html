<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>《看海去》Demo v0.1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1516; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #eaf2ef; }
    #game { width: 100vw; height: 100vh; display: block; cursor: crosshair; }
    .hud { position: fixed; left: 18px; top: 16px; padding: 14px 16px; background: rgba(7, 16, 18, .72); border: 1px solid rgba(211, 235, 225, .18); border-radius: 14px; backdrop-filter: blur(8px); line-height: 1.65; font-size: 14px; box-shadow: 0 10px 32px rgba(0,0,0,.25); }
    .hud b { color: #fff5c2; }
    .help { position: fixed; right: 18px; bottom: 16px; max-width: 430px; padding: 12px 14px; background: rgba(7, 16, 18, .66); border: 1px solid rgba(211, 235, 225, .16); border-radius: 14px; color: #c8d9d2; font-size: 13px; line-height: 1.6; }
    .toast { position: fixed; left: 50%; transform: translateX(-50%); top: 20px; padding: 10px 16px; border-radius: 999px; background: rgba(255,255,255,.88); color: #173032; font-weight: 700; opacity: 0; transition: opacity .2s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud" id="hud"></div>
<div class="toast" id="toast"></div>
<div class="help">
  <b>操作</b>：WASD / 方向键移动；点击树障/断桥/空地派工；Space 投掷辉石临时光圈；R 随机重开。<br />
  <b>验证点</b>：辉石分配、工人不可取消、夜晚黑林影抓落单工人、营火安全圈。
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const toastEl = document.getElementById('toast');

  const TILE_W = 72;
  const TILE_H = 38;
  const MAP_W = 24;
  const MAP_H = 24;
  const DAY_LENGTH = 70; // seconds
  const START = { x: 3, y: 12 };
  const GOAL = { x: 20, y: 12 };

  let map, player, workers, monsters, pulses, keys, time, stones, dayIndex, reachedGoal, camera;
  let toastTimer = 0;

  const TILE = {
    GRASS: 'grass', FOREST: 'forest', WATER: 'water', BRIDGE_BROKEN: 'bridge_broken', BRIDGE: 'bridge', CAMP: 'camp', VILLAGE: 'village', GOAL: 'goal', STONE: 'stone'
  };

  function rand(n) { return Math.floor(Math.random() * n); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  function reset() {
    map = makeMap();
    player = { x: START.x, y: START.y, px: START.x, py: START.y, speed: 4.2 };
    workers = [0,1,2].map(i => ({ id: i + 1, x: START.x, y: START.y + i - 1, target: null, state: 'idle', progress: 0, scared: false, lost: false }));
    monsters = [];
    pulses = [];
    keys = {};
    time = 10;
    stones = 3;
    dayIndex = 1;
    reachedGoal = false;
    camera = { x: 0, y: 0 };
    showToast('新的森林生成了。去寻找蓝色信标。');
  }

  function makeMap() {
    const m = Array.from({ length: MAP_H }, (_, y) => Array.from({ length: MAP_W }, (_, x) => ({ type: TILE.FOREST, seen: false, task: null })));

    // 主路径：从部落到目标，生成一条可逐步开路的随机路径
    let y = START.y;
    for (let x = START.x; x <= GOAL.x; x++) {
      y = clamp(y + rand(3) - 1, 5, 18);
      carve(m, x, y);
      carve(m, x, y - 1);
      carve(m, x, y + 1);
      if (x % 4 === 0) carve(m, x, y + (Math.random() < .5 ? 2 : -2));
    }

    // 河流与断桥
    const riverX = 12 + rand(3) - 1;
    for (let yy = 2; yy < MAP_H - 2; yy++) {
      m[yy][riverX].type = TILE.WATER;
      if (Math.random() < .35) m[yy][riverX + 1].type = TILE.WATER;
    }
    const bridgeY = y;
    m[bridgeY][riverX].type = TILE.BRIDGE_BROKEN;
    m[bridgeY][riverX].task = 'repair_bridge';

    // 随机树障
    for (let i = 0; i < 18; i++) {
      const x = 6 + rand(12), yy = 4 + rand(16);
      if (m[yy][x].type === TILE.GRASS && Math.random() < .55) {
        m[yy][x].type = TILE.FOREST;
        m[yy][x].task = 'chop_tree';
      }
    }

    // 辉石点
    for (let i = 0; i < 14; i++) {
      const x = 4 + rand(17), yy = 4 + rand(16);
      if (m[yy][x].type === TILE.GRASS) m[yy][x].type = TILE.STONE;
    }

    m[START.y][START.x].type = TILE.VILLAGE;
    m[GOAL.y][GOAL.x].type = TILE.GOAL;
    return m;
  }

  function carve(m, x, y) {
    if (m[y] && m[y][x]) m[y][x].type = TILE.GRASS;
  }

  function passable(x, y) {
    if (!map[y] || !map[y][x]) return false;
    const t = map[y][x].type;
    return [TILE.GRASS, TILE.CAMP, TILE.VILLAGE, TILE.GOAL, TILE.STONE, TILE.BRIDGE].includes(t);
  }

  function screenFromTile(x, y) {
    return { x: (x - y) * TILE_W / 2 + canvas.width / 2 + camera.x, y: (x + y) * TILE_H / 2 + 80 + camera.y };
  }

  function tileFromScreen(sx, sy) {
    const x0 = sx - canvas.width / 2 - camera.x;
    const y0 = sy - 80 - camera.y;
    const x = Math.floor((y0 / (TILE_H / 2) + x0 / (TILE_W / 2)) / 2);
    const y = Math.floor((y0 / (TILE_H / 2) - x0 / (TILE_W / 2)) / 2);
    return { x, y };
  }

  function isNight() {
    const p = (time % DAY_LENGTH) / DAY_LENGTH;
    return p > .64 || p < .08;
  }
  function isDusk() {
    const p = (time % DAY_LENGTH) / DAY_LENGTH;
    return p > .52 && p <= .64;
  }

  function nearestIdleWorker() {
    return workers.find(w => !w.lost && w.state === 'idle');
  }

  function issueTask(x, y) {
    const cell = map[y]?.[x];
    if (!cell || reachedGoal) return;
    const w = nearestIdleWorker();
    if (!w) return showToast('没有空闲工人。');

    let cost = 0, task = null;
    if (cell.task === 'chop_tree') { cost = 1; task = 'chop_tree'; }
    else if (cell.task === 'repair_bridge') { cost = 2; task = 'repair_bridge'; }
    else if (cell.type === TILE.GRASS) { cost = 2; task = 'build_camp'; }
    else return;

    if (stones < cost) return showToast('辉石不足。');
    stones -= cost;
    w.target = { x, y, task };
    w.state = 'moving';
    w.progress = 0;
    showToast(`工人 ${w.id} 已出发，命令不可取消。`);
  }

  function update(dt) {
    time += dt;
    if (time > dayIndex * DAY_LENGTH) dayIndex++;

    let dx = 0, dy = 0;
    if (keys.ArrowUp || keys.w) dy -= 1;
    if (keys.ArrowDown || keys.s) dy += 1;
    if (keys.ArrowLeft || keys.a) dx -= 1;
    if (keys.ArrowRight || keys.d) dx += 1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = player.x + dx / len * player.speed * dt;
    const ny = player.y + dy / len * player.speed * dt;
    if (passable(Math.round(nx), Math.round(player.y))) player.x = nx;
    if (passable(Math.round(player.x), Math.round(ny))) player.y = ny;
    player.x = clamp(player.x, 0, MAP_W - 1); player.y = clamp(player.y, 0, MAP_H - 1);

    const pc = map[Math.round(player.y)]?.[Math.round(player.x)];
    if (pc?.type === TILE.STONE) { pc.type = TILE.GRASS; stones += 2; showToast('获得辉石 +2'); }
    if (pc?.type === TILE.GOAL && !reachedGoal) { reachedGoal = true; showToast('你抵达了蓝色信标，听见了远方的海风。'); }

    reveal();
    updateWorkers(dt);
    updateMonsters(dt);
    updatePulses(dt);
    maybeSpawnMonster();

    const p = screenFromTile(player.x, player.y);
    camera.x += (canvas.width / 2 - p.x) * .04;
    camera.y += (canvas.height / 2 - p.y) * .04;
  }

  function reveal() {
    for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) {
      if (dist({x, y}, player) < 4.6 || dist({x, y}, START) < 3.2) map[y][x].seen = true;
    }
  }

  function updateWorkers(dt) {
    for (const w of workers) {
      if (w.lost || !w.target) continue;
      const safe = inSafeZone(w.x, w.y);
      w.scared = isNight() && !safe;
      const sp = w.scared ? 1.2 : 2.1;
      const tx = w.target.x, ty = w.target.y;
      const d = Math.hypot(tx - w.x, ty - w.y);
      if (w.state === 'moving') {
        if (d > .08) { w.x += (tx - w.x) / d * sp * dt; w.y += (ty - w.y) / d * sp * dt; }
        else { w.x = tx; w.y = ty; w.state = 'working'; }
      } else if (w.state === 'working') {
        w.progress += dt * (w.scared ? .35 : 1);
        if (w.progress >= 4) finishTask(w);
      }
    }
  }

  function finishTask(w) {
    const cell = map[w.target.y][w.target.x];
    if (w.target.task === 'chop_tree') { cell.type = TILE.GRASS; cell.task = null; showToast('森林被清开了一段。'); }
    if (w.target.task === 'repair_bridge') { cell.type = TILE.BRIDGE; cell.task = null; showToast('断桥修好了。'); }
    if (w.target.task === 'build_camp') { cell.type = TILE.CAMP; showToast('新的营火点亮了。'); }
    w.target = null; w.state = 'idle'; w.progress = 0; w.scared = false;
  }

  function maybeSpawnMonster() {
    if (!isNight() || monsters.length > 3 || Math.random() > .012) return;
    const candidates = workers.filter(w => !w.lost && !inSafeZone(w.x, w.y));
    if (!candidates.length) return;
    const t = candidates[rand(candidates.length)];
    monsters.push({ x: t.x + (Math.random() < .5 ? -5 : 5), y: t.y + rand(7) - 3, targetId: t.id });
  }

  function updateMonsters(dt) {
    for (const m of monsters) {
      const target = workers.find(w => w.id === m.targetId && !w.lost && !inSafeZone(w.x, w.y));
      if (!target || !isNight()) { m.dead = true; continue; }
      const d = Math.hypot(target.x - m.x, target.y - m.y);
      if (d > .05) { m.x += (target.x - m.x) / d * 1.7 * dt; m.y += (target.y - m.y) / d * 1.7 * dt; }
      if (d < .35) { target.lost = true; target.state = 'lost'; m.dead = true; showToast(`工人 ${target.id} 被黑林影拖走了。`); }
    }
    monsters = monsters.filter(m => !m.dead);
  }

  function updatePulses(dt) {
    for (const p of pulses) p.life -= dt;
    pulses = pulses.filter(p => p.life > 0);
  }

  function inSafeZone(x, y) {
    if (dist({x, y}, START) < 3.1) return true;
    for (let yy = 0; yy < MAP_H; yy++) for (let xx = 0; xx < MAP_W; xx++) {
      if (map[yy][xx].type === TILE.CAMP && dist({x, y}, {x: xx, y: yy}) < 3.2) return true;
    }
    return pulses.some(p => dist({x, y}, p) < 2.4);
  }

  function throwPulse() {
    if (stones <= 0) return showToast('没有辉石可投掷。');
    stones--;
    pulses.push({ x: player.x, y: player.y, life: 12 });
    showToast('辉石光圈展开。');
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawSkyOverlay();
    const order = [];
    for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) order.push({x,y});
    order.sort((a,b) => (a.x+a.y) - (b.x+b.y));
    for (const c of order) drawTile(c.x, c.y);
    drawSafeZones();
    for (const w of workers) drawWorker(w);
    for (const m of monsters) drawMonster(m);
    drawPlayer();
    drawNightOverlay();
    drawHud();
  }

  function diamond(p, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - TILE_H/2); ctx.lineTo(p.x + TILE_W/2, p.y); ctx.lineTo(p.x, p.y + TILE_H/2); ctx.lineTo(p.x - TILE_W/2, p.y); ctx.closePath();
    ctx.fillStyle = fill; ctx.fill(); if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
  }

  function drawTile(x, y) {
    const cell = map[y][x];
    const p = screenFromTile(x, y);
    const fog = !cell.seen;
    let fill = '#213f33';
    if (cell.type === TILE.GRASS) fill = '#355d49';
    if (cell.type === TILE.WATER) fill = '#24495e';
    if (cell.type === TILE.BRIDGE || cell.type === TILE.BRIDGE_BROKEN) fill = '#6a4c31';
    if (cell.type === TILE.CAMP) fill = '#3c6046';
    if (cell.type === TILE.VILLAGE) fill = '#576344';
    if (cell.type === TILE.GOAL) fill = '#315d75';
    if (cell.type === TILE.STONE) fill = '#3f6758';
    diamond(p, fog ? '#111b1b' : fill, 'rgba(255,255,255,.045)');
    if (fog) return;
    if (cell.type === TILE.FOREST) drawTree(p.x, p.y - 8, cell.task);
    if (cell.type === TILE.STONE) drawStone(p.x, p.y - 8);
    if (cell.type === TILE.CAMP) drawCamp(p.x, p.y - 4);
    if (cell.type === TILE.VILLAGE) drawVillage(p.x, p.y - 4);
    if (cell.type === TILE.BRIDGE_BROKEN) drawLabel(p.x, p.y - 28, '修桥 2');
    if (cell.type === TILE.GOAL) drawBeacon(p.x, p.y - 20);
    if (cell.task === 'chop_tree') drawLabel(p.x, p.y - 44, '砍树 1');
  }

  function drawTree(x, y, task) {
    ctx.fillStyle = '#13241f'; ctx.fillRect(x - 4, y + 9, 8, 16);
    ctx.fillStyle = task ? '#254834' : '#183327';
    ctx.beginPath(); ctx.moveTo(x, y - 28); ctx.lineTo(x + 18, y + 14); ctx.lineTo(x - 18, y + 14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(180,220,190,.1)'; ctx.fillRect(x - 7, y - 5, 14, 2);
  }

  function drawStone(x, y) {
    ctx.fillStyle = '#9fd4c8'; ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e9fffa'; ctx.beginPath(); ctx.arc(x-2, y-3, 2, 0, Math.PI*2); ctx.fill();
  }

  function drawCamp(x, y) {
    ctx.fillStyle = '#ffb65d'; ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff0a8'; ctx.beginPath(); ctx.arc(x, y-2, 4, 0, Math.PI*2); ctx.fill();
  }

  function drawVillage(x, y) {
    ctx.fillStyle = '#5d3f2f'; ctx.fillRect(x - 16, y - 12, 32, 20);
    ctx.fillStyle = '#9a7452'; ctx.beginPath(); ctx.moveTo(x-20,y-12); ctx.lineTo(x,y-30); ctx.lineTo(x+20,y-12); ctx.closePath(); ctx.fill();
    drawLabel(x, y - 42, '部落');
  }

  function drawBeacon(x, y) {
    ctx.strokeStyle = '#9ee5ff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x, y+22); ctx.lineTo(x, y-22); ctx.stroke();
    ctx.fillStyle = '#83dbff'; ctx.beginPath(); ctx.arc(x, y-26, 10, 0, Math.PI*2); ctx.fill();
    drawLabel(x, y - 50, '蓝色信标');
  }

  function drawLabel(x, y, text) {
    ctx.font = '12px system-ui';
    const w = ctx.measureText(text).width + 14;
    ctx.fillStyle = 'rgba(10,20,22,.72)'; roundRect(x - w/2, y - 12, w, 22, 10); ctx.fill();
    ctx.fillStyle = '#eaf2ef'; ctx.textAlign = 'center'; ctx.fillText(text, x, y + 3);
  }

  function drawSafeZones() {
    const zones = [{x: START.x, y: START.y, r: 3.1, c: 'rgba(255,215,120,.16)'}];
    for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) if (map[y][x].type === TILE.CAMP) zones.push({x,y,r:3.2,c:'rgba(255,180,80,.18)'});
    for (const p of pulses) zones.push({x:p.x,y:p.y,r:2.4,c:'rgba(150,225,255,.22)'});
    for (const z of zones) {
      const p = screenFromTile(z.x, z.y);
      ctx.fillStyle = z.c; ctx.beginPath(); ctx.ellipse(p.x, p.y, z.r*34, z.r*20, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawPlayer() {
    const p = screenFromTile(player.x, player.y);
    ctx.fillStyle = '#f2d2a4'; ctx.beginPath(); ctx.arc(p.x, p.y - 26, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#b76f48'; ctx.fillRect(p.x - 7, p.y - 20, 14, 20);
    ctx.strokeStyle = '#e6c58e'; ctx.beginPath(); ctx.moveTo(p.x + 8, p.y - 18); ctx.lineTo(p.x + 16, p.y + 6); ctx.stroke();
  }

  function drawWorker(w) {
    if (w.lost) return;
    const p = screenFromTile(w.x, w.y);
    ctx.fillStyle = w.scared ? '#ffd0d0' : '#d2c6a1'; ctx.beginPath(); ctx.arc(p.x, p.y - 20, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = w.scared ? '#7b3b3b' : '#6b6d4f'; ctx.fillRect(p.x - 6, p.y - 14, 12, 15);
    if (w.state === 'working') drawLabel(p.x, p.y - 36, Math.ceil(4 - w.progress));
    if (w.scared) drawLabel(p.x, p.y - 48, '!');
  }

  function drawMonster(m) {
    const p = screenFromTile(m.x, m.y);
    ctx.fillStyle = 'rgba(0,0,0,.72)'; ctx.beginPath(); ctx.ellipse(p.x, p.y - 8, 18, 11, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#dceeff'; ctx.fillRect(p.x - 6, p.y - 12, 3, 3); ctx.fillRect(p.x + 4, p.y - 12, 3, 3);
  }

  function drawSkyOverlay() {
    const g = ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0, isNight() ? '#091012' : '#182b2c');
    g.addColorStop(1, isNight() ? '#101716' : '#1d3029');
    ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  function drawNightOverlay() {
    let alpha = isNight() ? .42 : isDusk() ? .22 : .06;
    ctx.fillStyle = `rgba(2,8,18,${alpha})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if (reachedGoal) {
      ctx.fillStyle = 'rgba(160,225,255,.12)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }

  function drawHud() {
    const phase = isNight() ? '夜晚' : isDusk() ? '黄昏' : '白天';
    const idle = workers.filter(w => !w.lost && w.state === 'idle').length;
    const lost = workers.filter(w => w.lost).length;
    hud.innerHTML = `
      <b>《看海去》Demo v0.1</b><br>
      辉石：<b>${stones}</b>　工人：${idle}/${workers.length - lost} 空闲　失踪：${lost}<br>
      第 ${dayIndex} 天 · ${phase}<br>
      目标：${reachedGoal ? '<b>已抵达蓝色信标</b>' : '穿过森林，抵达蓝色信标'}
    `;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function resize() { canvas.width = innerWidth * devicePixelRatio; canvas.height = innerHeight * devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize);
  addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') throwPulse(); if (e.key.toLowerCase() === 'r') reset(); });
  addEventListener('keyup', e => { keys[e.key] = false; });
  canvas.addEventListener('click', e => { const t = tileFromScreen(e.clientX, e.clientY); issueTask(t.x, t.y); });

  let last = performance.now();
  function loop(now) { const dt = Math.min(.05, (now - last)/1000); last = now; update(dt); draw(); requestAnimationFrame(loop); }
  resize(); reset(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
